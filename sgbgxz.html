<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>5题图形规律模拟题</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      padding: 16px 12px 24px;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #fff;
      color: #222;
      touch-action: manipulation;
    }
    .page {
      max-width: 1180px;
      margin: 0 auto;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
    }

    .progress {
      font-size: 14px;
      color: #4b9b52;
      font-weight: 700;
      background: #edf9ed;
      padding: 6px 12px;
      border-radius: 14px;
    }

    .desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 18px;
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }

    .plus, .eq {
      font-size: 26px;
      color: #666;
      font-weight: 700;
      width: 20px;
      text-align: center;
      flex: 0 0 auto;
    }

    .box {
      width: 156px;
      height: 156px;
      border: 3px solid #333;
      position: relative;
      background: #fff;
      flex: 0 0 auto;
    }

    .box::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      transform: translateX(-50%);
      border-left: 2px dashed #bdbdbd;
      z-index: 1;
    }

    .box::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      border-top: 2px dashed #bdbdbd;
      z-index: 1;
    }

    .cell {
      position: absolute;
      width: 50%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      user-select: none;
    }

    .tl { left: 0; top: 0; }
    .tr { right: 0; top: 0; }
    .bl { left: 0; bottom: 0; }
    .br { right: 0; bottom: 0; }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      font-size: 34px;
      transform-origin: center center;
      user-select: none;
      pointer-events: none;
    }

    .qmark {
      font-size: 40px;
      font-weight: 700;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
      user-select: none;
    }

    .qnum {
      font-size: 18px;
      margin-top: 4px;
    }

    .action-bar {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .green-btn {
      min-width: 136px;
      height: 42px;
      padding: 0 18px;
      border: none;
      border-radius: 21px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #62b357;
      color: #fff;
      box-shadow: 0 4px 10px rgba(98,179,87,0.25);
    }

    .answer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .section-title {
      display: inline-block;
      background: #dff5df;
      color: #4b9b52;
      font-weight: 700;
      font-size: 17px;
      padding: 6px 12px;
      border-radius: 8px;
    }

    .compact-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
    }

    /* 放大2档 */
    .answer-area {
      display: grid;
      grid-template-columns: repeat(4, 96px);
      gap: 12px;
      justify-content: start;
    }

    .answer-slot {
      position: relative;
      width: 96px;
      height: 96px;
      border: 2px solid #d9d9d9;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
    }

    .answer-slot.drop-active {
      border-color: #62b357;
      background: #f5fff3;
      transform: scale(1.03);
    }

    .slot-num {
      position: absolute;
      left: 8px;
      top: 6px;
      font-size: 15px;
      font-weight: 700;
      color: #555;
      z-index: 2;
      pointer-events: none;
    }

    .slot-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 选项区2行排列：7列 × 2行 */
    .options {
      display: grid;
      grid-template-columns: repeat(7, 96px);
      gap: 12px;
      justify-content: start;
    }

    .opt {
      position: relative;
      width: 96px;
      height: 96px;
      border: 1px solid #ececec;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      touch-action: none;
      user-select: none;
    }

    .opt-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .watermark {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: repeating-linear-gradient(-25deg, transparent 0 50px, rgba(0,0,0,0.04) 50px 52px);
    }

    .placeholder-svg, .pending-svg {
      width: 68px;
      height: 68px;
      pointer-events: none;
    }

    .foot-actions {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .result-card, .analysis-card {
      border: 1px solid #eaeaea;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    .result-main {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result-sub {
      color: #666;
      font-size: 14px;
      line-height: 1.8;
    }

    .analysis-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #d9534f;
    }

    .analysis-text {
      font-size: 14px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 12px;
    }

    .mini-rows {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-box {
      width: 110px;
      height: 110px;
      border: 2px solid #333;
      position: relative;
      background: #fff;
      flex: 0 0 auto;
    }

    .mini-box::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      transform: translateX(-50%);
      border-left: 2px dashed #c7c7c7;
      z-index: 1;
    }

    .mini-box::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      border-top: 2px dashed #c7c7c7;
      z-index: 1;
    }

    .mini-cell {
      position: absolute;
      width: 50%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .mini-icon {
      font-size: 26px;
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
    }

    .correct {
      color: #3c9b46;
      font-weight: 700;
    }

    /* 自定义拖拽层同步放大 */
    .drag-layer {
      position: fixed;
      left: 0;
      top: 0;
      width: 96px;
      height: 96px;
      pointer-events: none;
      z-index: 9999;
      display: none;
      transform: translate(-50%, -50%);
      opacity: 0.95;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.18));
    }

    .drag-proxy {
      width: 96px;
      height: 96px;
      border: 1px solid #dfe6df;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    @media (max-width: 900px) {
      .box { width: 144px; height: 144px; }
      .icon { font-size: 32px; width: 38px; height: 38px; }

      .answer-area {
        grid-template-columns: repeat(4, 84px);
        gap: 10px;
      }
      .answer-slot {
        width: 84px;
        height: 84px;
      }
      .options {
        grid-template-columns: repeat(7, 84px);
        gap: 10px;
      }
      .opt {
        width: 84px;
        height: 84px;
      }
      .drag-layer, .drag-proxy {
        width: 84px;
        height: 84px;
      }
    }

    @media (max-width: 520px) {
      .box { width: 122px; height: 122px; }
      .icon { font-size: 28px; width: 34px; height: 34px; }
      .plus, .eq { font-size: 22px; width: 16px; }
      .qmark { font-size: 34px; }
      .qnum { font-size: 14px; }

      .answer-area {
        grid-template-columns: repeat(4, 84px);
        gap: 8px;
      }
      .answer-slot {
        width: 84px;
        height: 84px;
      }
      .slot-num {
        font-size: 14px;
      }
      .options {
        grid-template-columns: repeat(3, 84px);
        gap: 8px;
      }
      .opt {
        width: 84px;
        height: 84px;
      }
      .drag-layer, .drag-proxy {
        width: 84px;
        height: 84px;
      }
      .placeholder-svg, .pending-svg {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="page" id="pageTop">

    <div class="screen active" id="screen-question">
      <div class="topbar">
        <div class="title">图形规律模拟题</div>
        <div class="progress" id="progressText">第 1 / 5 题</div>
      </div>
      <div class="desc">观察每一行前两个田字格的变化规律，选择合适的图形填入后面的问号位置。</div>
      <div class="rows" id="rows"></div>
      <div class="action-bar">
        <button class="green-btn" id="goAnswer">请选择</button>
      </div>
    </div>

    <div class="screen" id="screen-answer">
      <div class="answer-head">
        <div class="section-title" id="answerTitle">第1题 · 作答区</div>
        <div class="progress" id="answerProgress">第 1 / 5 题</div>
      </div>

      <div class="compact-wrap">
        <div class="answer-area" id="answerArea"></div>
        <div class="options" id="options"></div>
      </div>

      <div class="foot-actions">
        <button class="green-btn" id="nextQuestionBtn">下一题</button>
      </div>
    </div>

    <div class="screen" id="screen-result">
      <div class="topbar">
        <div class="title">答题结果</div>
      </div>
      <div id="resultContainer"></div>
      <div class="foot-actions">
        <button class="green-btn" id="restartBtn">重新答题</button>
      </div>
    </div>
  </div>

  <div class="drag-layer" id="dragLayer">
    <div class="drag-proxy" id="dragProxy"></div>
  </div>

  <script>
    const QUESTION_COUNT = 5;

    const themePools = [
      ["🚗","📷","🛵","🍐"],
      ["🧳","🪑","🥒","🫖"],
      ["🍚","🦆","👟","🎸"],
      ["🚲","🎁","🍋","🪁"],
      ["🐟","🍎","🧲","🪥"],
      ["🛶","🧤","🌶️","🔦"],
      ["🎺","🧹","🥕","🧢"],
      ["🚂","🪄","🍆","📯"],
      ["🛺","🪛","🥭","🧴"],
      ["🚜","🧰","🌽","🎻"]
    ];

    const posNames = ["tl", "tr", "bl", "br"];
    let questions = [];
    let currentQuestionIndex = 0;

    let dragState = {
      active: false,
      payload: null,
      sourceEl: null,
      pointerId: null
    };

    function randomInt(n) {
      return Math.floor(Math.random() * n);
    }

    function normalizeAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function rotateGridCCW1(arr) {
      return [arr[2], arr[0], arr[3], arr[1]];
    }

    function rotateGridCW1(arr) {
      return [arr[1], arr[3], arr[0], arr[2]];
    }

    function rotateGrid(arr, direction, step) {
      let result = [...arr];
      for (let i = 0; i < step; i++) {
        result = direction === "ccw" ? rotateGridCCW1(result) : rotateGridCW1(result);
      }
      return result;
    }

    function cloneState(state) {
      return state.map(item => ({
        ...item,
        angle: item.angle || 0,
        rotatesSelf: item.rotatesSelf || false,
        answerIndex: item.answerIndex ?? null
      }));
    }

    function assignAnswerIndices(state3, rowIndex) {
      if (rowIndex === 1) {
        state3[0].answerIndex = 0;
        state3[1].answerIndex = 1;
        state3[2].answerIndex = 2;
        state3[3].answerIndex = 3;
      } else if (rowIndex === 2) {
        state3[0].answerIndex = 4;
        state3[1].answerIndex = 5;
        state3[2].answerIndex = 6;
        state3[3].answerIndex = 7;
      }
    }

    function buildRowItemsFromTheme(theme, rowIndex) {
      const keys = ["a","b","c","d"];
      return theme.map((icon, i) => ({
        key: `r${rowIndex}_${keys[i]}_${icon.codePointAt(0)}`,
        icon,
        asymmetric: true
      }));
    }

    function pickThreeThemes() {
      return shuffle(themePools).slice(0, 3);
    }

    function optionSignature(item) {
      if (item.type !== "emoji") return item.type;
      return `${item.icon}_${normalizeAngle(item.angle || 0)}`;
    }

    function buildOptions(finalAnswers, rotatedAnswerInfo, extraIcons) {
      const options = [];
      const used = new Set();

      finalAnswers.forEach(ans => {
        const sig = optionSignature(ans);
        if (!used.has(sig)) {
          options.push({ ...ans });
          used.add(sig);
        }
      });

      rotatedAnswerInfo.forEach(info => {
        const distractorAngles = shuffle([0, 90, 180, 270]).filter(a => a !== info.correctAngle);
        for (const angle of distractorAngles) {
          if (options.length >= 12) break;
          const candidate = { type: "emoji", icon: info.icon, key: info.key, angle };
          const sig = optionSignature(candidate);
          if (!used.has(sig)) {
            options.push(candidate);
            used.add(sig);
            break;
          }
        }
      });

      const allAngles = [0, 90, 180, 270];
      for (const icon of extraIcons) {
        for (const angle of allAngles) {
          if (options.length >= 12) break;
          const candidate = { type: "emoji", icon, angle };
          const sig = optionSignature(candidate);
          if (!used.has(sig)) {
            options.push(candidate);
            used.add(sig);
          }
        }
        if (options.length >= 12) break;
      }

      options.push({ type: "placeholder" });
      options.push({ type: "pending" });

      return shuffle(options);
    }

    function makeQuestion() {
      const themes = pickThreeThemes();
      const rowsSource = themes.map((theme, i) => buildRowItemsFromTheme(theme, i));

      const rotateDirection = Math.random() < 0.5 ? "ccw" : "cw";
      const rotateStep = Math.random() < 0.5 ? 1 : 2;
      const imageRotateSignedAngle = rotateDirection === "ccw"
        ? (rotateStep === 1 ? 90 : 180)
        : (rotateStep === 1 ? -90 : -180);

      const sharedRotatingPositionIndex = randomInt(4);

      const rows = rowsSource.map((items, rowIndex) => {
        const rotatingKey = items[sharedRotatingPositionIndex].key;

        const state1 = items.map(item => ({
          ...item,
          angle: 0,
          rotatesSelf: item.key === rotatingKey,
          answerIndex: null
        }));

        const state2 = rotateGrid(cloneState(state1), rotateDirection, rotateStep);
        state2.forEach(item => {
          item.angle = item.rotatesSelf ? normalizeAngle(item.angle + imageRotateSignedAngle) : 0;
        });

        const state3 = rotateGrid(cloneState(state2), rotateDirection, rotateStep);
        state3.forEach(item => {
          item.angle = item.rotatesSelf ? normalizeAngle(item.angle + imageRotateSignedAngle) : 0;
        });

        if (rowIndex === 1 || rowIndex === 2) assignAnswerIndices(state3, rowIndex);

        return {
          showAnswer: rowIndex === 0,
          qStart: rowIndex === 1 ? 1 : rowIndex === 2 ? 5 : null,
          state1, state2, state3, rotatingKey
        };
      });

      const finalAnswers = [];
      const rotatedAnswerInfo = [];

      rows.forEach((row, rowIndex) => {
        if (!row.showAnswer) {
          row.state3.forEach(item => {
            finalAnswers.push({
              type: "emoji",
              icon: item.icon,
              key: item.key,
              angle: normalizeAngle(item.angle || 0),
              answerIndex: item.answerIndex
            });

            if (item.key === row.rotatingKey) {
              rotatedAnswerInfo.push({
                icon: item.icon,
                key: item.key,
                correctAngle: normalizeAngle(item.angle || 0),
                answerIndex: item.answerIndex
              });
            }
          });
        }
      });

      const extraIcons = shuffle(themePools.flat()).filter((v, i, arr) => arr.indexOf(v) === i);
      const options = buildOptions(finalAnswers, rotatedAnswerInfo, extraIcons);

      return {
        rotateDirection,
        rotateStep,
        imageRotateSignedAngle,
        sharedRotatingPositionIndex,
        rows,
        finalAnswers,
        rotatedAnswerInfo,
        options,
        userAnswers: Array(8).fill(null)
      };
    }

    function createBox(cells, questionStart = null, mini = false) {
      const box = document.createElement("div");
      box.className = mini ? "mini-box" : "box";

      posNames.forEach((pos, i) => {
        const cell = document.createElement("div");
        cell.className = `${mini ? "mini-cell" : "cell"} ${pos}`;

        if (cells[i] === null && questionStart !== null) {
          const q = document.createElement("div");
          q.className = "qmark";
          q.innerHTML = `?<div class="qnum">${questionStart + i}</div>`;
          if (mini) {
            q.style.fontSize = "28px";
            q.querySelector(".qnum").style.fontSize = "13px";
          }
          cell.appendChild(q);
        } else {
          const icon = document.createElement("span");
          icon.className = mini ? "mini-icon" : "icon";
          icon.textContent = cells[i].icon;
          icon.style.transform = `rotate(${normalizeAngle(cells[i].angle || 0)}deg)`;
          cell.appendChild(icon);
        }
        box.appendChild(cell);
      });

      return box;
    }

    function makeEmojiOption(icon, angle = 0, small = false) {
      const span = document.createElement("span");
      span.className = small ? "mini-icon" : "icon";
      span.textContent = icon;
      span.style.transform = `rotate(${normalizeAngle(angle)}deg)`;
      return span;
    }

    function makePlaceholderM() {
      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <svg class="placeholder-svg" viewBox="0 0 100 100">
          <rect x="10" y="10" width="80" height="80" fill="none" stroke="#bfbfbf" stroke-width="6"/>
          <circle cx="35" cy="32" r="10" fill="none" stroke="#bfbfbf" stroke-width="5"/>
          <path d="M20 75 L45 48 L58 60 L68 50 L82 70" fill="none" stroke="#bfbfbf" stroke-width="5" stroke-linejoin="round"/>
        </svg>
      `;
      return wrap.firstElementChild;
    }

    function makePendingN() {
      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <svg class="pending-svg" viewBox="0 0 100 100">
          <circle cx="46" cy="44" r="12" fill="none" stroke="#5b8def" stroke-width="5"/>
          <path d="M28 75 C28 62, 40 56, 46 56 C52 56, 64 62, 64 75" fill="none" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
          <path d="M20 62 A32 32 0 1 1 73 77" fill="none" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
          <line x1="72" y1="76" x2="86" y2="90" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
      return wrap.firstElementChild;
    }

    function createOption(contentEl, payload) {
      const opt = document.createElement("div");
      opt.className = "opt";
      opt.dataset.payload = JSON.stringify(payload);

      const wm = document.createElement("div");
      wm.className = "watermark";
      opt.appendChild(wm);

      const inner = document.createElement("div");
      inner.className = "opt-inner";
      inner.appendChild(contentEl);
      opt.appendChild(inner);

      return opt;
    }

    function renderQuestionPage() {
      const q = questions[currentQuestionIndex];
      document.getElementById("progressText").textContent = `第 ${currentQuestionIndex + 1} / ${QUESTION_COUNT} 题`;

      const rowsEl = document.getElementById("rows");
      rowsEl.innerHTML = "";

      q.rows.forEach((row) => {
        const rowEl = document.createElement("div");
        rowEl.className = "row";

        rowEl.appendChild(createBox(row.state1));

        const plus = document.createElement("div");
        plus.className = "plus";
        plus.textContent = "+";
        rowEl.appendChild(plus);

        rowEl.appendChild(createBox(row.state2));

        const eq = document.createElement("div");
        eq.className = "eq";
        eq.textContent = "=";
        rowEl.appendChild(eq);

        if (row.showAnswer) rowEl.appendChild(createBox(row.state3));
        else rowEl.appendChild(createBox([null, null, null, null], row.qStart));

        rowsEl.appendChild(rowEl);
      });
    }

    function renderAnswerPage() {
      const q = questions[currentQuestionIndex];
      document.getElementById("answerTitle").textContent = `第${currentQuestionIndex + 1}题 · 作答区`;
      document.getElementById("answerProgress").textContent = `第 ${currentQuestionIndex + 1} / ${QUESTION_COUNT} 题`;

      const answerArea = document.getElementById("answerArea");
      answerArea.innerHTML = "";
      for (let i = 0; i < 8; i++) {
        const slot = document.createElement("div");
        slot.className = "answer-slot";
        slot.dataset.index = i;

        const num = document.createElement("div");
        num.className = "slot-num";
        num.textContent = i + 1;

        const content = document.createElement("div");
        content.className = "slot-content";

        slot.appendChild(num);
        slot.appendChild(content);
        answerArea.appendChild(slot);

        if (q.userAnswers[i]) renderPayloadToSlot(slot, q.userAnswers[i], false);
      }

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";
      q.options.forEach(item => {
        let content;
        if (item.type === "emoji") content = makeEmojiOption(item.icon, item.angle || 0);
        else if (item.type === "placeholder") content = makePlaceholderM();
        else content = makePendingN();
        const opt = createOption(content, item);
        optionsEl.appendChild(opt);
      });

      bindSmoothDragForCurrentQuestion();
      document.getElementById("nextQuestionBtn").textContent =
        currentQuestionIndex === QUESTION_COUNT - 1 ? "提交答卷" : "下一题";
    }

    function renderPayloadToSlot(slot, payload, save = true) {
      const content = slot.querySelector(".slot-content");
      content.innerHTML = "";

      let node;
      if (payload.type === "emoji") node = makeEmojiOption(payload.icon, payload.angle || 0);
      else if (payload.type === "placeholder") node = makePlaceholderM();
      else node = makePendingN();

      const wrapper = document.createElement("div");
      wrapper.className = "opt-inner";
      wrapper.dataset.payload = JSON.stringify(payload);
      wrapper.appendChild(node);
      content.appendChild(wrapper);

      if (save) {
        const idx = Number(slot.dataset.index);
        questions[currentQuestionIndex].userAnswers[idx] = payload;
      }
    }

    function bindSmoothDragForCurrentQuestion() {
      cleanupDragListeners();
      const opts = document.querySelectorAll(".opt");
      opts.forEach(opt => {
        opt.addEventListener("pointerdown", onDragStart, { passive: false });
      });
    }

    function cleanupDragListeners() {
      document.querySelectorAll(".opt").forEach(opt => {
        opt.removeEventListener("pointerdown", onDragStart);
      });
      document.removeEventListener("pointermove", onDragMove);
      document.removeEventListener("pointerup", onDragEnd);
      document.removeEventListener("pointercancel", onDragEnd);
    }

    function createDragProxy(payload) {
      const dragProxy = document.getElementById("dragProxy");
      dragProxy.innerHTML = "";

      let node;
      if (payload.type === "emoji") node = makeEmojiOption(payload.icon, payload.angle || 0);
      else if (payload.type === "placeholder") node = makePlaceholderM();
      else node = makePendingN();

      dragProxy.appendChild(node);
    }

    function onDragStart(e) {
      e.preventDefault();

      const source = e.currentTarget;
      const payloadStr = source.dataset.payload;
      if (!payloadStr) return;

      const payload = JSON.parse(payloadStr);
      dragState.active = true;
      dragState.payload = payload;
      dragState.sourceEl = source;
      dragState.pointerId = e.pointerId;

      createDragProxy(payload);

      const layer = document.getElementById("dragLayer");
      layer.style.display = "block";
      moveDragLayer(e.clientX, e.clientY);

      source.setPointerCapture?.(e.pointerId);

      document.addEventListener("pointermove", onDragMove, { passive: false });
      document.addEventListener("pointerup", onDragEnd, { passive: false });
      document.addEventListener("pointercancel", onDragEnd, { passive: false });

      highlightDropTarget(e.clientX, e.clientY);
    }

    function moveDragLayer(x, y) {
      const layer = document.getElementById("dragLayer");
      layer.style.left = x + "px";
      layer.style.top = y + "px";
    }

    function clearDropActive() {
      document.querySelectorAll(".answer-slot").forEach(slot => {
        slot.classList.remove("drop-active");
      });
    }

    function getSlotAtPoint(x, y) {
      const el = document.elementFromPoint(x, y);
      if (!el) return null;
      return el.closest(".answer-slot");
    }

    function highlightDropTarget(x, y) {
      clearDropActive();
      const slot = getSlotAtPoint(x, y);
      if (slot) slot.classList.add("drop-active");
      return slot;
    }

    function onDragMove(e) {
      if (!dragState.active) return;
      e.preventDefault();
      moveDragLayer(e.clientX, e.clientY);
      highlightDropTarget(e.clientX, e.clientY);
    }

    function onDragEnd(e) {
      if (!dragState.active) return;
      e.preventDefault();

      const slot = highlightDropTarget(e.clientX, e.clientY);
      if (slot && dragState.payload) {
        renderPayloadToSlot(slot, dragState.payload, true);
      }

      clearDropActive();
      const layer = document.getElementById("dragLayer");
      layer.style.display = "none";
      document.getElementById("dragProxy").innerHTML = "";

      dragState.active = false;
      dragState.payload = null;
      dragState.sourceEl = null;
      dragState.pointerId = null;

      document.removeEventListener("pointermove", onDragMove);
      document.removeEventListener("pointerup", onDragEnd);
      document.removeEventListener("pointercancel", onDragEnd);
    }

    function sameAnswer(a, b) {
      if (!a || !b) return false;
      if (a.type !== b.type) return false;
      if (a.type !== "emoji") return a.type === b.type;
      return a.icon === b.icon && normalizeAngle(a.angle || 0) === normalizeAngle(b.angle || 0);
    }

    function analyzeQuestion(q, index) {
      const wrongs = [];
      for (let i = 0; i < 8; i++) {
        const user = q.userAnswers[i];
        const correct = q.finalAnswers[i];
        if (!sameAnswer(user, correct)) wrongs.push({ slot: i + 1, user, correct });
      }
      return { index, wrongs };
    }

    function payloadText(p) {
      if (!p) return "未作答";
      if (p.type === "placeholder") return "空选项";
      if (p.type === "pending") return "待定选项";
      return `${p.icon}（旋转${normalizeAngle(p.angle || 0)}°）`;
    }

    function renderMiniQuestionAnalysis(q) {
      const wrap = document.createElement("div");
      wrap.className = "mini-rows";

      q.rows.forEach(row => {
        const rowEl = document.createElement("div");
        rowEl.className = "mini-row";

        rowEl.appendChild(createBox(row.state1, null, true));

        const plus = document.createElement("div");
        plus.className = "plus";
        plus.style.fontSize = "20px";
        plus.textContent = "+";
        rowEl.appendChild(plus);

        rowEl.appendChild(createBox(row.state2, null, true));

        const eq = document.createElement("div");
        eq.className = "eq";
        eq.style.fontSize = "20px";
        eq.textContent = "=";
        rowEl.appendChild(eq);

        rowEl.appendChild(createBox(row.state3, null, true));
        wrap.appendChild(rowEl);
      });

      return wrap;
    }

    function renderResultPage() {
      const container = document.getElementById("resultContainer");
      container.innerHTML = "";

      let totalCorrect = 0;
      const analyses = questions.map((q, i) => {
        const result = analyzeQuestion(q, i);
        totalCorrect += 8 - result.wrongs.length;
        return result;
      });

      const total = QUESTION_COUNT * 8;

      const summary = document.createElement("div");
      summary.className = "result-card";
      summary.innerHTML = `
        <div class="result-main">总分：${totalCorrect} / ${total}</div>
        <div class="result-sub">
          共 ${QUESTION_COUNT} 题，每题 8 空。<br>
          正确 ${totalCorrect} 空，错误 ${total - totalCorrect} 空。
        </div>
      `;
      container.appendChild(summary);

      const wrongOnly = analyses.filter(a => a.wrongs.length > 0);

      if (wrongOnly.length === 0) {
        const ok = document.createElement("div");
        ok.className = "result-card";
        ok.innerHTML = `
          <div class="result-main correct">全部答对，做得很好！</div>
          <div class="result-sub">你已经正确掌握了整体方格旋转与图片跟随旋转的规律。</div>
        `;
        container.appendChild(ok);
        return;
      }

      wrongOnly.forEach(a => {
        const q = questions[a.index];
        const card = document.createElement("div");
        card.className = "analysis-card";

        const title = document.createElement("div");
        title.className = "analysis-title";
        title.textContent = `第 ${a.index + 1} 题错题分析`;
        card.appendChild(title);

        const text = document.createElement("div");
        text.className = "analysis-text";
        const ruleText =
          `原题规律：整体方格按“${q.rotateDirection === "ccw" ? "逆时针" : "顺时针"}旋转${q.rotateStep}格”变化。` +
          `三行中同一个初始位置的图片会跟随整体规律一起旋转；` +
          `由于本题整体转${q.rotateStep}格，所以该图片每一步自身旋转${q.rotateStep === 1 ? "90" : "180"}度，且旋转方向与整体一致。`;

        const wrongList = a.wrongs.map(w =>
          `第${w.slot}空：你的答案是【${payloadText(w.user)}】，正确答案是【${payloadText(w.correct)}】。`
        ).join("<br>");

        text.innerHTML = `${ruleText}<br><br>${wrongList}`;
        card.appendChild(text);

        const miniTitle = document.createElement("div");
        miniTitle.style.fontWeight = "700";
        miniTitle.style.marginBottom = "10px";
        miniTitle.textContent = "原题图分析：";
        card.appendChild(miniTitle);

        card.appendChild(renderMiniQuestionAnalysis(q));
        container.appendChild(card);
      });
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function buildPaper() {
      questions = Array.from({ length: QUESTION_COUNT }, () => makeQuestion());
      currentQuestionIndex = 0;
    }

    function openCurrentQuestion() {
      renderQuestionPage();
      showScreen("screen-question");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openCurrentAnswerPage() {
      renderAnswerPage();
      showScreen("screen-answer");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function nextQuestion() {
      if (currentQuestionIndex < QUESTION_COUNT - 1) {
        currentQuestionIndex++;
        openCurrentQuestion();
      } else {
        renderResultPage();
        showScreen("screen-result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function bindGlobalEvents() {
      document.getElementById("goAnswer").addEventListener("click", () => {
        openCurrentAnswerPage();
      });

      document.getElementById("nextQuestionBtn").addEventListener("click", () => {
        nextQuestion();
      });

      document.getElementById("restartBtn").addEventListener("click", () => {
        buildPaper();
        openCurrentQuestion();
      });
    }

    buildPaper();
    bindGlobalEvents();
    openCurrentQuestion();
  </script>
</body>
</html>
