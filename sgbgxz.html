<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>图形规律模拟题</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", Arial, sans-serif;
      background: #fff;
      margin: 0;
      padding: 24px 20px 32px;
      color: #222;
    }
    .page {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
    }
    .screen { display: none; }
    .screen.active { display: block; }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 28px;
      width: 100%;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      width: 100%;
    }
    .plus, .eq {
      font-size: 30px;
      color: #666;
      font-weight: 700;
      width: 24px;
      text-align: center;
      flex: 0 0 auto;
    }

    .box {
      width: 180px;
      height: 180px;
      border: 3px solid #333;
      position: relative;
      background: #fff;
      flex: 0 0 auto;
    }
    .box::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      height: 100%;
      transform: translateX(-50%);
      border-left: 2px dashed #bdbdbd;
      z-index: 1;
    }
    .box::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      transform: translateY(-50%);
      border-top: 2px dashed #bdbdbd;
      z-index: 1;
    }

    .cell {
      position: absolute;
      width: 50%;
      height: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      z-index: 2;
      user-select: none;
    }
    .tl { left: 0; top: 0; }
    .tr { right: 0; top: 0; }
    .bl { left: 0; bottom: 0; }
    .br { right: 0; bottom: 0; }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      transition: transform 0.2s ease;
      width: 52px;
      height: 52px;
      font-size: 44px;
      user-select: none;
    }

    .qmark {
      font-size: 48px;
      font-weight: 700;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    .qnum {
      font-size: 22px;
      margin-top: 6px;
    }

    .action-bar {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 28px;
    }
    .choose-btn {
      min-width: 180px;
      height: 52px;
      padding: 0 28px;
      border: none;
      border-radius: 26px;
      background: #62b357;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(98,179,87,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .section-title {
      display: inline-block;
      background: #dff5df;
      color: #4b9b52;
      font-weight: 700;
      font-size: 20px;
      padding: 8px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .answer-area-wrap {
      margin-bottom: 28px;
    }
    .answer-area {
      display: grid;
      grid-template-columns: repeat(4, 96px);
      gap: 14px;
      justify-content: start;
    }
    .answer-slot {
      position: relative;
      width: 96px;
      height: 96px;
      border: 2px solid #d9d9d9;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .answer-slot.drag-over {
      border-color: #62b357;
      background: #f5fff3;
    }
    .slot-num {
      position: absolute;
      left: 10px;
      top: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #555;
      z-index: 2;
      pointer-events: none;
    }
    .slot-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(7, 96px);
      gap: 14px;
      justify-content: start;
    }
    .opt {
      position: relative;
      width: 96px;
      height: 96px;
      border: 1px solid #ececec;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      overflow: hidden;
      cursor: grab;
    }
    .opt-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .placeholder-svg,
    .pending-svg {
      width: 72px;
      height: 72px;
      pointer-events: none;
    }

    .watermark {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      background-image: repeating-linear-gradient(
        -25deg,
        transparent 0 50px,
        rgba(0,0,0,0.04) 50px 52px
      );
    }

    .back-bar {
      margin-top: 24px;
      display: flex;
      justify-content: center;
    }
    .back-btn {
      min-width: 140px;
      height: 42px;
      border: 1px solid #cfd8e3;
      border-radius: 21px;
      background: #fff;
      color: #4b4b4b;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="screen active" id="screen-question">
      <div class="title">图形规律模拟题</div>
      <div class="desc">观察每一行前两个田字格的变化规律，选择合适的图形填入后面的问号位置。</div>
      <div class="rows" id="rows"></div>
      <div class="action-bar">
        <button class="choose-btn" id="goAnswer">请选择</button>
      </div>
    </div>

    <div class="screen" id="screen-answer">
      <div class="answer-area-wrap">
        <div class="section-title">作答区</div>
        <div class="answer-area" id="answerArea"></div>
      </div>

      <div>
        <div class="section-title">选项区</div>
        <div class="options" id="options"></div>
      </div>

      <div class="back-bar">
        <button class="back-btn" id="goBack">返回题目</button>
      </div>
    </div>
  </div>

  <script>
    const rowData = [
      {
        showAnswer: true,
        items: [
          { key: "car", icon: "🚗", asymmetric: true },
          { key: "camera", icon: "📷", asymmetric: true },
          { key: "scooter", icon: "🛵", asymmetric: true },
          { key: "pear", icon: "🍐", asymmetric: true }
        ]
      },
      {
        showAnswer: false,
        qStart: 1,
        items: [
          { key: "luggage", icon: "🧳", asymmetric: true },
          { key: "chair", icon: "🪑", asymmetric: true },
          { key: "cucumber", icon: "🥒", asymmetric: true },
          { key: "kettle", icon: "🫖", asymmetric: true }
        ]
      },
      {
        showAnswer: false,
        qStart: 5,
        items: [
          { key: "cooker", icon: "🍚", asymmetric: true },
          { key: "duck", icon: "🦆", asymmetric: true },
          { key: "shoe", icon: "👟", asymmetric: true },
          { key: "guitar", icon: "🎸", asymmetric: true }
        ]
      }
    ];

    const posNames = ["tl", "tr", "bl", "br"];

    function randomInt(n) {
      return Math.floor(Math.random() * n);
    }

    function normalizeAngle(angle) {
      return ((angle % 360) + 360) % 360;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // 1. 整体方格旋转规律随机
    const rotateDirection = Math.random() < 0.5 ? "ccw" : "cw";
    const rotateStep = Math.random() < 0.5 ? 1 : 2;

    // 2. 图片跟随整体方格旋转规律
    const imageRotateSignedAngle = rotateDirection === "ccw"
      ? (rotateStep === 1 ? 90 : 180)
      : (rotateStep === 1 ? -90 : -180);

    // 3. 三行随机选中的图片位置相同
    const sharedRotatingPositionIndex = randomInt(4);

    function rotateGridCCW1(arr) {
      return [arr[2], arr[0], arr[3], arr[1]];
    }

    function rotateGridCW1(arr) {
      return [arr[1], arr[3], arr[0], arr[2]];
    }

    function rotateGrid(arr, direction, step) {
      let result = [...arr];
      for (let i = 0; i < step; i++) {
        result = direction === "ccw" ? rotateGridCCW1(result) : rotateGridCW1(result);
      }
      return result;
    }

    function cloneState(state) {
      return state.map(item => ({
        ...item,
        angle: item.angle || 0,
        rotatesSelf: item.rotatesSelf || false,
        answerIndex: item.answerIndex ?? null
      }));
    }

    function assignAnswerIndices(state3, rowIndex) {
      if (rowIndex === 1) {
        state3[0].answerIndex = 0;
        state3[1].answerIndex = 1;
        state3[2].answerIndex = 2;
        state3[3].answerIndex = 3;
      } else if (rowIndex === 2) {
        state3[0].answerIndex = 4;
        state3[1].answerIndex = 5;
        state3[2].answerIndex = 6;
        state3[3].answerIndex = 7;
      }
    }

    function createBox(cells, questionStart = null) {
      const box = document.createElement("div");
      box.className = "box";

      posNames.forEach((pos, i) => {
        const cell = document.createElement("div");
        cell.className = `cell ${pos}`;

        if (cells[i] === null && questionStart !== null) {
          const q = document.createElement("div");
          q.className = "qmark";
          q.innerHTML = `?<div class="qnum">${questionStart + i}</div>`;
          cell.appendChild(q);
        } else {
          const icon = document.createElement("span");
          icon.className = "icon";
          icon.textContent = cells[i].icon;
          icon.style.transform = `rotate(${normalizeAngle(cells[i].angle || 0)}deg)`;
          cell.appendChild(icon);
        }
        box.appendChild(cell);
      });

      return box;
    }

    function buildRowStates(row, rowIndex) {
      const rotatingKey = row.items[sharedRotatingPositionIndex].key;

      const state1 = row.items.map(item => ({
        ...item,
        angle: 0,
        rotatesSelf: item.key === rotatingKey,
        answerIndex: null
      }));

      const state2 = rotateGrid(cloneState(state1), rotateDirection, rotateStep);
      state2.forEach(item => {
        item.angle = item.rotatesSelf ? normalizeAngle(item.angle + imageRotateSignedAngle) : 0;
      });

      const state3 = rotateGrid(cloneState(state2), rotateDirection, rotateStep);
      state3.forEach(item => {
        item.angle = item.rotatesSelf ? normalizeAngle(item.angle + imageRotateSignedAngle) : 0;
      });

      if (!row.showAnswer) assignAnswerIndices(state3, rowIndex);

      return { state1, state2, state3, rotatingKey };
    }

    const finalAnswers = [];
    const rotatedAnswerInfo = [];

    function renderRows() {
      const rowsEl = document.getElementById("rows");
      finalAnswers.length = 0;
      rotatedAnswerInfo.length = 0;

      rowData.forEach((row, rowIndex) => {
        const { state1, state2, state3, rotatingKey } = buildRowStates(row, rowIndex);
        const rowEl = document.createElement("div");
        rowEl.className = "row";

        if (!row.showAnswer) {
          state3.forEach(item => {
            finalAnswers.push({
              type: "emoji",
              icon: item.icon,
              key: item.key,
              angle: normalizeAngle(item.angle || 0),
              answerIndex: item.answerIndex
            });

            if (item.key === rotatingKey) {
              rotatedAnswerInfo.push({
                icon: item.icon,
                key: item.key,
                correctAngle: normalizeAngle(item.angle || 0),
                answerIndex: item.answerIndex
              });
            }
          });
        }

        rowEl.appendChild(createBox(state1));

        const plus = document.createElement("div");
        plus.className = "plus";
        plus.textContent = "+";
        rowEl.appendChild(plus);

        rowEl.appendChild(createBox(state2));

        const eq = document.createElement("div");
        eq.className = "eq";
        eq.textContent = "=";
        rowEl.appendChild(eq);

        if (row.showAnswer) {
          rowEl.appendChild(createBox(state3));
        } else {
          rowEl.appendChild(createBox([null, null, null, null], row.qStart));
        }

        rowsEl.appendChild(rowEl);
      });
    }

    function renderAnswerArea() {
      const answerArea = document.getElementById("answerArea");
      for (let i = 1; i <= 8; i++) {
        const slot = document.createElement("div");
        slot.className = "answer-slot";
        slot.dataset.index = i;

        const num = document.createElement("div");
        num.className = "slot-num";
        num.textContent = i;

        const content = document.createElement("div");
        content.className = "slot-content";

        slot.appendChild(num);
        slot.appendChild(content);
        answerArea.appendChild(slot);
      }
    }

    function makeEmojiOption(icon, angle = 0) {
      const span = document.createElement("span");
      span.className = "icon";
      span.textContent = icon;
      span.style.transform = `rotate(${normalizeAngle(angle)}deg)`;
      return span;
    }

    function makePlaceholderM() {
      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <svg class="placeholder-svg" viewBox="0 0 100 100">
          <rect x="10" y="10" width="80" height="80" fill="none" stroke="#bfbfbf" stroke-width="6"/>
          <circle cx="35" cy="32" r="10" fill="none" stroke="#bfbfbf" stroke-width="5"/>
          <path d="M20 75 L45 48 L58 60 L68 50 L82 70" fill="none" stroke="#bfbfbf" stroke-width="5" stroke-linejoin="round"/>
        </svg>
      `;
      return wrap.firstElementChild;
    }

    function makePendingN() {
      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <svg class="pending-svg" viewBox="0 0 100 100">
          <circle cx="46" cy="44" r="12" fill="none" stroke="#5b8def" stroke-width="5"/>
          <path d="M28 75 C28 62, 40 56, 46 56 C52 56, 64 62, 64 75" fill="none" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
          <path d="M20 62 A32 32 0 1 1 73 77" fill="none" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
          <line x1="72" y1="76" x2="86" y2="90" stroke="#5b8def" stroke-width="5" stroke-linecap="round"/>
        </svg>
      `;
      return wrap.firstElementChild;
    }

    function optionSignature(item) {
      if (item.type !== "emoji") return item.type;
      return `${item.icon}_${normalizeAngle(item.angle || 0)}`;
    }

    function buildOptions() {
      const options = [];
      const used = new Set();

      // 放入8个真实答案
      finalAnswers.forEach(ans => {
        const sig = optionSignature(ans);
        if (!used.has(sig)) {
          options.push({ ...ans });
          used.add(sig);
        }
      });

      // 第2、3行旋转答案分别加入1个不同角度干扰项
      rotatedAnswerInfo.forEach(info => {
        const distractorAngles = shuffle([0, 90, 180, 270]).filter(a => a !== info.correctAngle);
        for (const angle of distractorAngles) {
          if (options.length >= 12) break;
          const candidate = { type: "emoji", icon: info.icon, key: info.key, angle };
          const sig = optionSignature(candidate);
          if (!used.has(sig)) {
            options.push(candidate);
            used.add(sig);
            break;
          }
        }
      });

      // 不足12补普通干扰项
      const allIcons = ["🚗","📷","🛵","🍐","🧳","🪑","🥒","🫖","🍚","🦆","👟","🎸"];
      const allAngles = [0, 90, 180, 270];
      for (const icon of allIcons) {
        for (const angle of allAngles) {
          if (options.length >= 12) break;
          const candidate = { type: "emoji", icon, angle };
          const sig = optionSignature(candidate);
          if (!used.has(sig)) {
            options.push(candidate);
            used.add(sig);
          }
        }
        if (options.length >= 12) break;
      }

      options.push({ type: "placeholder" });
      options.push({ type: "pending" });

      return shuffle(options);
    }

    function createOption(contentEl, payload) {
      const opt = document.createElement("div");
      opt.className = "opt";
      opt.draggable = true;
      opt.dataset.payload = JSON.stringify(payload);

      const wm = document.createElement("div");
      wm.className = "watermark";
      opt.appendChild(wm);

      const inner = document.createElement("div");
      inner.className = "opt-inner";
      inner.appendChild(contentEl);
      opt.appendChild(inner);

      return opt;
    }

    function renderOptions() {
      const optionsEl = document.getElementById("options");
      buildOptions().forEach(item => {
        let content;
        if (item.type === "emoji") content = makeEmojiOption(item.icon, item.angle || 0);
        else if (item.type === "placeholder") content = makePlaceholderM();
        else content = makePendingN();

        optionsEl.appendChild(createOption(content, item));
      });
    }

    function renderPayloadToSlot(slot, payload) {
      const content = slot.querySelector(".slot-content");
      content.innerHTML = "";

      let node;
      if (payload.type === "emoji") node = makeEmojiOption(payload.icon, payload.angle || 0);
      else if (payload.type === "placeholder") node = makePlaceholderM();
      else node = makePendingN();

      const wrapper = document.createElement("div");
      wrapper.className = "opt-inner";
      wrapper.draggable = true;
      wrapper.dataset.payload = JSON.stringify(payload);
      wrapper.appendChild(node);
      content.appendChild(wrapper);
    }

    function bindDragDrop() {
      let dragPayload = null;

      document.addEventListener("dragstart", (e) => {
        const source = e.target.closest("[data-payload]");
        if (!source) return;
        dragPayload = source.dataset.payload;
        e.dataTransfer.setData("text/plain", dragPayload);
      });

      document.querySelectorAll(".answer-slot").forEach(slot => {
        slot.addEventListener("dragover", (e) => {
          e.preventDefault();
          slot.classList.add("drag-over");
        });

        slot.addEventListener("dragleave", () => {
          slot.classList.remove("drag-over");
        });

        slot.addEventListener("drop", (e) => {
          e.preventDefault();
          slot.classList.remove("drag-over");
          const data = e.dataTransfer.getData("text/plain") || dragPayload;
          if (!data) return;
          renderPayloadToSlot(slot, JSON.parse(data));
        });
      });
    }

    function bindPageSwitch() {
      const screenQuestion = document.getElementById("screen-question");
      const screenAnswer = document.getElementById("screen-answer");
      document.getElementById("goAnswer").addEventListener("click", () => {
        screenQuestion.classList.remove("active");
        screenAnswer.classList.add("active");
      });
      document.getElementById("goBack").addEventListener("click", () => {
        screenAnswer.classList.remove("active");
        screenQuestion.classList.add("active");
      });
    }

    renderRows();
    renderAnswerArea();
    renderOptions();
    bindDragDrop();
    bindPageSwitch();
  </script>
</body>
</html>
