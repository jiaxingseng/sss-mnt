<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>图片题库-随机5题（OpenMoji｜每题2分钟倒计时｜无歧义选项｜题干≠选项）</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#222;
      --muted:#666;

      --orange:#f3a34b;
      --blueBorder:#5d7cff;

      --green:#6cc04a;
      --greenDeep:#46a127;

      --barBg:#e5e5e5;
      --card:#efefef;
      --cardBorder:#e7e7e7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color:var(--text);
    }
    .page{
      width: min(1024px, 96vw);
      margin: 0 auto;
      padding: 18px 22px 26px;
    }

    /* header */
    .topRow{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:14px;
    }
    .badge{
      display:inline-block;
      padding:6px 14px;
      font-weight:800;
      font-size:16px;
      color:#fff;
      background:var(--orange);
      border-radius:16px;
      line-height:1;
      margin-bottom:10px;
    }
    .meta{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
      color:var(--muted);
      font-weight:800;
      user-select:none;
    }
    .meta .pill{
      padding:6px 10px;
      border-radius:999px;
      background:#f3f3f3;
      border:1px solid #e5e5e5;
      font-variant-numeric: tabular-nums;
    }
    .desc{
      font-size:18px;
      line-height:1.6;
      margin: 4px 0 10px;
    }
    .desc b{font-weight:900}
    .desc .hint{color:#000;font-weight:900}
    .ruleNote{color:#666;font-weight:800}

    /* === 小火箭 + 长进度条 + 倒计时 === */
    .timeRow{
      display:flex;
      align-items:center;
      gap:12px;
      margin: 6px 0 12px;
    }
    .progressWrap{
      flex:1;
      height:8px;
      border-radius:999px;
      background: var(--barBg);
      position:relative;
      overflow: visible;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }
    .progressFill{
      height:100%;
      width:0%;
      background: var(--green);
      border-radius:999px;
      transition: width .2s linear;
    }
    .rocket{
      position:absolute;
      top:50%;
      left:0%;
      transform: translate(-30%, -50%);
      width: 44px;
      height: 26px;
      transition: left .2s linear;
      pointer-events:none;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,.75));
    }
    .timerBadge{
      min-width: 98px;
      text-align:center;
      padding: 10px 14px;
      border-radius: 6px;
      background: var(--green);
      color:#fff;
      font-weight:900;
      font-variant-numeric: tabular-nums;
      font-size: 18px;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    }

    /* gallery */
    .gallery{
      display:grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin: 8px 0 14px;
    }
    .tile{
      border:2px solid var(--blueBorder);
      border-radius:2px;
      height:96px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .tile img{
      width:108px;
      height:84px;
      object-fit:contain;
      cursor: zoom-in;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* options */
    .options{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px 22px;
      margin-top: 10px;
    }
    .option{
      display:flex;
      align-items:center;
      gap: 12px;
    }
    .letter{
      width:40px;
      height:40px;
      border-radius:999px;
      background:#ececec;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:#666;
      user-select:none;
      border: 2px solid #e3e3e3;
      cursor:pointer;
      flex:0 0 auto;
    }
    .card{
      flex:1;
      height:92px;
      border-radius:6px;
      background: var(--card);
      display:flex;
      align-items:center;
      justify-content:center;
      position:relative;
      border: 2px solid var(--cardBorder);
      overflow:hidden;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:4px;
      background: rgba(255,255,255,0.22);
      pointer-events:none;
    }
    .card img{
      width:118px;
      height:84px;
      z-index:1;
      cursor: zoom-in;
      user-select:none;
      -webkit-user-drag:none;
    }
    .option.selected .letter{
      color:#fff;
      background:var(--greenDeep);
      border-color:var(--greenDeep);
    }
    .option.selected .card{
      border-color:var(--greenDeep);
      box-shadow: 0 0 0 2px rgba(70,161,39,.18);
    }

    /* actions */
    .actions{
      display:flex;
      gap:10px;
      margin-top: 10px;
      flex-wrap:wrap;
    }
    .btn{
      border:0;
      border-radius:8px;
      padding:10px 16px;
      cursor:pointer;
      font-weight:900;
      user-select:none;
    }
    .btnPrimary{ background: var(--greenDeep); color:#fff; }
    .btnGhost{ background:#f3f3f3; color:#222; border:1px solid #e5e5e5; }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }

    /* results */
    .panel{
      margin-top:16px;
      border:1px solid #e8e8e8;
      border-radius:12px;
      padding:14px;
      background:#fff;
    }
    .panel h2{ margin:0 0 10px; font-size:18px; }
    .summary{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      font-weight:900;
    }
    .summary .box{
      padding:10px 12px;
      border:1px solid #e9e9e9;
      border-radius:10px;
      background:#fafafa;
      font-variant-numeric: tabular-nums;
    }
    .wrongItem{
      display:grid;
      grid-template-columns: 360px 1fr;
      gap:14px;
      padding:12px;
      border:1px solid #ededed;
      border-radius:12px;
      margin-top:12px;
      background:#fff;
    }
    .snap{
      border:1px solid #e6e6e6;
      border-radius:10px;
      overflow:hidden;
      background:#fff;
    }
    .snap img{ width:100%; display:block; cursor: zoom-in; }
    .explain{
      font-size:14px;
      line-height:1.65;
      color:#222;
      white-space:pre-line;
    }
    .miniRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .tag{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:#f3f3f3;
      border:1px solid #e6e6e6;
      font-weight:800;
    }

    /* lightbox */
    .lightbox{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 28px;
      z-index:999;
    }
    .lightbox.open{display:flex;}
    .lightboxPanel{
      background:#fff;
      border-radius:12px;
      padding:16px;
      max-width: 860px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
      text-align:center;
    }
    .lightboxImg{
      width:100%;
      height: 520px;
      object-fit: contain;
      display:block;
      margin:0 auto;
    }
    .lightboxTip{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
    }

    .hidden{display:none!important;}

    @media (max-width: 820px){
      .gallery{ grid-template-columns: repeat(4, 1fr); }
      .wrongItem{ grid-template-columns: 1fr; }
      .timerBadge{ min-width: 90px; font-size: 16px; padding: 10px 12px; }
      .rocket{ width: 40px; height: 24px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="topRow">
      <div>
        <div class="badge">单选题</div>
        <div class="desc">
          文本内容供家长指导学生使用，正式活动中无文字。单选（题型看左上），点选选项前字母（单击图片会放大）。<b>【家长指导语：</b>
          <span class="hint">请选择一个和上面图片类别最接近的选项。</span><b>】</b>
          <span class="ruleNote">（题干12图与选项6图不重复；干扰项跨“域”选取，避免歧义）</span>
        </div>
      </div>
      <div class="meta">
        <div class="pill">题目：<span id="qCounter">1/5</span></div>
        <div class="pill">已答：<span id="answeredCounter">0</span></div>
      </div>
    </div>

    <!-- 每题倒计时2分钟：小火箭+进度条+倒计时 -->
    <div class="timeRow" aria-label="倒计时与进度">
      <div class="progressWrap" aria-label="时间进度条">
        <div id="timeFill" class="progressFill"></div>

        <!-- 小火箭 -->
        <svg id="rocket" class="rocket" viewBox="0 0 120 70" aria-hidden="true">
          <path d="M12 42c10 4 18 12 20 22-12-2-20-8-24-18 1-3 2-4 4-4z" fill="#ff9f3f"/>
          <path d="M18 38c8 2 14 8 16 16-10-2-16-6-18-14 0-1 1-2 2-2z" fill="#ffd36c"/>
          <path d="M28 44c0-18 18-32 42-32h10c16 0 30 10 30 24s-14 24-30 24H70c-24 0-42-8-42-16z"
                fill="var(--green)" stroke="#46a127" stroke-width="4" stroke-linejoin="round"/>
          <circle cx="78" cy="36" r="10" fill="#e6f6ff" stroke="#2b2b2b" stroke-opacity=".25" stroke-width="3"/>
          <path d="M110 36c8 4 10 10 8 18-8-2-14-8-16-16 2-2 4-2 8-2z" fill="var(--greenDeep)"/>
          <path d="M32 38c-8 2-12 8-12 16 8-2 12-8 12-16z" fill="var(--greenDeep)"/>
        </svg>
      </div>

      <div id="timerBadge" class="timerBadge">02:00</div>
    </div>

    <div id="gallery" class="gallery" aria-label="题干图形类别"></div>
    <div id="options" class="options" role="radiogroup" aria-label="选项"></div>

    <div class="actions">
      <button id="nextBtn" class="btn btnPrimary" disabled>下一题</button>
      <button id="restartBtn" class="btn btnGhost">重新答题（随机5题）</button>
    </div>

    <div id="resultPanel" class="panel hidden">
      <h2>结果</h2>
      <div class="summary">
        <div class="box">总题数：<span id="sumTotal">0</span></div>
        <div class="box">答对：<span id="sumCorrect">0</span></div>
        <div class="box">答错：<span id="sumWrong">0</span></div>
        <div class="box">得分：<span id="sumScore">0</span>/100</div>
      </div>
      <div id="wrongList"></div>
    </div>
  </div>

  <!-- 放大预览 -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <div class="lightboxPanel" role="dialog" aria-modal="true" aria-label="图片放大预览">
      <img id="lightboxImg" class="lightboxImg" alt="放大预览" />
      <div id="lightboxTip" class="lightboxTip">单击空白处或按 ESC 关闭</div>
    </div>
  </div>

  <script>
    /*****************************************************************
     * 1) OpenMoji（解决“黑色方框/显示不正常”）
     * - 通过 fetch SVG 转 dataURI，避免 Canvas 截图跨域污染
     *****************************************************************/
    const OPENMOJI_VERSION = "15.0.0";
    const OPENMOJI_BASE = `https://cdn.jsdelivr.net/npm/openmoji@${OPENMOJI_VERSION}/color/svg/`;

    const PLACEHOLDER = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(
      `<svg xmlns="http://www.w3.org/2000/svg" width="160" height="120" viewBox="0 0 160 120">
        <rect x="26" y="16" width="108" height="88" rx="18" fill="#f3f3f3"/>
        <circle cx="80" cy="60" r="18" fill="#e6e6e6"/>
      </svg>`
    );

    const norm = (s) => (s || "").replace(/\uFE0F/g, "");

    function emojiToCodePoints(str){
      const cps = [];
      for (const ch of str) cps.push(ch.codePointAt(0).toString(16).toUpperCase());
      return cps.join("-");
    }

    const openmojiCache = new Map(); // emoji->dataURI
    async function fetchOpenMojiDataUri(emoji){
      const variants = [emoji, norm(emoji)].filter((v,i,a)=>a.indexOf(v)===i);
      for(const em of variants){
        const code = emojiToCodePoints(em);
        const url = `${OPENMOJI_BASE}${code}.svg`;
        try{
          const res = await fetch(url, { cache:"force-cache" });
          if(!res.ok) continue;
          const svgText = await res.text();
          return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svgText);
        }catch(e){}
      }
      return PLACEHOLDER;
    }

    async function ensureSrc(icon){
      if(icon.src) return icon.src;
      if(openmojiCache.has(icon.emoji)){
        icon.src = openmojiCache.get(icon.emoji);
        return icon.src;
      }
      const uri = await fetchOpenMojiDataUri(icon.emoji);
      openmojiCache.set(icon.emoji, uri);
      icon.src = uri;
      return uri;
    }

    /*****************************************************************
     * 2) 题库：更多主题 + 域(domain)划分
     *****************************************************************/
    const LETTERS = ["A","B","C","D","E","F"];
    const QUIZ_COUNT = 5;

    // domain: food / animals / nature / objects / transport / activity / abstract
    const bank = {
      cats: [
        { id:"fruit",       name:"水果",        domain:"food",      items:["🍎","🍐","🍊","🍋","🍌","🍉","🍇","🍓","🫐","🍒","🥭","🍍","🥝","🍑","🍈","🍏","🥥","🫒"] },
        { id:"vegetable",   name:"蔬菜",        domain:"food",      items:["🥦","🥬","🥒","🌶️","🫑","🌽","🥕","🧅","🧄","🥔","🍆","🍄","🫛","🫘","🫚","🍠","🥑"] },
        { id:"dessert",     name:"甜品/零食",   domain:"food",      items:["🍩","🍪","🎂","🧁","🍰","🍫","🍬","🍭","🍿","🍦","🍨","🍧","🍡","🍮","🥨","🥐","🥞","🧇","🍯"] },
        { id:"drinks",      name:"饮品",        domain:"food",      items:["🥛","☕","🍵","🧃","🧋","🥤","🍶","🍺","🍻","🍷","🍸","🍹","🥂","🧉","🫖","🧊","🍾"] },
        { id:"meals",       name:"主食/餐食",   domain:"food",      items:["🍕","🍔","🌭","🍟","🌮","🌯","🥙","🧆","🍝","🍜","🍣","🍱","🍛","🍲","🥘","🍳","🥟","🥪","🍙","🫔"] },
        { id:"kitchenware", name:"厨房用具",    domain:"food",      items:["🍽️","🥄","🍴","🔪","🥢","🥣","🧂","🫙","🥫","🫕","🥡","🧽","🧼","🧴"] },

        { id:"mammals",     name:"动物(哺乳类)", domain:"animals",  items:["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🦁","🐯","🐮","🐷","🐵","🐨","🐴","🦄","🦓","🦌","🦝","🐺"] },
        { id:"sea",         name:"海洋动物",    domain:"animals",   items:["🐟","🐠","🐡","🦈","🐳","🐬","🐙","🦑","🦀","🦞","🦐","🐚","🪼","🦭","🐢","🦦","🪸"] },
        { id:"birds",       name:"鸟类",        domain:"animals",   items:["🐦","🐧","🦉","🦅","🦆","🦢","🦜","🐓","🐤","🐣","🐥","🕊️","🦩","🦚","🪿"] },
        { id:"insects",     name:"昆虫",        domain:"animals",   items:["🐛","🦋","🐝","🐞","🦟","🪰","🪳","🕷️","🕸️","🦂","🐜","🦗","🪱","🪲"] },

        { id:"plants",      name:"植物/花朵",   domain:"nature",    items:["🌸","🌼","🌻","🌺","🌹","🪷","🪻","🌷","🌱","🌿","☘️","🍀","🍃","🌾","🌵","🎋","🌳","🌲","🪴","🌴"] },
        { id:"weather",     name:"天气/自然",   domain:"nature",    items:["☀️","🌤️","⛅","🌥️","☁️","🌦️","🌧️","⛈️","🌩️","❄️","🌨️","🌪️","🌫️","🌈","🌙","🌊","🔥","💧","🌬️","⛄"] },

        { id:"stationery",  name:"文具",        domain:"objects",   items:["✏️","🖊️","🖋️","✒️","📝","📓","📒","📔","📕","📗","📘","📙","📚","📎","🖇️","📌","📍","📏","📐","✂️","🗂️","🗄️"] },
        { id:"school",      name:"学校用品",    domain:"objects",   items:["🎒","🏫","🎓","🚌","📚","📖","🧮","🔔","🗓️","⏰","🖍️","🧾","📐","📏","🏅","📢"] },
        { id:"electronics", name:"电子产品",    domain:"objects",   items:["📱","💻","🖥️","⌨️","🖱️","🖨️","📷","📸","🎥","📹","📻","🎧","🔋","🔌","🕹️","📟","📡","💡"] },
        { id:"home",        name:"家具/家居",   domain:"objects",   items:["🛋️","🛏️","🪑","🚪","🪟","🛁","🚿","🚽","🪞","🕯️","💡","🔦","🧹","🧺","🧻","🧼","🧽","🧯","📺","🕰️"] },
        { id:"clothes",     name:"服饰/配饰",   domain:"objects",   items:["👕","👖","👗","👔","👚","🧥","🧦","🧤","🧣","👟","👞","👠","👡","🥾","👒","🎩","🧢","👓","🕶️","🧳","⌚"] },

        { id:"vehicles",    name:"交通工具",    domain:"transport", items:["🚗","🚕","🚌","🚎","🚓","🚑","🚒","🚐","🚚","🚛","🚜","🏍️","🚲","🛵","🚂","🚆","✈️","🚁","🚀","🛳️"] },
        { id:"tools",       name:"工程/工具",   domain:"transport", items:["🏗️","🚧","🧱","🪵","🪚","🪛","🔧","🔨","⛏️","🪓","🧰","🛠️","🪜","🧲","🧯","🔩","📦"] },

        { id:"sports",      name:"运动/球类",   domain:"activity",  items:["⚽️","🏀","🏈","⚾️","🎾","🏐","🏉","🎱","🏓","🏸","🥅","⛳️","🥊","🥋","🛹","⛸️","🎣","🏊","🏃","🚴"] },
        { id:"music",       name:"乐器/音乐",   domain:"activity",  items:["🎸","🎹","🥁","🎺","🎻","🎷","🪗","🪕","🪈","📯","🎤","🎼","🎵","🎶","🔊"] },

        { id:"shapes",      name:"几何图形",    domain:"abstract",  items:["🔴","🟠","🟡","🟢","🔵","🟣","⚫","⚪","🟤","🔺","🔻","🔶","🔷","⬛","⬜","🟥","🟧","🟨","🟩","🟦","🟪"] },
        { id:"faces",       name:"表情",        domain:"abstract",  items:["😀","😃","😄","😁","😆","😅","😂","🤣","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😋","😛","🤪","🤨","🧐","😎","😭","😡"] }
      ]
    };

    // distractor domains: ensure "far" domains to reduce ambiguity
    const allowedDomainsMap = {
      food:      ["transport","abstract","objects","animals"],
      animals:   ["transport","abstract","objects","food"],
      nature:    ["transport","abstract","objects","food"], // 不从 animals 里取，避免“自然/动物”泛化歧义
      objects:   ["animals","food","transport","abstract"],
      transport: ["animals","food","objects","abstract"],
      activity:  ["animals","food","objects","transport","abstract"],
      abstract:  ["animals","food","objects","transport"]
    };

    // Build icon list (norm unique per category)
    function buildIconBank(){
      const icons = [];
      for(const cat of bank.cats){
        const uniq = Array.from(new Map(cat.items.map(x=>[norm(x), x])).values());
        for(let i=0;i<uniq.length;i++){
          icons.push({
            id: `${cat.id}_${i+1}`,
            catId: cat.id,
            catName: cat.name,
            domain: cat.domain,
            emoji: uniq[i],
            src: null
          });
        }
      }
      return icons;
    }
    const ICONS = buildIconBank();

    function shuffle(arr){
      const a = arr.slice();
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }
    const sample = (arr,n)=>shuffle(arr).slice(0,n);

    // strong rules:
    // - examples 12 unique
    // - options 6 unique
    // - options and examples no overlap
    // - distractors from far domains (no ambiguity)
    function makeQuiz(count=QUIZ_COUNT, maxTry=120){
      const chosenCats = sample(bank.cats, Math.min(count, bank.cats.length));

      return chosenCats.map((cat, idx)=>{
        const themeIcons = ICONS.filter(x=>x.catId === cat.id);
        if(themeIcons.length < 13) throw new Error(`主题「${cat.name}」数量不足（至少13个）`);

        const allowedDomains = allowedDomainsMap[cat.domain] || ["transport","abstract","objects","animals","food","nature","activity"].filter(d=>d!==cat.domain);

        // candidate distractors pool: only far domains
        const farIconsAll = ICONS.filter(x => allowedDomains.includes(x.domain));

        for(let attempt=0; attempt<maxTry; attempt++){
          // 1) pick 12 examples unique by norm
          const forbid = new Set();
          const examples = [];
          for(const ic of shuffle(themeIcons)){
            const k = norm(ic.emoji);
            if(forbid.has(k)) continue;
            forbid.add(k);
            examples.push(ic);
            if(examples.length === 12) break;
          }
          if(examples.length < 12) continue;

          // 2) correct not in examples
          const correctPool = themeIcons.filter(ic => !forbid.has(norm(ic.emoji)));
          if(correctPool.length === 0) continue;
          const correctIcon = sample(correctPool, 1)[0];
          forbid.add(norm(correctIcon.emoji));

          // 3) pick 5 distractors from far domains, not overlapping
          const distractors = [];
          for(const ic of shuffle(farIconsAll)){
            if(distractors.length === 5) break;
            const k = norm(ic.emoji);
            if(forbid.has(k)) continue;
            forbid.add(k);
            distractors.push(ic);
          }
          if(distractors.length < 5) continue;

          // 4) options
          const options = shuffle([correctIcon, ...distractors]).map((icon, i)=>({
            letter: LETTERS[i],
            icon
          }));
          const optSet = new Set(options.map(o=>norm(o.icon.emoji)));
          if(optSet.size !== 6) continue;

          // verify no overlap
          const exSet = new Set(examples.map(e=>norm(e.emoji)));
          const overlap = [...optSet].some(k => exSet.has(k));
          if(overlap) continue;

          const correctLetter = options.find(o=>o.icon===correctIcon).letter;

          return {
            index: idx,
            catId: cat.id,
            catName: cat.name,
            domain: cat.domain,
            examples,
            options,
            correctLetter,
            correctIcon,
            userLetter: null,
            snapshotPng: null,
            explanation: null
          };
        }

        throw new Error(`主题「${cat.name}」在当前规则下无法生成题目，请扩充该主题或放宽无歧义域规则。`);
      });
    }

    /*****************************************************************
     * 3) 每题倒计时2分钟（切换新题自动重置；不会全卷共用）
     *****************************************************************/
    const TOTAL_SECONDS = 120;
    let remaining = TOTAL_SECONDS;
    let timer = null;

    function fmtTime(s){
      const mm = String(Math.floor(s/60)).padStart(2,"0");
      const ss = String(s%60).padStart(2,"0");
      return `${mm}:${ss}`;
    }
    function updateTimeUI(){
      document.getElementById("timerBadge").textContent = fmtTime(remaining);
      const elapsed = TOTAL_SECONDS - remaining;
      const pct = Math.max(0, Math.min(100, (elapsed / TOTAL_SECONDS) * 100));
      document.getElementById("timeFill").style.width = `${pct}%`;
      document.getElementById("rocket").style.left = `${pct}%`;
    }
    function stopTimer(){
      if(timer){ clearInterval(timer); timer = null; }
    }

    // 每进入一题就调用：重置到 02:00
    function startTimer(){
      stopTimer();
      remaining = TOTAL_SECONDS;
      updateTimeUI();

      const thisQi = qi; // 防止旧计时器回调影响新题
      timer = setInterval(async ()=>{
        remaining = Math.max(0, remaining - 1);
        updateTimeUI();
        if(remaining === 0){
          stopTimer();
          if(locked) return;
          if(thisQi !== qi) return;
          await handleTimeout(); // 本题超时处理
        }
      }, 1000);
    }

    async function handleTimeout(){
      const q = quiz[qi];
      if(!q) return;

      q.explanation = buildExplanation(q);
      try{ q.snapshotPng = await captureQuestionPng(q); }catch(e){ q.snapshotPng = ""; }

      if(qi < quiz.length - 1){
        qi++;
        await renderQuestion(); // renderQuestion 内会重置计时
      }else{
        await finalizeQuiz(true);
      }
    }

    /*****************************************************************
     * 4) 截图（Canvas生成PNG）
     *****************************************************************/
    function loadImage(src){
      return new Promise((resolve, reject)=>{
        const img = new Image();
        img.onload = ()=>resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }
    function drawRoundRect(ctx, x,y,w,h,r, fill, stroke){
      const rr = Math.min(r, w/2, h/2);
      ctx.beginPath();
      ctx.moveTo(x+rr,y);
      ctx.arcTo(x+w,y,x+w,y+h,rr);
      ctx.arcTo(x+w,y+h,x,y+h,rr);
      ctx.arcTo(x,y+h,x,y,rr);
      ctx.arcTo(x,y,x+w,y,rr);
      ctx.closePath();
      if(fill){ ctx.fillStyle = fill; ctx.fill(); }
      if(stroke){ ctx.strokeStyle = stroke; ctx.lineWidth=2; ctx.stroke(); }
    }
    function drawContain(ctx, img, x,y,w,h){
      const iw = img.width, ih = img.height;
      const s = Math.min(w/iw, h/ih);
      const nw = iw*s, nh = ih*s;
      ctx.drawImage(img, x+(w-nw)/2, y+(h-nh)/2, nw, nh);
    }

    async function captureQuestionPng(q){
      await Promise.all([
        ...q.examples.map(ensureSrc),
        ...q.options.map(o=>ensureSrc(o.icon))
      ]);

      const W = 900, H = 560;
      const canvas = document.createElement("canvas");
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,W,H);

      ctx.fillStyle = "#222";
      ctx.font = "bold 20px system-ui";
      ctx.fillText(`单选题  第${q.index+1}题`, 34, 34);
      ctx.font = "bold 16px system-ui";
      ctx.fillText(`请选择一个和上面图片类别最接近的选项。`, 34, 58);

      const exampleImgs = await Promise.all(q.examples.map(e=>loadImage(e.src)));
      const optImgs = await Promise.all(q.options.map(o=>loadImage(o.icon.src)));

      const gx = 34, gy = 78;
      const tileW = 130, tileH = 90, gap = 10;
      for(let i=0;i<12;i++){
        const r = Math.floor(i/6), c = i%6;
        const x = gx + c*(tileW+gap);
        const y = gy + r*(tileH+gap);
        ctx.strokeStyle = "#5d7cff";
        ctx.lineWidth = 2;
        ctx.strokeRect(x,y,tileW,tileH);
        drawContain(ctx, exampleImgs[i], x+10, y+8, tileW-20, tileH-16);
      }

      const oxL = 34, oxR = 470;
      const oy = 290;
      const rowH = 112;
      const letterR = 20;
      const cardW = 360, cardH = 90;

      const positions = [
        {letter:"A", col:0,row:0},{letter:"B", col:1,row:0},
        {letter:"C", col:0,row:1},{letter:"D", col:1,row:1},
        {letter:"E", col:0,row:2},{letter:"F", col:1,row:2}
      ];
      const letterToIdx = Object.fromEntries(q.options.map((o, idx)=>[o.letter, idx]));

      positions.forEach(p=>{
        const x0 = (p.col===0?oxL:oxR);
        const y0 = oy + p.row*rowH;

        ctx.fillStyle = "#ececec";
        ctx.beginPath();
        ctx.arc(x0+letterR, y0+letterR, letterR, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = "#e3e3e3";
        ctx.stroke();

        ctx.fillStyle = "#666";
        ctx.font = "bold 16px system-ui";
        ctx.fillText(p.letter, x0+letterR-6, y0+letterR+6);

        const cardX = x0 + 52;
        const cardY = y0 - 3;
        drawRoundRect(ctx, cardX, cardY, cardW, cardH, 10, "#efefef", "#e7e7e7");
        drawRoundRect(ctx, cardX+10, cardY+10, cardW-20, cardH-20, 8, "rgba(255,255,255,0.18)", null);

        const idx = letterToIdx[p.letter];
        drawContain(ctx, optImgs[idx], cardX+120, cardY+8, 120, 74);
      });

      return canvas.toDataURL("image/png");
    }

    /*****************************************************************
     * 5) 解析 + 结果
     *****************************************************************/
    function buildExplanation(q){
      const chosen = q.options.find(o=>o.letter===q.userLetter);
      return [
        `【类别判断】上方示例都属于「${q.catName}」。`,
        `【正确答案】${q.correctLetter}`,
        `【你的选择】${q.userLetter ?? "未作答"}`,
        `【无歧义】干扰项从不同“域”（如食物/动物/交通/抽象等）选取，避免相近类别。`,
        chosen && chosen.letter !== q.correctLetter
          ? `【为什么错】你选的选项不属于该类别。`
          : `【提示】本题考查“按主题归类”。`
      ].join("\n");
    }

    function renderResults(){
      const total = quiz.length;
      const correct = quiz.filter(q=>q.userLetter===q.correctLetter).length;
      const wrong = total - correct;
      const score = Math.round((correct/total)*100);

      document.getElementById("sumTotal").textContent = total;
      document.getElementById("sumCorrect").textContent = correct;
      document.getElementById("sumWrong").textContent = wrong;
      document.getElementById("sumScore").textContent = score;

      const elWrongList = document.getElementById("wrongList");
      elWrongList.innerHTML = "";
      const wrongQs = quiz.filter(q=>q.userLetter!==q.correctLetter);

      if(wrongQs.length===0){
        const div = document.createElement("div");
        div.className = "panel";
        div.innerHTML = `<b>全部答对。</b>`;
        elWrongList.appendChild(div);
      }else{
        wrongQs.forEach(q=>{
          const item = document.createElement("div");
          item.className = "wrongItem";

          const snap = document.createElement("div");
          snap.className = "snap";
          const img = document.createElement("img");
          img.src = q.snapshotPng || "";
          img.alt = `第${q.index+1}题截图`;
          img.addEventListener("click", ()=> openLightbox(img.src, img.alt));
          snap.appendChild(img);

          const ex = document.createElement("div");
          ex.className = "explain";
          ex.innerHTML = `
<div class="miniRow">
  <span class="tag">第${q.index+1}题</span>
  <span class="tag">类别：${q.catName}</span>
  <span class="tag">你的答案：${q.userLetter ?? "未作答"}</span>
  <span class="tag">正确答案：${q.correctLetter}</span>
</div>
${q.explanation || buildExplanation(q)}
          `.trim();

          item.appendChild(snap);
          item.appendChild(ex);
          elWrongList.appendChild(item);
        });
      }

      document.getElementById("resultPanel").classList.remove("hidden");
      document.getElementById("resultPanel").scrollIntoView({behavior:"smooth", block:"start"});
    }

    /*****************************************************************
     * 6) UI 渲染（图片）+ 流程
     *****************************************************************/
    const elGallery = document.getElementById("gallery");
    const elOptions = document.getElementById("options");
    const nextBtn = document.getElementById("nextBtn");

    let quiz = [];
    let qi = 0;
    let locked = false;

    function openLightbox(src, caption){
      document.getElementById("lightboxImg").src = src;
      document.getElementById("lightboxTip").textContent = caption || "单击空白处或按 ESC 关闭";
      const lb = document.getElementById("lightbox");
      lb.classList.add("open");
      lb.setAttribute("aria-hidden","false");
    }
    function closeLightbox(){
      const lb = document.getElementById("lightbox");
      lb.classList.remove("open");
      lb.setAttribute("aria-hidden","true");
      document.getElementById("lightboxImg").src = "";
    }
    document.getElementById("lightbox").addEventListener("click", (e)=>{ if(e.target.id==="lightbox") closeLightbox(); });
    window.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeLightbox(); });

    async function renderQuestion(){
      const q = quiz[qi];

      document.getElementById("resultPanel").classList.add("hidden");
      document.getElementById("qCounter").textContent = `${qi+1}/${quiz.length}`;
      document.getElementById("answeredCounter").textContent = `${quiz.filter(x=>x.userLetter!==null).length}`;

      // placeholder first
      elGallery.innerHTML = "";
      q.examples.forEach((icon, idx)=>{
        const tile = document.createElement("div");
        tile.className = "tile";
        const img = document.createElement("img");
        img.src = icon.src || PLACEHOLDER;
        img.alt = `示例${idx+1}`;
        img.addEventListener("click", ()=> openLightbox(img.src, `示例${idx+1}（${q.catName}）`));
        tile.appendChild(img);
        elGallery.appendChild(tile);
      });

      elOptions.innerHTML = "";
      q.options.forEach(opt=>{
        const wrap = document.createElement("div");
        wrap.className = "option" + (q.userLetter===opt.letter ? " selected" : "");
        wrap.dataset.letter = opt.letter;

        const letter = document.createElement("div");
        letter.className = "letter";
        letter.textContent = opt.letter;
        letter.addEventListener("click", ()=>{
          if(locked) return;
          q.userLetter = opt.letter;
          Array.from(elOptions.querySelectorAll(".option")).forEach(o=>{
            o.classList.toggle("selected", o.dataset.letter===q.userLetter);
          });
          nextBtn.disabled = false;
        });

        const card = document.createElement("div");
        card.className = "card";
        const img = document.createElement("img");
        img.src = opt.icon.src || PLACEHOLDER;
        img.alt = `${opt.letter}选项`;
        img.addEventListener("click", (e)=>{
          e.stopPropagation();
          openLightbox(img.src, `${opt.letter} 选项（${opt.icon.catName}）`);
        });

        card.appendChild(img);
        wrap.appendChild(letter);
        wrap.appendChild(card);
        elOptions.appendChild(wrap);
      });

      nextBtn.textContent = (qi === quiz.length-1) ? "提交并查看结果" : "下一题";
      nextBtn.disabled = locked || (q.userLetter === null);

      // load OpenMoji for this question
      await Promise.all([
        ...q.examples.map(ensureSrc),
        ...q.options.map(o=>ensureSrc(o.icon))
      ]);

      // update imgs
      Array.from(elGallery.querySelectorAll("img")).forEach((img, i)=> img.src = q.examples[i].src);
      Array.from(elOptions.querySelectorAll(".option")).forEach(optEl=>{
        const letter = optEl.dataset.letter;
        const opt = q.options.find(o=>o.letter===letter);
        optEl.querySelector("img").src = opt.icon.src;
      });

      // ★ 每次进入新题：重置并开始计时
      if(!locked) startTimer();
    }

    async function finalizeQuiz(byTimeout){
      if(locked) return;
      locked = true;
      stopTimer();
      nextBtn.disabled = true;

      for(const q of quiz){
        if(!q.explanation) q.explanation = buildExplanation(q);
        if(!q.snapshotPng){
          try{ q.snapshotPng = await captureQuestionPng(q); }catch(e){ q.snapshotPng = ""; }
        }
      }
      renderResults();
    }

    async function handleNext(){
      if(locked) return;
      const q = quiz[qi];
      if(!q || q.userLetter === null) return;

      // 点击下一题时停止当前题计时，避免切题/截图期间继续扣时间
      stopTimer();

      q.explanation = buildExplanation(q);
      try{ q.snapshotPng = await captureQuestionPng(q); }catch(e){ q.snapshotPng = ""; }

      if(qi < quiz.length-1){
        qi++;
        await renderQuestion(); // renderQuestion 内会重置计时
      }else{
        await finalizeQuiz(false);
      }
    }

    async function startNewQuiz(){
      locked = false;
      stopTimer();

      quiz = makeQuiz(QUIZ_COUNT);
      qi = 0;

      document.getElementById("wrongList").innerHTML = "";
      document.getElementById("resultPanel").classList.add("hidden");

      await renderQuestion(); // renderQuestion 内会启动/重置计时
    }

    nextBtn.addEventListener("click", ()=>handleNext());
    document.getElementById("restartBtn").addEventListener("click", ()=>startNewQuiz());

    // init
    updateTimeUI();
    startNewQuiz();
  </script>
</body>
