<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OpenMoji 图片规律模拟题（iPad修复版）</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0}
    body{
      font-family:"Microsoft YaHei", Arial, sans-serif;
      background:#eef7e8;
      color:#222;
      user-select:none;
      -webkit-user-select:none;
      overflow:hidden;
      touch-action:manipulation;
    }
    .page{
      width:100vw;
      height:100vh;
      display:none;
      padding:20px 16px 28px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }
    .page.active{display:block}
    .wrap{
      max-width:1180px;
      margin:0 auto;
      text-align:center;
    }
    .panel{
      background:#ffffff;
      border-radius:18px;
      padding:18px 12px 24px;
      box-shadow:0 2px 12px rgba(97,122,89,.10);
      margin-bottom:22px;
    }
    h2{
      margin:0 0 12px;
      font-size:20px;
      line-height:1.6;
      font-weight:400;
      padding:0 12px;
      color:#364133;
    }
    .qno{
      font-size:20px;
      font-weight:600;
      margin-bottom:6px;
      color:#3d4a39;
    }

    .board{
      display:grid;
      grid-template-columns:repeat(3, 180px);
      gap:18px;
      justify-content:center;
      margin:16px auto 10px;
    }
    .big{
      width:180px;
      height:180px;
      background:#fff;
      border:3px solid #2f352d;
      position:relative;
    }
    .big::before{
      content:"";
      position:absolute;
      left:50%;
      top:8px;
      bottom:8px;
      border-left:2px dashed #9aa596;
      transform:translateX(-1px);
    }
    .big::after{
      content:"";
      position:absolute;
      top:50%;
      left:8px;
      right:8px;
      border-top:2px dashed #9aa596;
      transform:translateY(-1px);
    }
    .slot{
      position:absolute;
      width:64px;
      height:64px;
      transform:translate(-50%,-50%);
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }
    .tl{left:45px;top:45px}
    .tr{left:135px;top:45px}
    .bl{left:45px;top:135px}
    .br{left:135px;top:135px}

    .qmark{
      font-size:40px;
      font-weight:700;
      color:#111;
      line-height:1;
    }
    .qmark sub{
      font-size:17px;
      vertical-align:sub;
    }

    .green-btn{
      display:inline-block;
      min-width:170px;
      padding:13px 28px;
      border:none;
      border-radius:12px;
      background:#47ad61;
      color:#fff;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 4px 10px rgba(71,173,97,.24);
      margin:10px 8px 0;
    }
    .green-btn:hover{background:#3f9c56}

    .title-tag{
      display:inline-block;
      background:#e2f2df;
      color:#2f8f3a;
      font-size:20px;
      font-weight:700;
      padding:8px 16px;
      border-radius:8px;
      margin:6px 0 16px;
    }

    .answer-row{
      display:grid;
      grid-template-columns:repeat(4, 112px);
      gap:18px;
      justify-content:center;
      margin:8px 0 18px;
    }
    .answer-box{
      width:112px;
      height:112px;
      background:#fff;
      border:3px solid #d6ddd2;
      border-radius:12px;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .answer-box .index{
      position:absolute;
      left:8px;
      top:6px;
      font-size:19px;
      font-weight:700;
      color:#5c6858;
      pointer-events:none;
    }
    .answer-box.drag-over{
      border-color:#49b96b;
      box-shadow:0 0 0 4px rgba(73,185,107,.16) inset;
      background:#fbfffc;
    }

    .options{
      display:grid;
      grid-template-columns:repeat(5, 112px);
      gap:16px;
      justify-content:center;
      margin-top:4px;
    }
    .opt{
      width:112px;
      height:112px;
      background:#fff;
      border:2px solid #dde5d8;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 1px 3px rgba(0,0,0,.04);
      position:relative;
      touch-action:none;
    }

    .result-card{
      background:#fff;
      border-radius:18px;
      padding:22px 16px 28px;
      box-shadow:0 2px 10px rgba(97,122,89,.10);
    }
    .score{
      font-size:28px;
      font-weight:700;
      color:#2f8f3a;
      margin-bottom:18px;
    }
    .wrong-block{
      text-align:left;
      border:1px solid #e5ebe1;
      border-radius:12px;
      padding:18px 14px;
      margin:16px auto;
      max-width:980px;
      background:#fcfefb;
    }
    .wrong-title{
      font-size:18px;
      font-weight:700;
      margin-bottom:8px;
      color:#3b4638;
    }
    .wrong-text{
      line-height:1.9;
      color:#465042;
      font-size:15px;
      margin-bottom:14px;
    }

    .emoji-wrap{
      width:64px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }

    /* 关键修复：transform 直接作用到 img，自带 Safari 兼容参数 */
    .emoji-img{
      width:54px;
      height:54px;
      object-fit:contain;
      display:block;
      user-drag:none;
      -webkit-user-drag:none;
      pointer-events:none;
      transform-origin:center center;
      -webkit-transform-origin:center center;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      will-change:transform;
      image-rendering:auto;
    }

    .blankpic{
      width:60px;
      height:60px;
      position:relative;
      background:#fff;
      border:3px solid #d3d3d3;
    }
    .blankpic svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .clone{pointer-events:none}
    .drag-ghost{
      position:fixed;
      left:0;
      top:0;
      width:88px;
      height:88px;
      margin-left:-44px;
      margin-top:-44px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#fff;
      border:2px solid #dfe8df;
      border-radius:14px;
      box-shadow:0 8px 18px rgba(0,0,0,.16);
      pointer-events:none;
      z-index:9999;
    }
    .hidden{display:none !important}

    @media (max-width:1024px){
      .wrap{max-width:980px}
      h2{font-size:18px}
      .qno{font-size:18px}
      .board{
        grid-template-columns:repeat(3, 160px);
        gap:14px;
      }
      .big{width:160px;height:160px}
      .tl{left:40px;top:40px}
      .tr{left:120px;top:40px}
      .bl{left:40px;top:120px}
      .br{left:120px;top:120px}
      .answer-row{
        grid-template-columns:repeat(4, 100px);
        gap:14px;
      }
      .answer-box{width:100px;height:100px}
      .options{
        grid-template-columns:repeat(5, 100px);
        gap:14px;
      }
      .opt{width:100px;height:100px}
      .green-btn{
        font-size:20px;
        min-width:160px;
      }
    }

    @media (max-width:820px){
      .page{padding:16px 10px 24px}
      .board{
        grid-template-columns:repeat(3, 144px);
        gap:10px;
      }
      .big{width:144px;height:144px}
      .big::before{top:6px;bottom:6px}
      .big::after{left:6px;right:6px}
      .tl{left:36px;top:36px}
      .tr{left:108px;top:36px}
      .bl{left:36px;top:108px}
      .br{left:108px;top:108px}
      .slot{width:56px;height:56px}
      .answer-row{
        grid-template-columns:repeat(4, 88px);
        gap:10px;
      }
      .answer-box{width:88px;height:88px}
      .options{
        grid-template-columns:repeat(5, 88px);
        gap:10px;
      }
      .opt{width:88px;height:88px}
      .green-btn{
        min-width:150px;
        font-size:18px;
        padding:11px 22px;
      }
      .title-tag{font-size:18px}
      h2{font-size:17px}
      .emoji-img{width:48px;height:48px}
      .blankpic{transform:scale(.9)}
    }
  </style>
</head>
<body>

  <section class="page active" id="questionOnlyPage">
    <div class="wrap">
      <div class="panel">
        <div class="qno" id="qnoText"></div>
        <h2>观察每一行前两个田字格的变化规律，选择合适的图形填入后面的问号位置。</h2>
        <div id="questionOnlyArea"></div>
        <button class="green-btn" id="chooseBtn">请选择</button>
      </div>
    </div>
  </section>

  <section class="page" id="answerOnlyPage">
    <div class="wrap">
      <div class="panel">
        <div class="qno" id="answerQnoText"></div>
        <div class="title-tag">作答区</div>
        <div class="answer-row">
          <div class="answer-box" data-slot="tl"><span class="index">1</span></div>
          <div class="answer-box" data-slot="tr"><span class="index">2</span></div>
          <div class="answer-box" data-slot="bl"><span class="index">3</span></div>
          <div class="answer-box" data-slot="br"><span class="index">4</span></div>
        </div>

        <div class="title-tag">选项区</div>
        <div class="options" id="optionsArea"></div>

        <button class="green-btn" id="nextBtn">下一题</button>
      </div>
    </div>
  </section>

  <section class="page" id="resultPage">
    <div class="wrap">
      <div class="result-card">
        <div class="score" id="scoreText"></div>
        <div id="wrongList"></div>
        <button class="green-btn" id="retryBtn">重新答题</button>
      </div>
    </div>
  </section>

  <div id="dragGhost" class="drag-ghost hidden"></div>

  <script>
    const OPENMOJI = {
      fox: '1F98A',
      dog: '1F436',
      tiger: '1F405',
      rabbit: '1F430',
      bear: '1F43B',
      frog: '1F438',
      monkey: '1F435',
      owl: '1F989',
      penguin: '1F427',
      chick: '1F424',
      duck: '1F986',
      rooster: '1F413',
      strawberry: '1F353',
      pear: '1F350',
      apple: '1F34E',
      orange: '1F34A',
      lemon: '1F34B',
      banana: '1F34C',
      grapes: '1F347',
      peach: '1F351',
      cherry: '1F352',
      pineapple: '1F34D',
      watermelon: '1F349',
      carrot: '1F955',
      corn: '1F33D',
      mushroom: '1F344',
      cupcake: '1F9C1',
      donut: '1F369',
      candy: '1F36C',
      cookie: '1F36A',
      icecream: '1F366',
      lollipop: '1F36D',
      flower: '1F338',
      tulip: '1F337',
      sunflower: '1F33B',
      blossom: '1F33C',
      rose: '1F339',
      leaf: '1F343',
      cactus: '1F335',
      bicycle: '1F6B2',
      car: '1F697',
      bus: '1F68C',
      train: '1F686',
      ship: '1F6A2',
      rocket: '1F680',
      backpack: '1F392',
      book: '1F4D5',
      books: '1F4DA',
      pencil: '270F',
      ruler: '1F4CF',
      scissors: '2702',
      umbrella: '2602'
    };

    const ICONS = Object.keys(OPENMOJI);
    const POS = ['tl','tr','bl','br'];

    const ASYMMETRIC_TRANSFORMS = [
      '',
      'scale(0.58)',
      'scale(1.30)',
      'scaleX(-1)',
      'scaleY(-1)',
      'rotate(90deg)',
      'rotate(180deg)',
      'rotate(270deg)'
    ];

    const SYMMETRIC_TRANSFORMS = [
      '',
      'scale(0.58)',
      'scale(1.30)'
    ];

    const ASYMMETRIC_ICONS = new Set([
      'fox','dog','rabbit','duck','rooster','penguin','owl','monkey',
      'carrot','corn','mushroom','cupcake','icecream','lollipop',
      'leaf','cactus',
      'bicycle','car','bus','train','ship','rocket',
      'backpack','book','books','pencil','ruler','scissors','umbrella',
      'banana','pear','pineapple'
    ]);

    let quizData = [];
    let currentIndex = 0;
    let userAnswers = [];
    let touchDragData = null;

    const questionOnlyPage = document.getElementById('questionOnlyPage');
    const answerOnlyPage = document.getElementById('answerOnlyPage');
    const resultPage = document.getElementById('resultPage');

    const qnoText = document.getElementById('qnoText');
    const answerQnoText = document.getElementById('answerQnoText');
    const questionOnlyArea = document.getElementById('questionOnlyArea');
    const optionsArea = document.getElementById('optionsArea');
    const chooseBtn = document.getElementById('chooseBtn');
    const nextBtn = document.getElementById('nextBtn');
    const scoreText = document.getElementById('scoreText');
    const wrongList = document.getElementById('wrongList');
    const dragGhost = document.getElementById('dragGhost');

    function openmojiUrl(name){
      return `https://cdn.jsdelivr.net/gh/hfg-gmuend/openmoji@master/color/72x72/${OPENMOJI[name]}.png`;
    }

    function blankPicHTML(){
      return `
        <div class="blankpic">
          <svg viewBox="0 0 60 60" aria-hidden="true">
            <circle cx="16" cy="14" r="6.5" fill="none" stroke="#bcbcbc" stroke-width="3"/>
            <path d="M10 45 L21 30 L31 37 L40 23 L50 36 L50 45 Z"
                  fill="none"
                  stroke="#bcbcbc"
                  stroke-width="3"
                  stroke-linejoin="round"
                  stroke-linecap="round"/>
          </svg>
        </div>
      `;
    }

    // 核心修复：直接给 img 写 inline transform，避免 iPad Safari class+缓存异常
    function iconHTML(name, transformValue=''){
      if(name === 'blank') return blankPicHTML();

      const style = transformValue
        ? `transform:${transformValue} translateZ(0);-webkit-transform:${transformValue} translateZ(0);`
        : `transform:translateZ(0);-webkit-transform:translateZ(0);`;

      return `
        <div class="emoji-wrap">
          <img class="emoji-img" src="${openmojiUrl(name)}" alt="${name}" loading="eager" style="${style}">
        </div>
      `;
    }

    function randomOf(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function sample(arr, n){
      const copy = [...arr];
      const out = [];
      while(out.length < n && copy.length){
        const i = Math.floor(Math.random() * copy.length);
        out.push(copy.splice(i, 1)[0]);
      }
      return out;
    }

    function shuffle(arr){
      const a = [...arr];
      for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function itemKey(item){
      return `${item.type}|${item.t || ''}`;
    }

    function getTransformsByIcon(icon){
      return ASYMMETRIC_ICONS.has(icon) ? ASYMMETRIC_TRANSFORMS : SYMMETRIC_TRANSFORMS;
    }

    function buildRow(iconPool){
      const positions = shuffle([...POS]);
      const commonPos = positions[0];
      const rest = positions.slice(1);

      const A = {};
      const B = {};
      const C = {};

      A[commonPos] = iconPool[0];
      B[commonPos] = iconPool[0];
      C[commonPos] = { type: 'blank' };

      rest.forEach((pos, idx)=>{
        const icon = iconPool[idx + 1];
        const putInA = Math.random() < 0.5;

        if(putInA){
          A[pos] = icon;
        }else{
          B[pos] = icon;
        }

        const transforms = getTransformsByIcon(icon);
        C[pos] = {
          type: icon,
          t: randomOf(transforms)
        };
      });

      return { A, B, C };
    }

    function buildQuestion(index){
      const icons1 = sample(ICONS, 4);
      const icons2 = sample(ICONS.filter(x => !icons1.includes(x)), 4);
      const icons3 = sample(ICONS.filter(x => !icons1.includes(x) && !icons2.includes(x)), 4);

      const row1 = buildRow(icons1);
      const row2 = buildRow(icons2);
      const row3 = buildRow(icons3);

      const answer = row3.C;

      const correctOptions = [
        answer.tl,
        answer.tr,
        answer.bl,
        answer.br
      ];

      const correctKeys = new Set(correctOptions.map(itemKey));
      if(correctKeys.size !== 4){
        return buildQuestion(index);
      }

      const distractors = [];
      const used = new Set([...correctKeys]);

      while(distractors.length < 6){
        const base = randomOf(ICONS);
        const transforms = getTransformsByIcon(base);
        const t = randomOf(transforms);
        const cand = { type: base, t };
        const key = itemKey(cand);
        if(!used.has(key)){
          used.add(key);
          distractors.push(cand);
        }
      }

      const options = shuffle([...correctOptions, ...distractors]);

      return {
        index,
        rows: [
          [row1.A, row1.B, row1.C],
          [row2.A, row2.B, row2.C],
          [row3.A, row3.B, 'question']
        ],
        answer,
        options
      };
    }

    function renderCellMap(map){
      let html = '';
      POS.forEach(pos=>{
        if(map[pos]){
          if(map[pos].type){
            html += `<div class="slot ${pos}">${iconHTML(map[pos].type, map[pos].t || '')}</div>`;
          }else{
            html += `<div class="slot ${pos}">${iconHTML(map[pos])}</div>`;
          }
        }
      });
      return html;
    }

    function renderQuestionBoard(q){
      return `
        <div class="board">
          <div class="big">${renderCellMap(q.rows[0][0])}</div>
          <div class="big">${renderCellMap(q.rows[0][1])}</div>
          <div class="big">${renderCellMap(q.rows[0][2])}</div>

          <div class="big">${renderCellMap(q.rows[1][0])}</div>
          <div class="big">${renderCellMap(q.rows[1][1])}</div>
          <div class="big">${renderCellMap(q.rows[1][2])}</div>

          <div class="big">${renderCellMap(q.rows[2][0])}</div>
          <div class="big">${renderCellMap(q.rows[2][1])}</div>
          <div class="big">
            <div class="slot tl"><div class="qmark">?<sub>1</sub></div></div>
            <div class="slot tr"><div class="qmark">?<sub>2</sub></div></div>
            <div class="slot bl"><div class="qmark">?<sub>3</sub></div></div>
            <div class="slot br"><div class="qmark">?<sub>4</sub></div></div>
          </div>
        </div>
      `;
    }

    function renderOptions(q){
      return q.options.map((opt, i)=>`
        <div class="opt" draggable="true" data-id="q${q.index}-opt${i}" data-type="${opt.type}" data-t="${opt.t || ''}">
          ${iconHTML(opt.type, opt.t || '')}
        </div>
      `).join('');
    }

    function clearAnswerBoxes(){
      document.querySelectorAll('.answer-box').forEach(box=>{
        const clone = box.querySelector('.clone');
        if(clone) clone.remove();
      });
    }

    function restoreAnswerBoxes(){
      clearAnswerBoxes();
      const ans = userAnswers[currentIndex] || {};
      document.querySelectorAll('.answer-box').forEach(box=>{
        const data = ans[box.dataset.slot];
        if(data){
          const holder = document.createElement('div');
          holder.className = 'clone';
          holder.dataset.type = data.type;
          holder.dataset.t = data.t || '';
          holder.innerHTML = iconHTML(data.type, data.t || '');
          box.appendChild(holder);
        }
      });
    }

    function saveCurrentAnswer(){
      const ans = {};
      document.querySelectorAll('.answer-box').forEach(box=>{
        const c = box.querySelector('.clone');
        if(c){
          ans[box.dataset.slot] = {
            type: c.dataset.type,
            t: c.dataset.t || ''
          };
        }
      });
      userAnswers[currentIndex] = ans;
    }

    function placeToBox(box, data){
      const oldClone = box.querySelector('.clone');
      if(oldClone) oldClone.remove();

      const holder = document.createElement('div');
      holder.className = 'clone';
      holder.dataset.type = data.type;
      holder.dataset.t = data.t || '';
      holder.innerHTML = iconHTML(data.type, data.t || '');
      box.appendChild(holder);
      saveCurrentAnswer();
    }

    function clearDragOver(){
      document.querySelectorAll('.answer-box').forEach(b=>b.classList.remove('drag-over'));
    }

    function bindMouseDrag(){
      const options = document.querySelectorAll('.opt');
      const answerBoxes = document.querySelectorAll('.answer-box');

      options.forEach(opt=>{
        opt.addEventListener('dragstart', e=>{
          e.dataTransfer.setData('text/plain', JSON.stringify({
            type: opt.dataset.type,
            t: opt.dataset.t
          }));
        });
      });

      answerBoxes.forEach(box=>{
        box.ondragover = e=>{
          e.preventDefault();
          box.classList.add('drag-over');
        };
        box.ondragleave = ()=>{
          box.classList.remove('drag-over');
        };
        box.ondrop = e=>{
          e.preventDefault();
          box.classList.remove('drag-over');
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          placeToBox(box, data);
        };
      });
    }

    function bindTouchDrag(){
      const options = document.querySelectorAll('.opt');

      options.forEach(opt=>{
        opt.addEventListener('touchstart', e=>{
          const touch = e.touches[0];
          touchDragData = {
            type: opt.dataset.type,
            t: opt.dataset.t || ''
          };
          dragGhost.innerHTML = opt.innerHTML;
          dragGhost.classList.remove('hidden');
          dragGhost.style.left = touch.clientX + 'px';
          dragGhost.style.top = touch.clientY + 'px';
        }, {passive:true});

        opt.addEventListener('touchmove', e=>{
          if(!touchDragData) return;
          e.preventDefault();
          const touch = e.touches[0];
          dragGhost.style.left = touch.clientX + 'px';
          dragGhost.style.top = touch.clientY + 'px';

          clearDragOver();
          const target = document.elementFromPoint(touch.clientX, touch.clientY);
          const box = target && target.closest('.answer-box');
          if(box) box.classList.add('drag-over');
        }, {passive:false});

        opt.addEventListener('touchend', e=>{
          if(!touchDragData) return;
          const touch = e.changedTouches[0];
          clearDragOver();
          const target = document.elementFromPoint(touch.clientX, touch.clientY);
          const box = target && target.closest('.answer-box');
          if(box){
            placeToBox(box, touchDragData);
          }
          dragGhost.classList.add('hidden');
          dragGhost.innerHTML = '';
          touchDragData = null;
        });

        opt.addEventListener('touchcancel', ()=>{
          clearDragOver();
          dragGhost.classList.add('hidden');
          dragGhost.innerHTML = '';
          touchDragData = null;
        });
      });
    }

    function bindDrag(){
      bindMouseDrag();
      bindTouchDrag();
    }

    function showQuestionPage(index){
      currentIndex = index;
      const q = quizData[index];
      qnoText.textContent = `第 ${index+1} / 5 题`;
      answerQnoText.textContent = `第 ${index+1} / 5 题`;
      questionOnlyArea.innerHTML = renderQuestionBoard(q);
      optionsArea.innerHTML = renderOptions(q);
      restoreAnswerBoxes();
      bindDrag();
      nextBtn.textContent = index === 4 ? '提交答案' : '下一题';

      questionOnlyPage.classList.add('active');
      answerOnlyPage.classList.remove('active');
      resultPage.classList.remove('active');
      window.scrollTo(0,0);
    }

    function showAnswerPage(){
      questionOnlyPage.classList.remove('active');
      answerOnlyPage.classList.add('active');
      resultPage.classList.remove('active');
      window.scrollTo(0,0);
    }

    function answerEqual(a,b){
      return (a.type === b.type) && ((a.t || '') === (b.t || ''));
    }

    function transformText(t){
      if(!t) return '不变';
      if(t.includes('scale(0.58)')) return '缩小';
      if(t.includes('scale(1.30)')) return '放大';
      if(t.includes('scaleX(-1)')) return '左右翻转';
      if(t.includes('scaleY(-1)')) return '上下翻转';
      if(t.includes('rotate(90deg)')) return '旋转90°';
      if(t.includes('rotate(180deg)')) return '旋转180°';
      if(t.includes('rotate(270deg)')) return '旋转270°';
      return '变化';
    }

    function analysisText(slot, correct){
      const nameMap = { tl:'?1', tr:'?2', bl:'?3', br:'?4' };
      if(correct.type === 'blank'){
        return `${nameMap[slot]}位置：前两个田字格该位置图形相同，所以结果应为空白图片。`;
      }
      return `${nameMap[slot]}位置：前两个田字格该位置只有一个非空图形，因此结果保留该图形。本题此处应为：${transformText(correct.t || '')}。`;
    }

    function submitAll(){
      saveCurrentAnswer();
      let correctCount = 0;
      wrongList.innerHTML = '';

      quizData.forEach((q, i)=>{
        const user = userAnswers[i] || {};
        let ok = true;

        POS.forEach(pos=>{
          const right = q.answer[pos];
          const mine = user[pos];
          if(!mine || !answerEqual(mine, right)) ok = false;
        });

        if(ok){
          correctCount++;
        }else{
          let analysis = '';
          POS.forEach(pos=>{
            const right = q.answer[pos];
            const mine = user[pos];
            if(!mine || !answerEqual(mine, right)){
              analysis += `<div>${analysisText(pos, right)}</div>`;
            }
          });

          wrongList.insertAdjacentHTML('beforeend', `
            <div class="wrong-block">
              <div class="wrong-title">第${i+1}题答错</div>
              <div class="wrong-text">${analysis}</div>
              <div class="wrong-title">原题图</div>
              ${renderQuestionBoard(q)}
            </div>
          `);
        }
      });

      scoreText.textContent = `答对 ${correctCount} / 5 题`;
      if(correctCount === 5){
        wrongList.innerHTML = `<div class="wrong-block" style="text-align:center">全部答对，表现很棒！</div>`;
      }

      questionOnlyPage.classList.remove('active');
      answerOnlyPage.classList.remove('active');
      resultPage.classList.add('active');
      window.scrollTo(0,0);
    }

    function preloadImages(names){
      names.forEach(name=>{
        if(name === 'blank') return;
        const img = new Image();
        img.src = openmojiUrl(name);
      });
    }

    function generateQuiz(){
      quizData = Array.from({length:5}, (_, i)=>buildQuestion(i));
      userAnswers = Array.from({length:5}, ()=>({}));
      currentIndex = 0;

      const need = new Set();
      quizData.forEach(q=>{
        q.options.forEach(opt=>need.add(opt.type));
        q.rows.forEach(row=>{
          row.forEach(cell=>{
            if(cell && cell !== 'question'){
              Object.values(cell).forEach(v=>{
                if(typeof v === 'string') need.add(v);
                else if(v && v.type) need.add(v.type);
              });
            }
          });
        });
      });
      preloadImages([...need]);
    }

    chooseBtn.addEventListener('click', ()=>{
      showAnswerPage();
    });

    nextBtn.addEventListener('click', ()=>{
      saveCurrentAnswer();
      if(currentIndex < 4){
        showQuestionPage(currentIndex + 1);
      }else{
        submitAll();
      }
    });

    document.getElementById('retryBtn').addEventListener('click', ()=>{
      generateQuiz();
      showQuestionPage(0);
    });

    generateQuiz();
    showQuestionPage(0);
  </script>
</body>
</html>
