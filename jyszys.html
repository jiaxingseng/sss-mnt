<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>幼升小数学模拟题 - iPad优化版</title>
  <style>
    :root{
      --bg:#f5f9ff;
      --card:#ffffff;
      --primary:#2b6cb0;
      --primary-light:#eaf4ff;
      --green:#7ac943;
      --green-dark:#68b136;
      --orange:#fff4e6;
      --orange-text:#9a4d00;
      --border:#dce9f6;
      --text:#243447;
      --sub:#607080;
      --shadow:0 8px 24px rgba(38,78,118,.10);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,#f8fbff 0%,#eef6ff 100%);
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
    }

    body{
      padding:16px;
    }

    .app{
      max-width:1024px;
      margin:0 auto;
    }

    .screen{
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      border:1px solid #e8f0fa;
      overflow:hidden;
    }

    .top-timer-wrap{
      padding:18px 20px 10px;
      background:#fff;
    }

    .timer-bar{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .track-wrap{
      position:relative;
      flex:1;
      height:30px;
      display:flex;
      align-items:center;
    }

    .line{
      width:100%;
      height:8px;
      background:#eeeeee;
      border-radius:999px;
      overflow:hidden;
      position:relative;
    }

    .line-inner{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#dff2c8,#8fd44b);
      transition:width .5s linear;
      border-radius:999px;
    }

    .rocket{
      width:38px;
      height:22px;
      position:absolute;
      left:0;
      top:50%;
      transform:translate(-50%, -50%);
      transition:left .5s linear;
      z-index:2;
      pointer-events:none;
    }

    .rocket:before{
      content:"";
      position:absolute;
      left:0;
      top:4px;
      width:26px;
      height:14px;
      background:#8dd34a;
      border-radius:14px 8px 8px 14px;
    }

    .rocket:after{
      content:"";
      position:absolute;
      left:20px;
      top:1px;
      border-left:16px solid #f6a21a;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
    }

    .rocket .window{
      position:absolute;
      left:9px;
      top:8px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#fff;
    }

    .rocket .tail{
      position:absolute;
      left:-7px;
      top:7px;
      border-right:9px solid #f25f5c;
      border-top:4px solid transparent;
      border-bottom:4px solid transparent;
    }

    .timer-box{
      min-width:96px;
      padding:12px 16px;
      background:var(--green);
      color:#fff;
      font-weight:800;
      font-size:28px;
      line-height:1;
      text-align:center;
      border-radius:10px;
      font-variant-numeric:tabular-nums;
      box-shadow:0 6px 14px rgba(122,201,67,.25);
      flex:0 0 auto;
    }

    .screen-head{
      padding:10px 24px 20px;
      background:#fff;
      border-bottom:1px solid var(--border);
    }

    .screen-head h1{
      margin:0;
      font-size:32px;
      color:var(--primary);
      line-height:1.2;
      font-weight:800;
    }

    .screen-head p{
      margin:8px 0 0;
      color:var(--sub);
      font-size:18px;
      line-height:1.7;
    }

    .screen-body{
      padding:24px 22px 24px;
    }

    .desc{
      background:var(--primary-light);
      color:#295a84;
      border-radius:16px;
      padding:16px 18px;
      line-height:1.9;
      font-size:20px;
      margin-bottom:18px;
    }

    .question-area{
      border:2px dashed #cfe3f8;
      border-radius:20px;
      background:#fcfeff;
      padding:20px;
      min-height:280px;
    }

    .memory-title{
      font-size:28px;
      font-weight:800;
      color:#214f79;
      margin-bottom:12px;
    }

    .group-tag{
      display:inline-block;
      padding:10px 16px;
      background:#eef7ff;
      border:1px solid #d7e7f7;
      border-radius:999px;
      color:#35628c;
      font-weight:700;
      margin-bottom:14px;
      font-size:18px;
    }

    .memory-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(120px,1fr));
      gap:18px;
      margin-top:18px;
    }

    .card{
      height:108px;
      border-radius:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:42px;
      font-weight:800;
      color:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
    }

    .red{background:#e63946;}
    .blue{background:#457b9d;}
    .green{background:#2a9d8f;}
    .yellow{background:#e9c46a;color:#624800;}
    .purple{background:#7b61ff;}
    .pink{background:#ff66a3;}

    .question-list{
      margin:8px 0 0;
      padding-left:28px;
      font-size:22px;
      line-height:2;
      color:#314b63;
    }

    .answer-block{
      margin-top:20px;
    }

    .multi-input{
      display:grid;
      gap:18px;
    }

    .answer-block label{
      display:block;
      font-size:20px;
      margin-bottom:8px;
      color:#35536f;
      font-weight:700;
    }

    input[type="text"]{
      width:100%;
      font-size:24px;
      padding:16px 18px;
      border-radius:16px;
      border:2px solid #d7e5f2;
      outline:none;
      background:#fff;
      min-height:64px;
    }

    input[type="text"]:focus{
      border-color:#7bb2e8;
      box-shadow:0 0 0 4px rgba(123,178,232,.15);
    }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin-top:22px;
      flex-wrap:wrap;
    }

    .hint{
      color:#6d7c8b;
      font-size:18px;
      line-height:1.7;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:18px 26px;
      font-size:24px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
      min-height:64px;
      min-width:180px;
    }

    .btn:active{transform:scale(.98);}
    .btn-next{
      background:var(--primary);
      color:#fff;
      box-shadow:0 8px 20px rgba(43,108,176,.25);
    }
    .btn-green{
      background:var(--green);
      color:#fff;
      box-shadow:0 8px 20px rgba(122,201,67,.25);
    }

    .start-panel{
      text-align:center;
      padding:34px 24px 40px;
    }

    .start-panel .hero{
      font-size:64px;
      margin-bottom:10px;
    }

    .start-panel h2{
      margin:0 0 10px;
      color:var(--primary);
      font-size:34px;
      font-weight:800;
    }

    .start-panel p{
      color:var(--sub);
      font-size:20px;
      line-height:2;
      margin:10px auto 20px;
      max-width:760px;
    }

    .tag-row{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:22px;
    }

    .tag{
      background:#eef6ff;
      color:#35628c;
      border-radius:999px;
      padding:12px 18px;
      font-size:17px;
      border:1px solid #d8e8f8;
    }

    .result-summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      margin-top:12px;
    }

    .stat{
      background:#f8fbff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:20px 16px;
      text-align:center;
    }

    .stat .num{
      font-size:38px;
      font-weight:800;
      color:var(--primary);
    }

    .stat .label{
      margin-top:8px;
      color:var(--sub);
      font-size:18px;
    }

    .wrong-list{
      margin-top:24px;
      display:grid;
      gap:18px;
    }

    .wrong-card{
      background:#fffdfb;
      border:1px solid #f3dcc4;
      border-radius:20px;
      padding:18px;
    }

    .wrong-card h3{
      margin:0 0 12px;
      color:#a35400;
      font-size:22px;
    }

    .wrong-row{
      margin:6px 0;
      font-size:19px;
      line-height:1.9;
    }

    .analysis{
      margin-top:10px;
      padding:14px 16px;
      background:var(--orange);
      color:var(--orange-text);
      border-radius:16px;
      line-height:1.9;
      font-size:18px;
    }

    .memory-tip{
      margin-top:18px;
      color:#b45309;
      font-size:19px;
      background:#fff7ed;
      border-radius:16px;
      padding:14px 16px;
      line-height:1.8;
    }

    @media (max-width: 820px){
      body{padding:10px;}
      .app{max-width:100%;}
      .top-timer-wrap{padding:14px 14px 6px;}
      .screen-head{padding:10px 16px 16px;}
      .screen-body{padding:18px 14px 18px;}
      .screen-head h1{font-size:26px;}
      .screen-head p{font-size:16px;}
      .desc{font-size:18px;}
      .memory-grid{grid-template-columns:repeat(2,minmax(110px,1fr));}
      .card{height:92px;font-size:38px;}
      .question-list{font-size:20px;}
      input[type="text"]{font-size:22px;}
      .btn{width:100%;}
      .actions{flex-direction:column;align-items:stretch;}
      .result-summary{grid-template-columns:1fr;}
      .timer-box{font-size:22px;min-width:82px;}
      .hint{font-size:16px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen" id="mainScreen"></div>
  </div>

  <script>
    const screen = document.getElementById("mainScreen");

    const state = {
      sets: [],
      currentIndex: 0,
      currentPhase: "memory",
      answers: {},
      timer: null,
      totalSeconds: 30,
      secondsLeft: 30
    };

    const colors = [
      { key: "red", name: "红色" },
      { key: "blue", name: "蓝色" },
      { key: "green", name: "绿色" },
      { key: "yellow", name: "黄色" },
      { key: "purple", name: "紫色" },
      { key: "pink", name: "粉色" }
    ];

    function shuffle(arr){
      return [...arr].sort(()=>Math.random()-0.5);
    }

    function rand(min,max){
      return Math.floor(Math.random()*(max-min+1))+min;
    }

    function normalizeText(s){
      return String(s || "")
        .replace(/\s/g,'')
        .replace(/,/g,'、')
        .replace(/，/g,'、')
        .trim();
    }

    function clearTimer(){
      if(state.timer){
        clearInterval(state.timer);
        state.timer = null;
      }
    }

    function formatTime(sec){
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function generateQuestionSet(){
      const nums = shuffle([1,2,3,4,5,6,7,8,9]).slice(0,6);
      const cols = shuffle(colors).slice(0,6);

      const cards = nums.map((num, i) => ({
        num,
        colorKey: cols[i].key,
        colorName: cols[i].name
      }));

      const colorA = cols[0].name;
      const colorB = cols[1].name;
      const arrA = cards.filter(c => c.colorName === colorA).map(c => c.num);
      const arrB = cards.filter(c => c.colorName === colorB).map(c => c.num);

      const mode = rand(1,3);
      let q3 = "";
      let a3 = "";
      let an3 = "";

      if(mode === 1){
        const threshold = rand(3,6);
        const biggerNums = cards.filter(c => c.num > threshold).map(c => c.num).sort((a,b)=>a-b);
        q3 = `请写出所有比${threshold}大的数字，按从小到大写。`;
        a3 = biggerNums.join("、") || "没有";
        an3 = `先找出所有比${threshold}大的数字，再按从小到大写。`;
      } else if(mode === 2){
        const pickColor = cols[2].name;
        const colorNums = cards.filter(c => c.colorName === pickColor).map(c => c.num).sort((a,b)=>a-b);
        q3 = `请写出${pickColor}数字。`;
        a3 = colorNums.join("、");
        an3 = `先回忆${pickColor}对应的是哪些数字，再完整写出来。`;
      } else {
        const threshold = rand(2,5);
        const pickColor = cols[2].name;
        const nums2 = cards.filter(c => c.colorName === pickColor && c.num > threshold).map(c => c.num).sort((a,b)=>a-b);
        q3 = `请写出所有比${threshold}大的${pickColor}数字。`;
        a3 = nums2.join("、") || "没有";
        an3 = `这题要同时满足两个条件：颜色是${pickColor}，并且数字比${threshold}大。`;
      }

      return {
        cards,
        questions: [
          `请写出${colorA}数字中最大的数字。`,
          `请写出${colorB}数字中最小的数字。`,
          q3
        ],
        answers: {
          a1: String(Math.max(...arrA)),
          a2: String(Math.min(...arrB)),
          a3: a3
        },
        analysis: [
          `先回忆哪些数字是${colorA}的，再从里面找最大的数字。`,
          `先回忆哪些数字是${colorB}的，再从里面找最小的数字。`,
          an3
        ]
      };
    }

    function startQuiz(){
      clearTimer();
      state.sets = Array.from({length:5}, ()=>generateQuestionSet());
      state.currentIndex = 0;
      state.currentPhase = "memory";
      state.answers = {};
      state.secondsLeft = state.totalSeconds;
      renderCurrent();
      startCountdown();
    }

    function startCountdown(){
      clearTimer();
      state.secondsLeft = state.totalSeconds;
      updateTimerUI();

      state.timer = setInterval(() => {
        state.secondsLeft--;
        updateTimerUI();
        if(state.secondsLeft <= 0){
          clearTimer();
          if(state.currentPhase === "memory"){
            goToAnswerPage();
          }
        }
      }, 1000);
    }

    function updateTimerUI(){
      const timerText = document.getElementById("timerText");
      const timerLine = document.getElementById("timerLine");
      const rocket = document.getElementById("rocket");

      const progress = (state.totalSeconds - state.secondsLeft) / state.totalSeconds;
      const percent = Math.max(0, Math.min(100, progress * 100));

      if(timerText){
        timerText.textContent = formatTime(state.secondsLeft);
      }
      if(timerLine){
        timerLine.style.width = `${percent}%`;
      }
      if(rocket){
        rocket.style.left = `${percent}%`;
      }
    }

    function renderTop(title, sub){
      return `
        <div class="top-timer-wrap">
          <div class="timer-bar">
            <div class="track-wrap">
              <div class="line">
                <div class="line-inner" id="timerLine"></div>
              </div>
              <div class="rocket" id="rocket">
                <span class="window"></span>
                <span class="tail"></span>
              </div>
            </div>
            <div class="timer-box" id="timerText">${formatTime(state.secondsLeft)}</div>
          </div>
        </div>
        <div class="screen-head">
          <h1>${title}</h1>
          <p>${sub}</p>
        </div>
      `;
    }

    function renderCurrent(){
      const groupNo = state.currentIndex + 1;
      const q = state.sets[state.currentIndex];

      if(state.currentPhase === "memory"){
        screen.innerHTML = `
          ${renderTop("幼升小数学模拟题", `第 ${groupNo} / 5 组 · 记忆页`)}
          <div class="screen-body">
            <div class="desc">请在 30 秒内记住下面每个数字的颜色和数字本身。时间结束后会自动进入作答页。</div>

            <div class="question-area">
              <div class="group-tag">第 ${groupNo} 组</div>
              <div class="memory-title">请记住这些卡片：</div>
              <div class="memory-grid">
                ${q.cards.map(c => `<div class="card ${c.colorKey}">${c.num}</div>`).join("")}
              </div>
              <div class="memory-tip">记住“数字本身”和“颜色”这两个信息。</div>
            </div>

            <div class="actions">
              <div class="hint">30秒后自动翻页，也可以提前进入作答页。</div>
              <button class="btn btn-next" onclick="forceNextPage()">我记住了，下一题</button>
            </div>
          </div>
        `;
        updateTimerUI();
      } else {
        screen.innerHTML = `
          ${renderTop("幼升小数学模拟题", `第 ${groupNo} / 5 组 · 作答页`)}
          <div class="screen-body">
            <div class="desc">现在请根据刚才记住的内容回答问题。当前作答页不倒计时，完成后点击“下一题”。</div>

            <div class="question-area">
              <div class="group-tag">第 ${groupNo} 组</div>
              <ol class="question-list">
                ${q.questions.map(item => `<li>${item}</li>`).join("")}
              </ol>

              <div class="answer-block multi-input">
                <div>
                  <label>第1问答案</label>
                  <input type="text" id="a1" placeholder="请输入答案">
                </div>
                <div>
                  <label>第2问答案</label>
                  <input type="text" id="a2" placeholder="请输入答案">
                </div>
                <div>
                  <label>第3问答案</label>
                  <input type="text" id="a3" placeholder="例如：5、7、9">
                </div>
              </div>
            </div>

            <div class="actions">
              <div class="hint">完成后点击按钮，进入下一组题目。</div>
              <button class="btn btn-next" onclick="submitCurrentAndNext()">
                ${groupNo === 5 ? "提交并查看结果" : "下一题"}
              </button>
            </div>
          </div>
        `;
        const line = document.getElementById("timerLine");
        const rocket = document.getElementById("rocket");
        const text = document.getElementById("timerText");
        if(line) line.style.width = "100%";
        if(rocket) rocket.style.left = "100%";
        if(text) text.textContent = "答题中";
      }
    }

    function forceNextPage(){
      clearTimer();
      goToAnswerPage();
    }

    function goToAnswerPage(){
      state.currentPhase = "answer";
      renderCurrent();
    }

    function submitCurrentAndNext(){
      state.answers[state.currentIndex] = {
        a1: document.getElementById("a1").value.trim(),
        a2: document.getElementById("a2").value.trim(),
        a3: document.getElementById("a3").value.trim()
      };

      if(state.currentIndex < 4){
        state.currentIndex++;
        state.currentPhase = "memory";
        state.secondsLeft = state.totalSeconds;
        renderCurrent();
        startCountdown();
      } else {
        renderResult();
      }
    }

    function renderResult(){
      clearTimer();

      let totalSmall = 0;
      let correctCount = 0;
      let wrongCards = [];

      state.sets.forEach((q, idx) => {
        const user = state.answers[idx] || {};
        const keys = ["a1","a2","a3"];
        totalSmall += 3;

        keys.forEach((key, i) => {
          const ok = normalizeText(user[key]) === normalizeText(q.answers[key]);
          if(ok){
            correctCount++;
          } else {
            wrongCards.push(`
              <div class="wrong-card">
                <h3>第 ${idx + 1} 组 · 第 ${i + 1} 问</h3>
                <div class="wrong-row"><b>问题：</b>${q.questions[i]}</div>
                <div class="wrong-row"><b>你的答案：</b>${user[key] || "未作答"}</div>
                <div class="wrong-row"><b>正确答案：</b>${q.answers[key]}</div>
                <div class="analysis"><b>分析：</b>${q.analysis[i]}</div>
              </div>
            `);
          }
        });
      });

      const percent = Math.round(correctCount / totalSmall * 100);

      screen.innerHTML = `
        ${renderTop("答题结果", "5组记忆题已完成")}
        <div class="screen-body">
          <div class="desc">这类题重点考查短时记忆、条件筛选和最大最小比较。建议孩子做完以后，再口头说一说自己是怎么回忆和筛选的。</div>

          <div class="result-summary">
            <div class="stat">
              <div class="num">${totalSmall}</div>
              <div class="label">总小问数</div>
            </div>
            <div class="stat">
              <div class="num">${correctCount}</div>
              <div class="label">答对小问</div>
            </div>
            <div class="stat">
              <div class="num">${percent}%</div>
              <div class="label">正确率</div>
            </div>
          </div>

          ${
            wrongCards.length === 0
              ? `<div class="analysis" style="margin-top:22px;background:#edfbee;color:#236a31;">太棒了，5组题全部答对了！点击下面绿色按钮，可以重新随机生成一套新的题目。</div>`
              : `<div class="wrong-list">${wrongCards.join("")}</div>`
          }

          <div class="actions" style="margin-top:26px;">
            <button class="btn btn-green" onclick="startQuiz()">重新随机一套</button>
          </div>
        </div>
      `;

      const line = document.getElementById("timerLine");
      const rocket = document.getElementById("rocket");
      const text = document.getElementById("timerText");
      if(line) line.style.width = "100%";
      if(rocket) rocket.style.left = "100%";
      if(text) text.textContent = "完成";
    }

    function renderStart(){
      screen.innerHTML = `
        ${renderTop("幼升小数学模拟题", "iPad优化版 · 5组连续记忆题 · 30秒自动翻页")}
        <div class="screen-body start-panel">
          <div class="hero">🚀</div>
          <h2>一次随机生成 5 组题目</h2>
          <p>每组题先进入 30 秒记忆页，时间到自动翻到作答页。答完一组后点击“下一题”，进入下一组新的记忆题。顶部小火箭会跟着倒计时从左向右移动，整体显示更适合 iPad。</p>
          <div class="tag-row">
            <div class="tag">iPad优化</div>
            <div class="tag">5组连续做</div>
            <div class="tag">30秒倒计时</div>
            <div class="tag">自动翻页</div>
          </div>
          <button class="btn btn-green" onclick="startQuiz()">开始答题</button>
        </div>
      `;

      const line = document.getElementById("timerLine");
      const rocket = document.getElementById("rocket");
      const text = document.getElementById("timerText");
      if(line) line.style.width = "0%";
      if(rocket) rocket.style.left = "0%";
      if(text) text.textContent = "00:30";
    }

    renderStart();
  </script>
</body>
</html>
