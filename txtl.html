<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
  <title>分类补空题 5题随机练习</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      margin: 0;
      background: #f7f7f2;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #555;
      -webkit-text-size-adjust: 100%;
    }

    .page {
      width: min(96vw, 980px);
      margin: 0 auto;
      padding: 14px 12px 32px;
    }

    .top-bar {
      margin-bottom: 14px;
    }

    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .progress-line {
      flex: 1;
      height: 6px;
      background: #e5e5e5;
      border-radius: 999px;
      position: relative;
      overflow: visible;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: #6ec24a;
      border-radius: 999px;
      transition: width .2s linear;
    }

    .rocket {
      position: absolute;
      left: 0%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 20px;
      transition: left .2s linear;
      pointer-events: none;
    }

    .rocket .body {
      position: absolute;
      left: 7px;
      top: 1px;
      width: 0;
      height: 0;
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-left: 16px solid #6ec24a;
    }

    .rocket .tail-top {
      position: absolute;
      left: 3px;
      top: 3px;
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-right: 7px solid #f4a62f;
      transform: rotate(-18deg);
    }

    .rocket .tail-bottom {
      position: absolute;
      left: 3px;
      top: 11px;
      width: 0;
      height: 0;
      border-bottom: 4px solid transparent;
      border-right: 7px solid #f4a62f;
      transform: rotate(18deg);
    }

    .rocket .window {
      position: absolute;
      left: 15px;
      top: 7px;
      width: 5px;
      height: 5px;
      background: #fff;
      border-radius: 50%;
      z-index: 2;
    }

    .timer-box {
      min-width: 108px;
      text-align: center;
      background: #74c83d;
      color: #fff;
      border-radius: 4px;
      padding: 8px 10px;
      font-weight: 700;
      font-size: 24px;
      line-height: 1;
    }

    .meta-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .question-index {
      font-size: 18px;
      font-weight: 700;
      color: #666;
    }

    .question-title {
      font-size: 18px;
      font-weight: 700;
      color: #666;
      margin: 12px 0 12px;
    }

    .question-area {
      background: #fff;
      border-radius: 8px;
      padding: 6px 6px 10px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 12px 6px;
      border-bottom: 2px solid #d8d8d8;
    }

    .row:last-child {
      border-bottom: none;
    }

    .cell,
    .option,
    .mini-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .cell {
      aspect-ratio: 1 / 1;
      border: 2px solid #d3d3d3;
      background: #fff;
      border-radius: 2px;
      cursor: default;
      padding: 1px;
      transition: transform .06s ease, border-color .1s ease, background-color .1s ease;
      touch-action: manipulation;
    }

    .cell.blank {
      background: #dff3cf;
      cursor: pointer;
    }

    .cell.blank.filled {
      background: #dff3cf;
    }

    .cell.touching,
    .option.touching {
      transform: scale(0.97);
    }

    .emoji-fit {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(8.2vw, 56px);
      line-height: 1;
      transform: scale(1.18);
      transform-origin: center;
      pointer-events: none;
    }

    .option-section {
      margin-top: 18px;
    }

    .option-title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .option-line {
      flex: 1;
      border-top: 3px dashed #78bf4d;
    }

    .option-title {
      color: #7b7b7b;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px 10px;
    }

    .option {
      aspect-ratio: 1 / 1;
      border: 2px solid #d3d3d3;
      background: #fff;
      border-radius: 4px;
      cursor: pointer;
      transition: transform .06s ease, border-color .1s ease, box-shadow .1s ease;
      padding: 1px;
      touch-action: manipulation;
    }

    .option.active {
      border-color: #78bf4d;
      box-shadow: 0 0 0 3px rgba(120,191,77,.16);
      transform: scale(1.02);
    }

    .action-wrap {
      margin-top: 26px;
      text-align: center;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .btn {
      min-width: 140px;
      border: none;
      border-radius: 24px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      padding: 12px 28px;
      cursor: pointer;
      transition: transform .06s ease, opacity .15s ease, background .15s ease;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: .55;
      cursor: default;
    }

    .btn.primary {
      background: #74c83d;
    }

    .btn.gray {
      background: #bdbdbd;
    }

    .result {
      margin-top: 18px;
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      min-height: 28px;
    }

    .result.ok { color: #52a532; }
    .result.no { color: #d55a5a; }

    .final-panel {
      display: none;
      margin-top: 20px;
      background: #fff;
      border-radius: 10px;
      padding: 18px 14px 20px;
    }

    .final-panel.show {
      display: block;
    }

    .summary-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #666;
      margin-bottom: 10px;
    }

    .summary-score {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: #52a532;
      margin-bottom: 18px;
    }

    .wrong-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .wrong-item {
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 12px;
      background: #fcfcfc;
    }

    .wrong-head {
      font-size: 17px;
      font-weight: 700;
      color: #666;
      margin-bottom: 10px;
    }

    .wrong-desc {
      font-size: 15px;
      line-height: 1.7;
      color: #666;
      margin-bottom: 10px;
    }

    .explain-board {
      background: #fff;
      border-radius: 8px;
      padding: 8px;
      border: 1px dashed #cfcfcf;
    }

    .explain-row {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .explain-row:last-child {
      margin-bottom: 0;
    }

    .mini-cell {
      aspect-ratio: 1 / 1;
      border: 2px solid #d6d6d6;
      border-radius: 4px;
      background: #fff;
      position: relative;
      padding: 1px;
    }

    .mini-cell.blank {
      background: #eef8e4;
    }

    .mini-cell.user-wrong {
      background: #ffe8e8;
      border-color: #e88787;
    }

    .mini-cell.answer-right {
      background: #e7f6dd;
      border-color: #79bf4f;
    }

    .mini-tag {
      position: absolute;
      right: 2px;
      bottom: 2px;
      font-size: 10px;
      line-height: 1;
      color: #666;
      background: rgba(255,255,255,.92);
      border-radius: 8px;
      padding: 2px 4px;
      z-index: 2;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 13px;
      color: #777;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      vertical-align: -1px;
      border-radius: 3px;
      border: 1px solid #ccc;
      background: #fff;
    }

    .legend .l-wrong::before {
      background: #ffe8e8;
      border-color: #e88787;
    }

    .legend .l-right::before {
      background: #e7f6dd;
      border-color: #79bf4f;
    }

    .legend .l-blank::before {
      background: #eef8e4;
      border-color: #cfdcc1;
    }

    @media (max-width: 820px) {
      .row,
      .options-grid,
      .explain-row {
        gap: 8px;
      }

      .option-title {
        font-size: 16px;
      }

      .timer-box {
        font-size: 20px;
      }

      .btn {
        font-size: 20px;
      }

      .emoji-fit {
        font-size: min(12vw, 58px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="quizPanel">
      <div class="top-bar">
        <div class="progress-wrap">
          <div class="progress-line">
            <div class="progress-fill" id="progressFill"></div>
            <div class="rocket" id="rocket">
              <span class="tail-top"></span>
              <span class="tail-bottom"></span>
              <span class="body"></span>
              <span class="window"></span>
            </div>
          </div>
          <div class="timer-box" id="timerBox">04:00</div>
        </div>
      </div>

      <div class="meta-bar">
        <div>
          <div class="question-index" id="questionIndexText">第 1 / 5 题</div>
        </div>
      </div>

      <div class="question-title">选择出绿色背景格子对应的图形。</div>
      <div class="question-area" id="questionArea"></div>

      <div class="option-section">
        <div class="option-title-wrap">
          <div class="option-line"></div>
          <div class="option-title">选项区</div>
          <div class="option-line"></div>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
      </div>

      <div class="action-wrap">
        <button class="btn gray" id="clearBtn">清空本题</button>
        <button class="btn primary" id="nextBtn" disabled>下一题</button>
      </div>

      <div class="result" id="result"></div>
    </div>

    <div class="final-panel" id="finalPanel">
      <div class="summary-title">练习完成</div>
      <div class="summary-score" id="summaryScore"></div>
      <div class="wrong-list" id="wrongList"></div>
      <div class="action-wrap">
        <button class="btn primary" id="restartBtn">重新答题</button>
      </div>
    </div>
  </div>

  <script>
    const DOUBLE_THEME_POOL = [
      { category: "衣物分类", themeKey: "wearing", family: "wearing", type: "double", rule: "左边是上身衣物，右边是下身衣物。", leftPool: ["👕", "🧥", "👔", "🦺"], rightPool: ["👖", "🩳", "🩲", "🧦"] },
      { category: "餐具分类", themeKey: "tableware", family: "kitchen", type: "double", rule: "左边是喝东西用的，右边是吃东西用的。", leftPool: ["☕", "🥛", "🧃", "🥤"], rightPool: ["🥣", "🍽️", "🥄", "🥢"] },
      { category: "文具分类", themeKey: "stationery", family: "study", type: "double", rule: "左边是书写工具，右边是固定整理工具。", leftPool: ["✏️", "🖍️", "🖊️", "🖌️"], rightPool: ["📎", "📌", "📍", "📏"] },
      { category: "食物分类", themeKey: "food", family: "food", type: "double", rule: "左边是主食类，右边是甜食类。", leftPool: ["🍔", "🍕", "🥪", "🌭"], rightPool: ["🍩", "🍰", "🍪", "🧁"] },
      { category: "水果分类", themeKey: "fruit", family: "fruit", type: "double", rule: "左边是红色系水果，右边是黄色系水果。", leftPool: ["🍎", "🍓", "🍒", "🍉"], rightPool: ["🍌", "🍍", "🍋", "🥭"] },
      { category: "工具分类", themeKey: "tool", family: "tool", type: "double", rule: "左边是敲打工具，右边是剪切工具。", leftPool: ["🔨", "🪓", "🔧", "⛏️"], rightPool: ["✂️", "🔪", "🪚", "🪒"] }
    ];

    const SINGLE_THEME_POOL = [
      { category: "动物", themeKey: "animal", family: "animal", type: "single", rule: "这一行都是动物。", pool: ["🐶","🐱","🐰","🐼","🐯","🐵","🦊","🐮"] },
      { category: "海洋生物", themeKey: "seaLife", family: "animal", type: "single", rule: "这一行都是海洋生物。", pool: ["🐟","🐠","🐡","🐬","🐳","🦀","🦑","🐙"] },
      { category: "农场动物", themeKey: "farmAnimal", family: "animal", type: "single", rule: "这一行都是农场动物。", pool: ["🐮","🐷","🐔","🐑","🐴","🦆","🐐","🐓"] },
      { category: "昆虫", themeKey: "insect", family: "animal", type: "single", rule: "这一行都是昆虫。", pool: ["🐝","🦋","🐞","🪲","🪳","🕷️","🦗","🐜"] },
      { category: "鸟类", themeKey: "bird", family: "animal", type: "single", rule: "这一行都是鸟类。", pool: ["🐦","🦅","🦉","🦆","🦢","🕊️","🦜","🐧"] },

      { category: "植物", themeKey: "plant", family: "plant", type: "single", rule: "这一行都是植物。", pool: ["🌲","🌳","🌵","🌷","🌻","🍀","🌿","🍃"] },
      { category: "蔬菜", themeKey: "vegetable", family: "plantFood", type: "single", rule: "这一行都是蔬菜。", pool: ["🥕","🌽","🍅","🥒","🍆","🥔","🧄","🧅"] },

      { category: "交通工具", themeKey: "vehicle", family: "vehicle", type: "single", rule: "这一行都是交通工具。", pool: ["🚗","🚌","🚲","🚕","🚙","🛵","🚜","🚑"] },
      { category: "天气自然", themeKey: "nature", family: "nature", type: "single", rule: "这一行都是天气或自然现象。", pool: ["☀️","🌙","⭐","❄️","🌈","⚡","☁️","🌧️"] },
      { category: "乐器", themeKey: "instrument", family: "music", type: "single", rule: "这一行都是乐器。", pool: ["🎸","🎹","🥁","🎺","🎻","🎷","🪗","🪕"] },
      { category: "运动用品", themeKey: "sportsItem", family: "sport", type: "single", rule: "这一行都是运动用品。", pool: ["⚽","🏀","🏈","⚾","🎾","🏐","🥏","🏓"] },
      { category: "家具", themeKey: "furniture", family: "home", type: "single", rule: "这一行都是家具。", pool: ["🪑","🛏️","🛋️","🚪","🪞","🧺","🪟","🚽"] },
      { category: "电子设备", themeKey: "device", family: "device", type: "single", rule: "这一行都是电子设备。", pool: ["📱","💻","⌨️","🖥️","🖨️","🖱️","🎧","📷"] },
      { category: "清洁用品", themeKey: "cleaning", family: "clean", type: "single", rule: "这一行都是清洁用品。", pool: ["🧹","🧽","🪣","🧴","🧼","🚿","🪠","🧺"] },
      { category: "钟表计时", themeKey: "clock", family: "clock", type: "single", rule: "这一行都是钟表计时相关物品。", pool: ["⏰","⏱️","⌚","⏳","⌛","📅","📆","🗓️"] },
      { category: "建筑物", themeKey: "building", family: "building", type: "single", rule: "这一行都是建筑物。", pool: ["🏠","🏡","🏢","🏫","🏥","🏦","🏪","🏛️"] }
    ];

    const DISTRACTOR_THEME_POOL = [
      { pool: ["◆","●","■","▲","★","♥","♦","♣"] },
      { pool: ["A","B","C","D","E","F","G","H"] },
      { pool: ["1","2","3","4","5","6","7","8"] },
      { pool: ["↑","↓","←","→","↖","↗","↘","↙"] },
      { pool: ["○","◎","◇","□","△","▽","※","✦"] },
      { pool: ["+","−","×","÷","=","≠","≤","≥"] }
    ];

    const QUIZ_COUNT = 5;
    const TOTAL_SECONDS = 4 * 60;
    const OPTION_COUNT = 12;

    let quizSet = [];
    let currentQuestionIndex = 0;
    let selectedOption = null;
    let currentAnswers = {};
    let quizRecords = [];
    let totalSeconds = TOTAL_SECONDS;
    let timerId = null;

    const questionArea = document.getElementById("questionArea");
    const optionsGrid = document.getElementById("optionsGrid");
    const result = document.getElementById("result");
    const nextBtn = document.getElementById("nextBtn");
    const clearBtn = document.getElementById("clearBtn");
    const questionIndexText = document.getElementById("questionIndexText");
    const timerBox = document.getElementById("timerBox");
    const progressFill = document.getElementById("progressFill");
    const rocket = document.getElementById("rocket");
    const finalPanel = document.getElementById("finalPanel");
    const summaryScore = document.getElementById("summaryScore");
    const wrongList = document.getElementById("wrongList");
    const restartBtn = document.getElementById("restartBtn");
    const quizPanel = document.getElementById("quizPanel");

    function isValidOptionValue(value) {
      return typeof value === "string" && value.trim() !== "";
    }

    function sanitizePool(arr) {
      return uniqueValid(arr);
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function uniqueValid(arr) {
      return [...new Set(arr.filter(isValidOptionValue))];
    }

    function pickN(arr, n) {
      return shuffle(arr).slice(0, n);
    }

    function clone(obj) {
      return JSON.parse(JSON.stringify(obj));
    }

    function emojiNode(emoji) {
      const span = document.createElement("span");
      span.className = "emoji-fit";
      span.textContent = emoji || "";
      return span;
    }

    function bindTap(el, handler) {
      let moved = false;

      el.addEventListener("pointerdown", (e) => {
        moved = false;
        el.classList.add("touching");
        if (e.pointerType !== "mouse") {
          try { el.setPointerCapture(e.pointerId); } catch {}
        }
      }, { passive: true });

      el.addEventListener("pointermove", () => {
        moved = true;
      }, { passive: true });

      const clearTouch = () => el.classList.remove("touching");
      el.addEventListener("pointerup", clearTouch, { passive: true });
      el.addEventListener("pointercancel", clearTouch, { passive: true });
      el.addEventListener("pointerleave", clearTouch, { passive: true });

      el.addEventListener("pointerup", (e) => {
        if (moved) return;
        e.preventDefault();
        handler(e);
      });

      el.addEventListener("click", (e) => {
        e.preventDefault();
      });
    }

    function scrollToTopInstant() {
      requestAnimationFrame(() => {
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      });
    }

    function buildDoubleRow(theme) {
      const leftPool = sanitizePool(theme.leftPool);
      const rightPool = sanitizePool(theme.rightPool);
      const leftPick = pickN(leftPool, 3);
      const rightPick = pickN(rightPool, 3);

      if (leftPick.length < 3 || rightPick.length < 3) return null;

      const leftBlankCandidates = [0, 1];
      const rightBlankCandidates = [4, 5];

      const leftBlankIndex = leftBlankCandidates[Math.floor(Math.random() * leftBlankCandidates.length)];
      const rightBlankIndex = rightBlankCandidates[Math.floor(Math.random() * rightBlankCandidates.length)];

      const cells = [
        leftPick[0], leftPick[1], leftPick[2],
        rightPick[0], rightPick[1], rightPick[2]
      ];

      if (cells.some(item => !isValidOptionValue(item))) return null;

      const answers = {};
      answers[leftBlankIndex] = cells[leftBlankIndex];
      answers[rightBlankIndex] = cells[rightBlankIndex];

      cells[leftBlankIndex] = null;
      cells[rightBlankIndex] = null;

      return {
        category: theme.category,
        themeKey: theme.themeKey,
        family: theme.family,
        type: "double",
        rule: theme.rule,
        cells,
        answers
      };
    }

    function buildSingleRow(theme) {
      const pool = sanitizePool(theme.pool);
      const pick = pickN(pool, 6);

      if (pick.length < 6 || pick.some(item => !isValidOptionValue(item))) return null;

      const blankIndex = Math.floor(Math.random() * 6);
      const cells = [...pick];
      const answers = {};
      answers[blankIndex] = cells[blankIndex];
      cells[blankIndex] = null;

      return {
        category: theme.category,
        themeKey: theme.themeKey,
        family: theme.family,
        type: "single",
        rule: theme.rule,
        cells,
        answers
      };
    }

    function buildOneQuestion() {
      const chosenDouble = [];
      const usedThemeKeys = new Set();
      const usedFamilies = new Set();

      for (const item of shuffle(DOUBLE_THEME_POOL)) {
        if (!usedThemeKeys.has(item.themeKey) && !usedFamilies.has(item.family)) {
          chosenDouble.push(item);
          usedThemeKeys.add(item.themeKey);
          usedFamilies.add(item.family);
        }
        if (chosenDouble.length === 2) break;
      }

      if (chosenDouble.length < 2) return buildOneQuestion();

      const chosenSingle = [];
      for (const item of shuffle(SINGLE_THEME_POOL)) {
        if (!usedThemeKeys.has(item.themeKey) && !usedFamilies.has(item.family)) {
          chosenSingle.push(item);
          usedThemeKeys.add(item.themeKey);
          usedFamilies.add(item.family);
        }
        if (chosenSingle.length === 4) break;
      }

      if (chosenSingle.length < 4) return buildOneQuestion();

      const rows = [];

      for (const item of chosenDouble) {
        const row = buildDoubleRow(item);
        if (!row) return buildOneQuestion();
        rows.push(row);
      }

      for (const item of chosenSingle) {
        const row = buildSingleRow(item);
        if (!row) return buildOneQuestion();
        rows.push(row);
      }

      const themeKeys = rows.map(r => r.themeKey);
      const families = rows.map(r => r.family);

      if (new Set(themeKeys).size !== 6) return buildOneQuestion();
      if (new Set(families).size !== 6) return buildOneQuestion();

      return {
        id: `question_${Math.random().toString(36).slice(2, 10)}`,
        rows: shuffle(rows)
      };
    }

    function getQuestionByIndex(index) {
      return quizSet[index];
    }

    function getTotalBlanks(rows) {
      let total = 0;
      rows.forEach(row => {
        row.cells.forEach(cell => {
          if (cell === null) total++;
        });
      });
      return total;
    }

    function getCurrentTotalBlanks() {
      return getTotalBlanks(getQuestionByIndex(currentQuestionIndex).rows);
    }

    function getAllCorrectAnswers(question) {
      return uniqueValid(question.rows.flatMap(row => Object.values(row.answers)));
    }

    function getQuestionShownImages(question) {
      return uniqueValid(
        question.rows.flatMap(row => row.cells.filter(cell => cell !== null))
      );
    }

    function collectFarThemeDistractors() {
      const distractors = [];
      DISTRACTOR_THEME_POOL.forEach(theme => {
        distractors.push(...sanitizePool(theme.pool));
      });
      return uniqueValid(distractors);
    }

    function buildOptions(question) {
      const allCorrect = getAllCorrectAnswers(question);
      const shownImages = getQuestionShownImages(question);

      const validCorrectAnswers = uniqueValid(
        allCorrect.filter(item => !shownImages.includes(item))
      );

      let finalOptions = [...validCorrectAnswers];
      const distractorPool = collectFarThemeDistractors();

      for (const item of shuffle(distractorPool)) {
        if (finalOptions.length >= OPTION_COUNT) break;
        if (
          isValidOptionValue(item) &&
          !finalOptions.includes(item) &&
          !shownImages.includes(item) &&
          !validCorrectAnswers.includes(item)
        ) {
          finalOptions.push(item);
        }
      }

      finalOptions = uniqueValid(finalOptions).slice(0, OPTION_COUNT);
      return shuffle(finalOptions);
    }

    function updateTopProgress() {
      const percent = (currentQuestionIndex / QUIZ_COUNT) * 100;
      progressFill.style.width = `${percent}%`;
      rocket.style.left = `${percent}%`;
    }

    function renderTimerOnly() {
      const m = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
      const s = String(totalSeconds % 60).padStart(2, "0");
      timerBox.textContent = `${m}:${s}`;

      const used = TOTAL_SECONDS - totalSeconds;
      const percent = Math.max(0, Math.min(100, (used / TOTAL_SECONDS) * 100));
      progressFill.style.width = `${percent}%`;
      rocket.style.left = `${percent}%`;
    }

    function updateTimer() {
      renderTimerOnly();
      if (totalSeconds > 0) {
        totalSeconds--;
      } else {
        finishQuiz();
      }
    }

    function startTimerForCurrentQuestion() {
      if (timerId) clearInterval(timerId);
      totalSeconds = TOTAL_SECONDS;
      progressFill.style.width = "0%";
      rocket.style.left = "0%";
      renderTimerOnly();
      timerId = setInterval(updateTimer, 1000);
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function generateQuizSet() {
      const list = [];
      for (let i = 0; i < QUIZ_COUNT; i++) {
        const q = buildOneQuestion();

        const themeKeys = q.rows.map(row => row.themeKey);
        const families = q.rows.map(row => row.family);

        if (new Set(themeKeys).size !== 6) {
          i--;
          continue;
        }
        if (new Set(families).size !== 6) {
          i--;
          continue;
        }

        const hasBadCell = q.rows.some(row =>
          row.cells.some(cell => cell !== null && !isValidOptionValue(cell))
        );
        if (hasBadCell) {
          i--;
          continue;
        }

        q.options = buildOptions(q);

        if (q.options.length !== OPTION_COUNT) {
          i--;
          continue;
        }

        list.push(q);
      }
      return list;
    }

    function renderQuestion() {
      const question = getQuestionByIndex(currentQuestionIndex);
      questionArea.innerHTML = "";

      question.rows.forEach((row, rowIndex) => {
        const rowEl = document.createElement("div");
        rowEl.className = "row";

        row.cells.forEach((cell, colIndex) => {
          const key = `${rowIndex}-${colIndex}`;
          const div = document.createElement("div");
          div.className = "cell";

          if (cell === null) {
            div.classList.add("blank");
            if (currentAnswers[key] && isValidOptionValue(currentAnswers[key])) {
              div.classList.add("filled");
              div.appendChild(emojiNode(currentAnswers[key]));
            }
            bindTap(div, () => onBlankClick(rowIndex, colIndex));
          } else {
            div.appendChild(emojiNode(cell));
          }

          rowEl.appendChild(div);
        });

        questionArea.appendChild(rowEl);
      });
    }

    function renderOptions() {
      const question = getQuestionByIndex(currentQuestionIndex);
      const safeOptions = uniqueValid(question.options).filter(isValidOptionValue);

      optionsGrid.innerHTML = "";
      optionsGrid.className = "options-grid";

      safeOptions.forEach((emoji, index) => {
        const div = document.createElement("div");
        div.className = "option";

        if (selectedOption && selectedOption.index === index) {
          div.classList.add("active");
        }

        div.appendChild(emojiNode(emoji));
        bindTap(div, () => onOptionClick(index, emoji));
        optionsGrid.appendChild(div);
      });
    }

    function renderMeta() {
      questionIndexText.textContent = `第 ${currentQuestionIndex + 1} / ${QUIZ_COUNT} 题`;
      result.textContent = "";
      result.className = "result";
      updateTopProgress();
      updateNextState();
    }

    function onOptionClick(index, emoji) {
      if (!isValidOptionValue(emoji)) return;

      if (selectedOption && selectedOption.index === index) {
        selectedOption = null;
      } else {
        selectedOption = { index, emoji };
      }

      renderOptions();
    }

    function onBlankClick(rowIndex, colIndex) {
      const key = `${rowIndex}-${colIndex}`;

      if (selectedOption && isValidOptionValue(selectedOption.emoji)) {
        currentAnswers[key] = selectedOption.emoji;
      } else if (currentAnswers[key]) {
        delete currentAnswers[key];
      }

      renderQuestion();
      updateNextState();
    }

    function updateNextState() {
      const filled = Object.keys(currentAnswers).filter(k => isValidOptionValue(currentAnswers[k])).length;
      const total = getCurrentTotalBlanks();
      nextBtn.disabled = filled !== total;
    }

    function evaluateCurrentQuestion() {
      const question = getQuestionByIndex(currentQuestionIndex);

      let total = 0;
      let correct = 0;
      const wrongDetails = [];

      question.rows.forEach((row, rowIndex) => {
        Object.keys(row.answers).forEach(col => {
          total++;
          const key = `${rowIndex}-${col}`;
          const user = currentAnswers[key];
          const answer = row.answers[col];

          if (user === answer) {
            correct++;
          } else {
            wrongDetails.push({
              rowIndex,
              colIndex: Number(col),
              userAnswer: user || "",
              correctAnswer: answer,
              category: row.category,
              rule: row.rule
            });
          }
        });
      });

      return {
        total,
        correct,
        isAllCorrect: correct === total,
        wrongDetails
      };
    }

    function saveCurrentRecord() {
      const question = getQuestionByIndex(currentQuestionIndex);
      const evaluation = evaluateCurrentQuestion();

      quizRecords[currentQuestionIndex] = {
        question: clone(question),
        userAnswers: { ...currentAnswers },
        evaluation
      };

      if (evaluation.isAllCorrect) {
        result.className = "result ok";
        result.textContent = `本题正确（${evaluation.correct}/${evaluation.total}）`;
      } else {
        result.className = "result no";
        result.textContent = `本题有误（${evaluation.correct}/${evaluation.total}）`;
      }
    }

    function goNextQuestion() {
      saveCurrentRecord();

      if (currentQuestionIndex >= QUIZ_COUNT - 1) {
        finishQuiz();
        return;
      }

      currentQuestionIndex++;
      selectedOption = null;
      currentAnswers = {};

      scrollToTopInstant();
      renderMeta();
      renderQuestion();
      renderOptions();
      startTimerForCurrentQuestion();
    }

    function getWrongAnalysis(record) {
      const analyses = [];
      const rows = record.question.rows;
      const wrongMap = {};

      record.evaluation.wrongDetails.forEach(item => {
        const key = `${item.rowIndex}-${item.colIndex}`;
        wrongMap[key] = item;
      });

      rows.forEach((row, rowIndex) => {
        Object.keys(row.answers).forEach(col => {
          const key = `${rowIndex}-${col}`;
          if (wrongMap[key]) {
            analyses.push({
              category: row.category,
              rule: row.rule,
              rowIndex,
              colIndex: Number(col),
              userAnswer: wrongMap[key].userAnswer || "未作答",
              correctAnswer: wrongMap[key].correctAnswer
            });
          }
        });
      });

      return analyses;
    }

    function buildExplainBoard(question, userAnswers, wrongDetails) {
      const wrapper = document.createElement("div");
      wrapper.className = "explain-board";

      const wrongMap = {};
      wrongDetails.forEach(item => {
        wrongMap[`${item.rowIndex}-${item.colIndex}`] = item;
      });

      question.rows.forEach((row, rowIndex) => {
        const rowEl = document.createElement("div");
        rowEl.className = "explain-row";

        row.cells.forEach((cell, colIndex) => {
          const key = `${rowIndex}-${colIndex}`;
          const div = document.createElement("div");
          div.className = "mini-cell";

          if (cell === null) {
            div.classList.add("blank");

            if (wrongMap[key]) {
              div.classList.add("user-wrong");
              div.appendChild(emojiNode(userAnswers[key] || "—"));

              const tag = document.createElement("span");
              tag.className = "mini-tag";
              tag.textContent = `应填${row.answers[colIndex]}`;
              div.appendChild(tag);
            } else if (userAnswers[key] === row.answers[colIndex]) {
              div.classList.add("answer-right");
              div.appendChild(emojiNode(row.answers[colIndex]));
            } else {
              div.appendChild(emojiNode(row.answers[colIndex] || "—"));
            }
          } else {
            div.appendChild(emojiNode(cell));
          }

          rowEl.appendChild(div);
        });

        wrapper.appendChild(rowEl);
      });

      const legend = document.createElement("div");
      legend.className = "legend";
      legend.innerHTML = `
        <span class="l-wrong">红色：你的错误填写</span>
        <span class="l-right">绿色：填写正确</span>
        <span class="l-blank">浅绿：原来的空格位置</span>
      `;
      wrapper.appendChild(legend);

      return wrapper;
    }

    function renderFinalResult() {
      quizPanel.style.display = "none";
      finalPanel.classList.add("show");

      let totalBlanks = 0;
      let totalCorrect = 0;
      let wrongQuestionCount = 0;

      quizRecords.forEach(record => {
        totalBlanks += record.evaluation.total;
        totalCorrect += record.evaluation.correct;
        if (!record.evaluation.isAllCorrect) wrongQuestionCount++;
      });

      summaryScore.textContent = `共完成 ${QUIZ_COUNT} 题，答对 ${totalCorrect} / ${totalBlanks}，答错题目 ${wrongQuestionCount} 题`;

      wrongList.innerHTML = "";

      const wrongRecords = quizRecords
        .map((record, index) => ({ record, index }))
        .filter(item => !item.record.evaluation.isAllCorrect);

      if (wrongRecords.length === 0) {
        const ok = document.createElement("div");
        ok.className = "wrong-item";
        ok.innerHTML = `
          <div class="wrong-head">太棒了！</div>
          <div class="wrong-desc">本次 5 道题全部答对，没有错题需要讲解。</div>
        `;
        wrongList.appendChild(ok);
        return;
      }

      wrongRecords.forEach(({ record, index }) => {
        const box = document.createElement("div");
        box.className = "wrong-item";

        const analysis = getWrongAnalysis(record);
        const lines = analysis.map(item => {
          return `【${item.category}】${item.rule} 你填了“${item.userAnswer}”，正确应为“${item.correctAnswer}”。`;
        }).join("<br>");

        box.innerHTML = `
          <div class="wrong-head">第 ${index + 1} 题错题分析</div>
          <div class="wrong-desc">${lines}</div>
          <div class="wrong-desc">原题讲解图如下：</div>
        `;

        box.appendChild(
          buildExplainBoard(record.question, record.userAnswers, record.evaluation.wrongDetails)
        );

        wrongList.appendChild(box);
      });
    }

    function finishQuiz() {
      stopTimer();

      if (!quizRecords[currentQuestionIndex]) {
        const filled = Object.keys(currentAnswers).filter(k => isValidOptionValue(currentAnswers[k])).length;
        const total = getCurrentTotalBlanks();
        if (filled === total) {
          saveCurrentRecord();
        }
      }

      for (let i = 0; i < QUIZ_COUNT; i++) {
        if (!quizRecords[i]) {
          const question = quizSet[i];
          quizRecords[i] = {
            question: clone(question),
            userAnswers: {},
            evaluation: (() => {
              let total = 0;
              const wrongDetails = [];
              question.rows.forEach((row, rowIndex) => {
                Object.keys(row.answers).forEach(col => {
                  total++;
                  wrongDetails.push({
                    rowIndex,
                    colIndex: Number(col),
                    userAnswer: "",
                    correctAnswer: row.answers[col],
                    category: row.category,
                    rule: row.rule
                  });
                });
              });
              return {
                total,
                correct: 0,
                isAllCorrect: false,
                wrongDetails
              };
            })()
          };
        }
      }

      scrollToTopInstant();
      renderFinalResult();
    }

    function resetQuiz() {
      stopTimer();
      quizSet = generateQuizSet();
      currentQuestionIndex = 0;
      selectedOption = null;
      currentAnswers = {};
      quizRecords = [];
      result.textContent = "";
      result.className = "result";

      finalPanel.classList.remove("show");
      quizPanel.style.display = "block";

      scrollToTopInstant();
      renderMeta();
      renderQuestion();
      renderOptions();
      startTimerForCurrentQuestion();
    }

    nextBtn.addEventListener("click", (e) => {
      e.preventDefault();
      if (nextBtn.disabled) return;
      goNextQuestion();
    });

    clearBtn.addEventListener("click", (e) => {
      e.preventDefault();
      currentAnswers = {};
      selectedOption = null;
      result.textContent = "";
      result.className = "result";
      renderQuestion();
      renderOptions();
      updateNextState();
      scrollToTopInstant();
    });

    restartBtn.addEventListener("click", (e) => {
      e.preventDefault();
      resetQuiz();
    });

    document.addEventListener("gesturestart", e => e.preventDefault());
    document.addEventListener("gesturechange", e => e.preventDefault());
    document.addEventListener("gestureend", e => e.preventDefault());
    document.addEventListener("contextmenu", e => e.preventDefault());
    document.addEventListener("dragstart", e => e.preventDefault());

    let lastTouchEnd = 0;
    document.addEventListener("touchend", function (event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    resetQuiz();
  </script>
</body>
</html>
