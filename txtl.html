<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>iPad明显放大版</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }


    :root {
      --bg-page: #f4f8ee;
      --bg-card: #fbfdf7;
      --bg-cell: #ffffff;
      --bg-blank: #dff1c9;
      --bg-blank-hover: #d3ebb7;
      --bg-fill: linear-gradient(180deg, #eef7e3 0%, #e3f0d2 100%);
      --border-main: #c8d0c0;
      --border-blank: #9cc37f;
      --border-right: #84b76d;
      --border-wrong: #d79a9a;
      --text-main: #5f6658;
      --text-sub: #7a8273;
      --green: #73bb52;


      /* 横屏：明显放大 */
      --box-size: 92px;
      --emoji-main: 68px;
      --emoji-option: 68px;
      --gap: 8px;
      --border: 1.2px;
      --page-max-width: 1180px;


      --title-size: 16px;
      --title-line: 1.35;
      --btn-size: 14px;
      --btn-height: 38px;
      --option-title-size: 16px;
      --status-size: 12px;
      --reason-size: 11px;
    }


    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg-page);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
      color: var(--text-main);
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }


    body {
      touch-action: pan-y;
    }


    .page,
    .exercise,
    .cell,
    .opt,
    .emoji-wrap,
    .draggable-emoji,
    .title,
    .status,
    .reason-box {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }


    .page {
      width: min(96vw, var(--page-max-width));
      margin: 8px auto 14px;
      padding: 8px 12px 14px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg-page);
    }


    .topbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }


    .btn-main, .btn-check {
      border: none;
      background: var(--green);
      color: #fff;
      border-radius: 20px;
      padding: 8px 18px;
      font-size: var(--btn-size);
      cursor: pointer;
      min-height: var(--btn-height);
      line-height: 1;
      box-shadow: 0 2px 6px rgba(97, 148, 73, .14);
    }


    .btn-main:hover, .btn-check:hover {
      background: #63ab44;
    }


    .exercise {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 8px 10px 10px;
      box-shadow: 0 2px 8px rgba(120, 135, 110, .07);
    }


    .title {
      margin: 0 0 8px;
      font-size: var(--title-size);
      line-height: var(--title-line);
      color: var(--text-main);
      font-weight: 600;
    }


    .board .row,
    .options {
      display: grid;
      grid-template-columns: repeat(6, var(--box-size));
      justify-content: space-between;
      gap: var(--gap);
    }


    .board .row {
      padding: 4px 0 7px;
      border-bottom: 1.2px solid #d7ded0;
    }


    .board .row:last-child {
      border-bottom: none;
    }


    .cell,
    .opt {
      width: var(--box-size);
      height: var(--box-size);
      border: var(--border) solid var(--border-main);
      background: var(--bg-cell);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: all .15s ease;
      flex: 0 0 auto;
    }


    .cell.blank {
      background: var(--bg-blank);
    }


    .cell.blank.drag-over {
      background: var(--bg-blank-hover);
      box-shadow: inset 0 0 0 2px var(--green);
    }


    .cell.blank.filled {
      background: var(--bg-fill);
      border-color: var(--border-blank);
      transform: scale(1.01);
    }


    .cell.blank.right {
      background: var(--bg-fill);
      border-color: var(--border-right);
    }


    .cell.blank.wrong {
      background: linear-gradient(180deg, #fff4f4 0%, #ffe8e8 100%);
      border-color: var(--border-wrong);
    }


    .emoji-wrap {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      font-size: var(--emoji-main);
      line-height: 1;
      touch-action: none;
      pointer-events: auto;
    }


    .emoji-wrap.small {
      font-size: var(--emoji-option);
    }


    .draggable-emoji {
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-user-drag: none;
      -webkit-user-modify: read-only;
    }


    .draggable-emoji.dragging-source {
      opacity: .22;
      transform: scale(.95);
    }


    .option-wrap {
      margin-top: 8px;
    }


    .option-title-line {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }


    .option-line {
      flex: 1;
      border-top: 3px dashed #8fcf70;
      height: 0;
    }


    .option-title {
      min-width: 70px;
      text-align: center;
      font-size: var(--option-title-size);
      color: var(--text-sub);
      font-weight: 700;
      user-select: none;
      -webkit-user-select: none;
    }


    .options {
      gap: var(--gap);
    }


    .opt.used {
      opacity: .22;
      filter: grayscale(.15);
    }


    .exercise-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      gap: 8px;
      flex-wrap: wrap;
    }


    .status {
      font-size: var(--status-size);
      color: var(--text-sub);
      line-height: 1.2;
    }


    .status.ok {
      color: #4e8f3e;
      font-weight: 600;
    }


    .status.no {
      color: #be6767;
      font-weight: 600;
    }


    .reason-box {
      margin-top: 8px;
      padding: 8px 10px;
      border: 1px solid #e6caca;
      background: #fff8f8;
      border-radius: 8px;
      font-size: var(--reason-size);
      color: #a85c5c;
      line-height: 1.35;
      overflow: hidden;
    }


    .reason-title {
      font-weight: 700;
      margin-bottom: 3px;
    }


    .reason-list {
      margin: 0;
      padding-left: 16px;
    }


    .reason-list li {
      margin: 2px 0;
    }


    .drag-ghost {
      position: fixed;
      width: 62px;
      height: 62px;
      border-radius: 10px;
      background: rgba(255,255,255,.98);
      border: 1px solid #d7ddd1;
      box-shadow: 0 6px 14px rgba(80, 96, 72, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
    }


    /* 竖屏：也明显放大，但略保守，避免过度溢出 */
    @media (orientation: portrait) {
      :root {
        --box-size: 70px;
        --emoji-main: 50px;
        --emoji-option: 50px;
        --gap: 6px;
        --page-max-width: 980px;


        --title-size: 14px;
        --btn-size: 12px;
        --btn-height: 32px;
        --option-title-size: 14px;
        --status-size: 10px;
        --reason-size: 9px;
      }


      .page {
        width: min(96vw, var(--page-max-width));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <button class="btn-main" onclick="renderAll()">重新随机生成</button>
    </div>
    <div id="app"></div>
  </div>


  <script>
    function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
    function pick(arr,n){ return shuffle(arr).slice(0,n); }
    function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function uid(){ return 'id_' + Math.random().toString(36).slice(2,10); }


    const factories = {
      水果: ["🍎","🍐","🍊","🍌","🍓","🍇"],
      动物: ["🐶","🐱","🐰","🐻","🦊","🐷"],
      交通工具: ["🚗","🚌","🚲","🚄","✈️","🚢"],
      蔬菜: ["🥕","🌽","🍆","🍅","🥬","🥔"],
      学习用品: ["📘","✏️","✂️","📏","🖊️","🎒"],
      天气现象: ["☀️","☁️","🌈","🌧️","🌙","❄️"],
      乐器: ["🥁","🎺","🎸","🎹","🎻","🎷"],
      生活用品: ["🧴","🧼","🧻","🧹","🚪","🛏️"],
      衣物: ["👕","🧢","👟","🧦","👖","👗"],
      餐具器皿: ["☕","🥣","🍽️","🍵","🥄","🍴"],
      花卉植物: ["🌹","🌷","🌼","🌺","🌸","🌻"],
      食物: ["🍜","🍲","🍞","🍰","🍕","🍬"],
      球类运动: ["⚽","🏀","🏐","⚾","🎾","🏓"],
      玩具: ["🧱","🎁","🎈","🧸","🦆","🚙"]
    };


    const dualSubgroupTemplates = [
      {
        bigCat: "学习用品",
        leftSub: "书写类",
        rightSub: "裁量收纳类",
        left: ["✏️","🖊️","📏"],
        right: ["✂️","🎒","📘"]
      },
      {
        bigCat: "餐具器皿",
        leftSub: "盛装类",
        rightSub: "进食工具类",
        left: ["☕","🥣","🍵"],
        right: ["🥄","🍴","🍽️"]
      },
      {
        bigCat: "衣物",
        leftSub: "上身穿戴类",
        rightSub: "下身脚部类",
        left: ["👕","🧢","👗"],
        right: ["👖","👟","🧦"]
      },
      {
        bigCat: "乐器",
        leftSub: "弦键类",
        rightSub: "打击吹奏类",
        left: ["🎸","🎹","🎻"],
        right: ["🥁","🎺","🎷"]
      },
      {
        bigCat: "生活用品",
        leftSub: "清洁类",
        rightSub: "家居类",
        left: ["🧼","🧹","🧻"],
        right: ["🚪","🛏️","🧴"]
      },
      {
        bigCat: "交通工具",
        leftSub: "地面交通类",
        rightSub: "远程交通类",
        left: ["🚗","🚌","🚲"],
        right: ["🚄","✈️","🚢"]
      }
    ];


    const categories = Object.keys(factories);
    let appState = [];
    let dragState = null;


    function validEmoji(e) {
      return typeof e === "string" && e.trim() !== "";
    }


    function makeUniqueItems(cat, count) {
      const source = factories[cat].filter(validEmoji);
      return shuffle(source).slice(0, count).map(item => ({
        uid: uid(),
        cat,
        id: `${cat}_${item}`,
        emoji: item
      }));
    }


    function createSingleBlankRow(cat, rowIndex) {
      const rowItems = makeUniqueItems(cat, 6);
      const blankPos = Math.floor(Math.random() * 6);
      const row = rowItems.map((x, idx) => ({ ...x, originalIndex: idx }));


      const answerItem = row[blankPos];
      row[blankPos] = {
        blank: true,
        cat,
        answerId: answerItem.id,
        answerEmoji: answerItem.emoji,
        current: null,
        isRight: undefined,
        rowIndex,
        colIndex: blankPos,
        isDualBlankRow: false,
        subGroupName: null,
        dualSide: null
      };


      return {
        row,
        shownIds: row.filter(x => !x.blank).map(x => x.id),
        answers: [{
          ...answerItem,
          rowIndex,
          colIndex: blankPos,
          blankOrder: 0,
          isDualBlankRow: false
        }]
      };
    }


    function createDualBlankRowFromTemplate(template, rowIndex) {
      const leftPool = shuffle(template.left);
      const rightPool = shuffle(template.right);


      const leftShown1 = leftPool[0];
      const leftAnswer = leftPool[1];
      const leftShown2 = leftPool[2];


      const rightShown1 = rightPool[0];
      const rightAnswer = rightPool[1];
      const rightShown2 = rightPool[2];


      const row = [
        { uid: uid(), cat: template.bigCat, id: `${template.bigCat}_${leftShown1}`, emoji: leftShown1, subGroupName: template.leftSub },
        {
          blank: true,
          cat: template.bigCat,
          answerId: `${template.bigCat}_${leftAnswer}`,
          answerEmoji: leftAnswer,
          current: null,
          isRight: undefined,
          rowIndex,
          colIndex: 1,
          isDualBlankRow: true,
          subGroupName: template.leftSub,
          dualSide: "left"
        },
        { uid: uid(), cat: template.bigCat, id: `${template.bigCat}_${leftShown2}`, emoji: leftShown2, subGroupName: template.leftSub },
        { uid: uid(), cat: template.bigCat, id: `${template.bigCat}_${rightShown1}`, emoji: rightShown1, subGroupName: template.rightSub },
        {
          blank: true,
          cat: template.bigCat,
          answerId: `${template.bigCat}_${rightAnswer}`,
          answerEmoji: rightAnswer,
          current: null,
          isRight: undefined,
          rowIndex,
          colIndex: 4,
          isDualBlankRow: true,
          subGroupName: template.rightSub,
          dualSide: "right"
        },
        { uid: uid(), cat: template.bigCat, id: `${template.bigCat}_${rightShown2}`, emoji: rightShown2, subGroupName: template.rightSub }
      ];


      return {
        row,
        shownIds: row.filter(x => !x.blank).map(x => x.id),
        answers: [
          {
            uid: uid(),
            cat: template.bigCat,
            id: `${template.bigCat}_${leftAnswer}`,
            emoji: leftAnswer,
            rowIndex,
            colIndex: 1,
            blankOrder: 0,
            isDualBlankRow: true,
            subGroupName: template.leftSub,
            dualSide: "left"
          },
          {
            uid: uid(),
            cat: template.bigCat,
            id: `${template.bigCat}_${rightAnswer}`,
            emoji: rightAnswer,
            rowIndex,
            colIndex: 4,
            blankOrder: 1,
            isDualBlankRow: true,
            subGroupName: template.rightSub,
            dualSide: "right"
          }
        ]
      };
    }


    function countDualBlankRows(rows) {
      let count = 0;
      rows.forEach(row => {
        const blankCount = row.filter(cell => cell.blank).length;
        if (blankCount === 2) count++;
      });
      return count;
    }


    function createExercise() {
      const chosenDualTemplate = rand(dualSubgroupTemplates);
      const remainCats = categories.filter(c => c !== chosenDualTemplate.bigCat);
      const usedCats = shuffle([chosenDualTemplate.bigCat, ...pick(remainCats, 5)]);
      const dualRowIndex = Math.floor(Math.random() * 6);


      const rows = [];
      const answers = [];
      const shownImageIds = new Set();


      usedCats.forEach((cat, rowIndex) => {
        let rowData;


        if (rowIndex === dualRowIndex && cat === chosenDualTemplate.bigCat) {
          rowData = createDualBlankRowFromTemplate(chosenDualTemplate, rowIndex);
        } else {
          rowData = createSingleBlankRow(cat, rowIndex);
        }


        rows.push(rowData.row);
        rowData.answers.forEach(a => answers.push(a));
        rowData.shownIds.forEach(id => shownImageIds.add(id));
      });


      if (countDualBlankRows(rows) !== 1) return createExercise();


      const optionMap = new Map();


      answers.forEach(a => {
        if (!optionMap.has(a.id)) {
          optionMap.set(a.id, {
            ...a,
            source: "correct",
            used: false,
            optionUid: uid()
          });
        }
      });


      const excludedIds = new Set([
        ...shownImageIds,
        ...Array.from(optionMap.keys())
      ]);


      let guard = 0;
      while (optionMap.size < 12 && guard < 5000) {
        guard++;
        const cat = rand(categories);
        const item = makeUniqueItems(cat, 1)[0];
        if (item && !excludedIds.has(item.id) && !optionMap.has(item.id)) {
          optionMap.set(item.id, {
            ...item,
            source: "wrong",
            used: false,
            optionUid: uid()
          });
          excludedIds.add(item.id);
        }
      }


      return {
        rows,
        options: shuffle(Array.from(optionMap.values())).slice(0, 12),
        result: null,
        reasons: []
      };
    }


    function renderAll() {
      appState = [createExercise()];
      renderApp();
      setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 40);
    }


    function renderApp() {
      document.getElementById("app").innerHTML = appState.map((ex, i) => renderExercise(ex, i)).join("");
      bindPointerDrag();
    }


    function renderExercise(ex, exi) {
      return `
        <section class="exercise" data-ex="${exi}">
          <p class="title">1. 选择出绿色背景格子对应的图形。</p>


          <div class="board">
            ${ex.rows.map((row, ri) => `
              <div class="row">
                ${row.map((cell, ci) => renderCell(cell, exi, ri, ci)).join("")}
              </div>
            `).join("")}
          </div>


          <div class="option-wrap">
            <div class="option-title-line">
              <div class="option-line"></div>
              <div class="option-title">选项区</div>
              <div class="option-line"></div>
            </div>


            <div class="options">
              ${ex.options.map((opt, oi) => `
                <div class="opt ${opt.used ? 'used' : ''}">
                  ${
                    !opt.used
                      ? `<div class="emoji-wrap small draggable-emoji"
                             data-drag-type="option"
                             data-ex="${exi}"
                             data-opt="${oi}">${opt.emoji}</div>`
                      : ``
                  }
                </div>
              `).join("")}
            </div>
          </div>


          <div class="exercise-actions">
            <button class="btn-check" onclick="checkExercise(${exi})">检查答案</button>
            <div class="status ${ex.result === null ? '' : (ex.result.correct === ex.result.total ? 'ok' : 'no')}">
              ${
                ex.result === null
                  ? '请将选项拖入绿色格子后再检查。'
                  : ex.result.correct === ex.result.total
                    ? `全部正确（${ex.result.correct}/${ex.result.total}）`
                    : `答对 ${ex.result.correct}/${ex.result.total}`
              }
            </div>
          </div>


          ${
            ex.reasons && ex.reasons.length
              ? `
                <div class="reason-box">
                  <div class="reason-title">错误原因：</div>
                  <ul class="reason-list">
                    ${ex.reasons.slice(0, 2).map(r => `<li>${r}</li>`).join("")}
                  </ul>
                </div>
              `
              : ``
          }
        </section>
      `;
    }


    function renderCell(cell, exi, ri, ci) {
      if (!cell.blank) {
        return `
          <div class="cell">
            <div class="emoji-wrap">${cell.emoji}</div>
          </div>
        `;
      }


      const cls = [
        "cell",
        "blank",
        cell.current ? "filled" : "",
        cell.isRight === true ? "right" : "",
        cell.isRight === false ? "wrong" : ""
      ].join(" ");


      return `
        <div class="${cls}" data-drop-ex="${exi}" data-drop-row="${ri}" data-drop-col="${ci}">
          ${
            cell.current
              ? `<div class="emoji-wrap draggable-emoji"
                      data-drag-type="blank"
                      data-ex="${exi}"
                      data-row="${ri}"
                      data-col="${ci}">${cell.current.emoji}</div>`
              : ``
          }
        </div>
      `;
    }


    function bindPointerDrag() {
      document.querySelectorAll('.draggable-emoji').forEach(el => {
        el.addEventListener('pointerdown', startPointerDrag);
      });
    }


    function startPointerDrag(e) {
      e.preventDefault();


      const el = e.currentTarget;
      const dragType = el.dataset.dragType;
      let payload = null;
      let emoji = el.textContent.trim();


      if (dragType === "option") {
        const exi = Number(el.dataset.ex);
        const optIndex = Number(el.dataset.opt);
        const option = appState[exi].options[optIndex];
        if (!option || option.used) return;


        payload = {
          sourceType: "option",
          ex: exi,
          optIndex,
          id: option.id,
          emoji: option.emoji,
          cat: option.cat
        };
      } else if (dragType === "blank") {
        const exi = Number(el.dataset.ex);
        const row = Number(el.dataset.row);
        const col = Number(el.dataset.col);
        const blank = appState[exi].rows[row][col];
        if (!blank || !blank.current) return;


        payload = {
          sourceType: "blank",
          ex: exi,
          row,
          col,
          id: blank.current.id,
          emoji: blank.current.emoji,
          cat: blank.current.cat,
          optIndex: blank.current.optIndex
        };
      }


      if (!payload) return;


      dragState = {
        payload,
        sourceEl: el,
        ghost: createGhost(emoji, e.clientX, e.clientY)
      };


      el.classList.add('dragging-source');


      window.addEventListener('pointermove', onPointerMove, { passive: false });
      window.addEventListener('pointerup', onPointerUp, { passive: false });
      window.addEventListener('pointercancel', onPointerUp, { passive: false });
    }


    function createGhost(emoji, x, y) {
      const ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = emoji;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';
      document.body.appendChild(ghost);
      return ghost;
    }


    function clearDragHighlights() {
      document.querySelectorAll('.cell.blank.drag-over').forEach(el => el.classList.remove('drag-over'));
    }


    function onPointerMove(e) {
      if (!dragState) return;
      e.preventDefault();


      dragState.ghost.style.left = e.clientX + 'px';
      dragState.ghost.style.top = e.clientY + 'px';


      clearDragHighlights();
      const target = document.elementFromPoint(e.clientX, e.clientY);
      const dropCell = target && target.closest('[data-drop-ex]');
      if (dropCell) dropCell.classList.add('drag-over');
    }


    function onPointerUp(e) {
      if (!dragState) return;
      e.preventDefault();


      const { payload, sourceEl, ghost } = dragState;
      clearDragHighlights();


      const target = document.elementFromPoint(e.clientX, e.clientY);
      const dropCell = target && target.closest('[data-drop-ex]');


      if (dropCell) {
        const toEx = Number(dropCell.dataset.dropEx);
        const toRow = Number(dropCell.dataset.dropRow);
        const toCol = Number(dropCell.dataset.dropCol);
        placeDraggedItem(payload, toEx, toRow, toCol);
      }


      if (ghost && ghost.parentNode) ghost.parentNode.removeChild(ghost);
      if (sourceEl) sourceEl.classList.remove('dragging-source');


      dragState = null;
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup', onPointerUp);
      window.removeEventListener('pointercancel', onPointerUp);
    }


    function placeDraggedItem(payload, toEx, toRow, toCol) {
      if (payload.ex !== toEx) return;


      const ex = appState[toEx];
      const targetBlank = ex.rows[toRow][toCol];
      if (!targetBlank || !targetBlank.blank) return;


      if (payload.sourceType === "option") {
        const option = ex.options[payload.optIndex];
        if (!option || option.used) return;


        if (targetBlank.current) {
          const oldOpt = ex.options[targetBlank.current.optIndex];
          if (oldOpt) oldOpt.used = false;
        }


        option.used = true;
        targetBlank.current = {
          optionUid: option.optionUid,
          id: option.id,
          emoji: option.emoji,
          cat: option.cat,
          optIndex: payload.optIndex
        };
      }


      if (payload.sourceType === "blank") {
        const sourceBlank = ex.rows[payload.row][payload.col];
        if (!sourceBlank || !sourceBlank.current) return;
        if (payload.row === toRow && payload.col === toCol) return;


        const movingCurrent = { ...sourceBlank.current };


        if (targetBlank.current) {
          const targetCurrent = { ...targetBlank.current };
          sourceBlank.current = targetCurrent;
        } else {
          sourceBlank.current = null;
        }


        targetBlank.current = movingCurrent;
      }


      ex.result = null;
      ex.reasons = [];
      ex.rows.forEach(row => row.forEach(cell => { if (cell.blank) cell.isRight = undefined; }));


      renderApp();
    }


    function checkExercise(exi) {
      const ex = appState[exi];
      let total = 0;
      let correct = 0;
      const reasons = [];


      ex.rows.forEach((row, ri) => {
        row.forEach((cell) => {
          if (!cell.blank) return;


          total++;


          if (cell.current && cell.current.id === cell.answerId) {
            cell.isRight = true;
            correct++;
            return;
          }


          cell.isRight = false;


          if (!cell.current) {
            if (cell.isDualBlankRow) {
              reasons.push(`第${ri + 1}行双答题项采用左右两个小类排列，当前绿色格属于“${cell.subGroupName}”，你还没有作答。`);
            } else {
              reasons.push(`第${ri + 1}行还没有完成作答，本行属于“${cell.cat}”类。`);
            }
            return;
          }


          if (cell.isDualBlankRow) {
            if (cell.current.cat === cell.cat) {
              reasons.push(`第${ri + 1}行当前绿色格对应“${cell.cat}”中的“${cell.subGroupName}”，你选择的 ${cell.current.emoji} 虽属于同一大类，但不对应该小类中间位置。`);
            } else {
              reasons.push(`第${ri + 1}行当前绿色格对应“${cell.cat}”中的“${cell.subGroupName}”，你填入的是“${cell.current.cat}”类图形（${cell.current.emoji}），分类不匹配。`);
            }
          } else {
            if (cell.current.cat === cell.cat) {
              reasons.push(`第${ri + 1}行应补入与本行同类的图形，你选择的 ${cell.current.emoji} 虽属“${cell.cat}”类，但不是该空格对应图形。`);
            } else {
              reasons.push(`第${ri + 1}行属于“${cell.cat}”类，你选择了“${cell.current.cat}”类图形（${cell.current.emoji}），分类不一致。`);
            }
          }
        });
      });


      ex.result = { total, correct };
      ex.reasons = reasons;
      renderApp();


      setTimeout(() => {
        const reasonBox = document.querySelector('.reason-box');
        if (reasonBox) reasonBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 40);
    }


    renderAll();
  </script>
</body>
</html>
