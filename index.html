<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>幼升小图形推理题库</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      background: #eef8ee;
      color: #2f4f2f;
      min-height: 100vh;
      padding: 20px 16px 32px;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    .header {
      background: #f8fff8;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 4px 14px rgba(120, 170, 120, 0.12);
      margin-bottom: 22px;
      text-align: center;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      color: #2f4f2f;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 1rem;
      line-height: 1.8;
      color: #567056;
      margin-bottom: 18px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(#dcedc8, #aed581);
      color: #2f4f2f;
      border: 1px solid #7cb342;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #2f4f2f;
      margin: 8px 0 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: #f8fff8;
      border: 1px solid #d7ead7;
      border-radius: 16px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(120, 170, 120, 0.08);
    }

    .icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: #355735;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.88rem;
      color: #637b63;
      line-height: 1.7;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.9rem;
      color: #6a826a;
    }

    /* iPad */
    @media (min-width: 768px) and (max-width: 1024px) {
      .page {
        max-width: 900px;
      }

      .title {
        font-size: 1.8rem;
      }

      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* 手机 */
    @media (max-width: 767px) {
      body {
        padding: 14px 10px 24px;
      }

      .header {
        padding: 20px 14px;
      }

      .title {
        font-size: 1.45rem;
      }

      .desc {
        font-size: 0.92rem;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">幼升小图形推理题库</div>
      <div class="desc">
        通过图形观察、规律发现、分类比较和空间想象练习，
        帮助孩子提升逻辑思维与专注力。
      </div>
      <a href="#" class="btn">开始练习</a>
    </div>

    <div class="section-title">题库分类</div>
    <div class="grid">
      <div class="card">
        <div class="icon">🔷</div>
        <div class="card-title">图形规律</div>
        <div class="card-desc">观察图形变化，找出排列规律。</div>
      </div>

      <div class="card">
        <div class="icon">🟡</div>
        <div class="card-title">分类归纳</div>
        <div class="card-desc">找出相同特征，学习分类整理。</div>
      </div>

      <div class="card">
        <div class="icon">🧠</div>
        <div class="card-title">图形推理</div>
        <div class="card-desc">根据线索推断缺失图形。</div>
      </div>

      <div class="card">
        <div class="icon">🪞</div>
        <div class="card-title">镜像旋转</div>
        <div class="card-desc">练习方向变化和空间感知。</div>
      </div>

      <div class="card">
        <div class="icon">🧩</div>
        <div class="card-title">拼图组合</div>
        <div class="card-desc">判断图形拼接与拆分关系。</div>
      </div>

      <div class="card">
        <div class="icon">👀</div>
        <div class="card-title">观察辨别</div>
        <div class="card-desc">找不同、找相同，训练细节观察。</div>
      </div>
    </div>

    <div class="footer">
      适合 5-7 岁儿童 · 支持 iPad 显示
    </div>
  </div>
</body>
</html>
