<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>幼升小图形推理题库</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    body {
      background: #eef8ee;
      color: #2f4f2f;
      min-height: 100vh;
      padding: 20px 16px 32px;
    }

    .page {
      max-width: 960px;
      margin: 0 auto;
    }

    .header {
      background: #f8fff8;
      border-radius: 18px;
      padding: 24px 20px;
      box-shadow: 0 4px 14px rgba(120, 170, 120, 0.12);
      margin-bottom: 22px;
      text-align: center;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      color: #2f4f2f;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 1rem;
      line-height: 1.8;
      color: #567056;
      margin-bottom: 18px;
    }

    .top-btn {
      display: inline-block;
      background: linear-gradient(#dcedc8, #aed581);
      color: #2f4f2f;
      border: 1px solid #7cb342;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      color: #2f4f2f;
      margin: 8px 0 14px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .menu-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fff8;
      border: 1px solid #d7ead7;
      border-radius: 16px;
      padding: 16px 18px;
      text-decoration: none;
      color: #2f4f2f;
      box-shadow: 0 4px 10px rgba(120, 170, 120, 0.08);
      transition: all 0.2s ease;
    }

    .menu-btn:hover {
      background: #f1faec;
      border-color: #b7d7a8;
      transform: translateY(-2px);
    }

    .menu-btn:active {
      transform: translateY(0);
    }

    .menu-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(180deg, #e8f5d8, #dcedc8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      flex-shrink: 0;
    }

    .menu-text {
      text-align: left;
      min-width: 0;
    }

    .menu-title {
      font-size: 1.02rem;
      font-weight: 700;
      color: #355735;
      margin-bottom: 4px;
    }

    .menu-link {
      font-size: 0.84rem;
      color: #7a927a;
      line-height: 1.5;
      word-break: break-all;
    }

    .footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.9rem;
      color: #6a826a;
    }

    @media (min-width: 768px) and (max-width: 1024px) {
      .page {
        max-width: 900px;
      }

      .title {
        font-size: 1.8rem;
      }

      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 767px) {
      body {
        padding: 14px 10px 24px;
      }

      .header {
        padding: 20px 14px;
      }

      .title {
        font-size: 1.45rem;
      }

      .desc {
        font-size: 0.92rem;
      }

      .menu-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .menu-btn {
        padding: 14px 14px;
        gap: 12px;
      }

      .menu-icon {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .menu-title {
        font-size: 0.95rem;
      }

      .menu-link {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <div class="title">幼升小图形推理题库</div>
      <div class="desc">
        通过图形观察、规律发现、分类比较和空间想象练习，
        帮助孩子提升逻辑思维与专注力。
      </div>
      <a href="txtl.html" class="top-btn">开始练习</a>
    </div>

    <div class="section-title">练习入口</div>
    <div class="menu-grid">
      <a href="jywx.html" class="menu-btn">
        <div class="menu-icon">🧠</div>
        <div class="menu-text">
          <div class="menu-title">记忆无序1</div>
          <div class="menu-link">jywx.html</div>
        </div>
      </a>

      <a href="jywx3.html" class="menu-btn">
        <div class="menu-icon">🎯</div>
        <div class="menu-text">
          <div class="menu-title">记忆无序2</div>
          <div class="menu-link">jywx3.html</div>
        </div>
      </a>

      <a href="jyyx.html" class="menu-btn">
        <div class="menu-icon">➡️</div>
        <div class="menu-text">
          <div class="menu-title">有序记忆</div>
          <div class="menu-link">jyyx.html</div>
        </div>
      </a>

      <a href="sgbgjy.html" class="menu-btn">
        <div class="menu-icon">🧩</div>
        <div class="menu-text">
          <div class="menu-title">四宫八宫记忆</div>
          <div class="menu-link">sgbgjy.html</div>
        </div>
      </a>

       <a href="sgbgxz.html" class="menu-btn">
        <div class="menu-icon">🧩</div>
        <div class="menu-text">
          <div class="menu-title">四宫八宫旋转</div>
          <div class="menu-link">sgbgxz.html</div>
        </div>
      </a>

      <a href="txtl.html" class="menu-btn">
        <div class="menu-icon">🔷</div>
        <div class="menu-text">
          <div class="menu-title">图形推理1</div>
          <div class="menu-link">txtl.html</div>
        </div>
      </a>
    </div>

    <div class="footer">
      适合 5-7 岁儿童 · 支持 iPad 显示
    </div>
  </div>
</body>
</html>
