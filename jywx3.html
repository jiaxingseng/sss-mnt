<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>序列-无序-点击答题-最终稳定版</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      overscroll-behavior: none;
      overflow-x: hidden;
      background: #eef8ee;
      touch-action: manipulation;
    }

    :root {
      --box-size: 98px;
      --box-gap: 16px;
      --emoji-size: 3.5rem;
      --card-max-width: 1500px;
      --transition-fast: 0.12s ease;
      --shadow-soft: 0 8px 18px rgba(90, 130, 90, 0.12);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 18px 14px 36px;
      background: #eef8ee;
    }

    .card {
      max-width: var(--card-max-width);
      width: 100%;
      background: #f8fff8;
      padding: 28px 20px 36px;
      margin-top: 4px;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(90, 130, 90, 0.12);
      touch-action: manipulation;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      font-size: 1.9rem;
      font-weight: 800;
      color: #2f4f2f;
      letter-spacing: 0.02em;
    }

    .badge {
      background: #e8f5e8;
      padding: 9px 18px;
      border-radius: 999px;
      font-weight: 700;
      color: #4f6b4f;
      font-size: 1.06rem;
      border: 1px solid #cfe6cf;
    }

    #countdown {
      font-size: 1.5rem;
      font-weight: 800;
      color: #d32f2f;
      padding: 6px 14px;
      border: 2px solid #d32f2f;
      border-radius: 10px;
      min-width: 82px;
      text-align: center;
      line-height: 1.2;
      background: #fff8f8;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0.45; }
      100% { opacity: 1; }
    }

    .blink {
      animation: blink 1s infinite;
    }

    .memory-tip {
      padding: 0;
      margin: 0 0 18px 0;
      color: #314631;
      font-size: 1.1rem;
      line-height: 1.65;
      text-align: center;
    }

    .area-label {
      font-size: 1.2rem;
      font-weight: 800;
      margin: 26px 0 14px;
      color: #2f4f2f;
      text-align: center;
    }

    /* 记忆区：9张，3行 */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(3, var(--box-size));
      justify-content: center;
      gap: var(--box-gap);
      margin-bottom: 22px;
    }

    /* 作答区：12个方框，2行 */
    .answer-grid {
      display: grid;
      grid-template-columns: repeat(6, var(--box-size));
      justify-content: center;
      gap: var(--box-gap);
      margin-bottom: 30px;
    }

    /* 选项区：18个，固定3行 */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(6, var(--box-size));
      justify-content: center;
      gap: var(--box-gap);
      margin-bottom: 28px;
    }

    .answer-placeholder,
    .pattern-container {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fcfffc;
      border: 2.5px solid #4e684e;
      width: var(--box-size);
      min-height: var(--box-size);
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      position: relative;
      transition:
        transform var(--transition-fast),
        box-shadow var(--transition-fast),
        background-color var(--transition-fast),
        border-color var(--transition-fast),
        opacity var(--transition-fast);
      will-change: transform, box-shadow, opacity;
      cursor: pointer;
      touch-action: manipulation;
    }

    .pattern-container {
      padding: 4px;
      box-shadow: 0 2px 6px rgba(90,130,90,0.08);
    }

    .pattern-container:hover,
    .answer-placeholder:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .pattern-item {
      font-size: var(--emoji-size);
      line-height: 1;
      cursor: pointer;
      transition: transform var(--transition-fast), opacity var(--transition-fast), filter var(--transition-fast);
    }

    .press-feedback {
      transform: scale(0.95) !important;
      background: #f2ffe8 !important;
      border-color: #7cb342 !important;
      box-shadow: inset 0 0 0 3px rgba(124,179,66,0.16);
    }

    @keyframes dropSuccess {
      0% {
        transform: scale(1.08);
        background: #f0ffd2;
        box-shadow: 0 0 0 8px rgba(139,195,74,0.22);
      }
      100% {
        transform: scale(1);
        background: #fcfffc;
        box-shadow: none;
      }
    }

    .drop-success {
      animation: dropSuccess 0.26s ease;
    }

    .button-row {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .btn {
      background: none;
      border: none;
      cursor: pointer;
      transition: all var(--transition-fast);
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.985);
    }

    .btn-primary {
      background: linear-gradient(#dcedc8, #aed581);
      border: 1px solid #7cb342;
      padding: 14px 38px;
      border-radius: 10px;
      font-size: 1.08rem;
      font-weight: 800;
      color: #2f4f2f;
      box-shadow: 0 4px 10px rgba(90,130,90,0.16);
    }

    .btn-sm {
      background: #eef7ee;
      border: 1px solid #b8d3b8;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 0.96rem;
      color: #355035;
      font-weight: 600;
    }

    .view { display: none; }
    .view.active { display: block; }

    .message {
      text-align: left;
      font-size: 1rem;
      padding: 0;
      margin: 12px 0 18px;
      color: #314631;
      line-height: 1.9;
      max-height: 440px;
      overflow-y: auto;
    }

    .question-result {
      margin: 10px 0;
      padding: 10px;
      border-left: 3px solid #ccc;
      border-radius: 4px;
    }

    .question-result.correct {
      border-left-color: #2e7d32;
      background: #edf8ed;
    }

    .question-result.incorrect {
      border-left-color: #c62828;
      background: #fff1f1;
    }

    .question-result.unanswered {
      border-left-color: #999;
      background: #f7faf7;
    }

    .correct-answer {
      background-color: #dff0df;
      color: #205520;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: bold;
      display: inline-block;
      margin: 2px 3px;
      font-size: 1rem;
    }

    .action-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 10px;
    }

    @media (min-width: 768px) and (max-width: 1024px) {
      :root {
        --box-size: 72px;
        --box-gap: 10px;
        --emoji-size: 2.8rem;
        --card-max-width: 960px;
      }
    }

    @media (max-width: 767px) {
      :root {
        --box-size: 56px;
        --box-gap: 8px;
        --emoji-size: 2.1rem;
        --card-max-width: 100%;
      }

      .memory-grid {
        grid-template-columns: repeat(3, var(--box-size));
      }

      .answer-grid {
        grid-template-columns: repeat(4, var(--box-size));
      }

      /* 手机下若强制6列太窄，可改成3行6列只适合大屏/iPad；
         这里为了“固定3行”要求，仍保留6列 */
      .options-grid {
        grid-template-columns: repeat(6, var(--box-size));
        transform: scale(0.92);
        transform-origin: top center;
      }
    }
  </style>
</head>
<body>
<div class="card" id="app">
  <div class="header">
    <span class="title">序列-无序-点击答题</span>
    <div style="display:flex; align-items:center; gap:12px;">
      <span class="badge" id="questionCounter">第 1 / 10 题</span>
      <span id="countdown">60</span>
    </div>
  </div>

  <div id="memoryView" class="view active">
    <div class="memory-tip">
      请记住当前图片，并在下一页找出所有没有出现过的图片。
    </div>

    <div class="area-label">记忆图片区</div>
    <div id="memoryGrid" class="memory-grid"></div>

    <div class="button-row">
      <button class="btn btn-primary" id="goToQuizBtn">请选择</button>
    </div>
  </div>

  <div id="quizView" class="view">
    <div class="area-label">作答区</div>
    <div id="answerContainer" class="answer-grid"></div>

    <div class="area-label">选项区</div>
    <div id="optionsContainer" class="options-grid"></div>

    <div id="quizMessage" class="message"></div>

    <div class="button-row" style="margin-top:10px;">
      <button class="btn btn-primary" id="nextQuestionBtn">下一题</button>
    </div>

    <div class="action-group">
      <button class="btn btn-sm" id="resetQuizBtn">重置</button>
      <button class="btn btn-sm" id="checkAnswerBtn">我的得分</button>
      <button class="btn btn-sm" id="backToMemoryBtn">返回记忆</button>
    </div>
  </div>
</div>

<script>
(function () {
  const TOTAL_QUESTIONS = 10;
  const MEMORY_COUNT = 9;
  const ANSWER_GRID_COUNT = 12;
  const OPTIONS_COUNT = 18;
  const MIN_CORRECT = 3;
  const MAX_CORRECT = 12;
  const SCORE_PER_QUESTION = 1;
  const COUNTDOWN_SECONDS = 60;
  const MAX_BUILD_ATTEMPTS = 400;

  // 为了稳定生成18选项，扩充每个主题素材
  const themeBank = [
    { theme: '动物', items: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐯','🦁','🐮','🐷','🐸','🐵','🐨','🐔','🐧','🐦','🦆','🦉','🐺','🐗','🐴','🐢'] },
    { theme: '水果', items: ['🍎','🍌','🍇','🍊','🍉','🍒','🍑','🍍','🥭','🍋','🍏','🍐','🍓','🥝','🍈','🫐','🍅','🥥'] },
    { theme: '蔬菜', items: ['🥔','🧅','🥕','🌽','🥦','🥒','🍅','🍆','🥑','🥬','🧄','🍄','🌰','🥜','🍠'] },
    { theme: '食物', items: ['🍞','🥐','🥖','🥨','🧀','🥚','🍳','🥓','🍗','🍖','🍔','🌭','🥪','🍕','🍟','🍚','🍜','🍝','🍣','🍤','🥟','🍿'] },
    { theme: '运动', items: ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🎱','🏓','🏸','🥊','🎳','⛳','🏒','🥋','🏹','🥅','🛹'] },
    { theme: '交通', items: ['🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🚚','🚜','🛵','🏍️','🚲','✈️','🚁','🚤','⛵','🚢'] },
    { theme: '文具', items: ['✏️','🖊️','🖋️','✒️','📏','📐','✂️','📎','📌','📚','📖','📝','📒','📕','📘','📙','📗','📓'] }
  ];

  let questions = [];
  let currentIndex = 0;
  let questionResults = [];
  let totalScore = 0;
  let countdownTimer = null;
  let remainingTime = COUNTDOWN_SECONDS;
  let isRestartMode = false;
  let lastTouchEnd = 0;

  const memoryView = document.getElementById('memoryView');
  const quizView = document.getElementById('quizView');
  const memoryGrid = document.getElementById('memoryGrid');
  const optionsContainer = document.getElementById('optionsContainer');
  const answerContainer = document.getElementById('answerContainer');
  const questionCounter = document.getElementById('questionCounter');
  const quizMessage = document.getElementById('quizMessage');
  const countdownEl = document.getElementById('countdown');
  const nextQuestionBtn = document.getElementById('nextQuestionBtn');

  const goToQuizBtn = document.getElementById('goToQuizBtn');
  const backToMemoryBtn = document.getElementById('backToMemoryBtn');
  const resetQuizBtn = document.getElementById('resetQuizBtn');
  const checkAnswerBtn = document.getElementById('checkAnswerBtn');

  document.addEventListener('dblclick', function(e) {
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function(e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  ['gesturestart', 'gesturechange', 'gestureend'].forEach(type => {
    document.addEventListener(type, function(e) {
      e.preventDefault();
    }, { passive: false });
  });

  function addPressFeedback(el) {
    if (!el) return;
    el.classList.add('press-feedback');
    setTimeout(() => el.classList.remove('press-feedback'), 100);
  }

  function shuffleArray(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function randomInt(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function sample(arr, count) {
    return shuffleArray(arr).slice(0, count);
  }

  function arraysAreEqual(arr1, arr2) {
    if (arr1.length !== arr2.length) return false;
    const a = [...arr1].sort();
    const b = [...arr2].sort();
    return a.every((item, index) => item === b[index]);
  }

  function createOneMixedQuestion() {
    const themes = sample(themeBank, 2);
    const themeA = themes[0];
    const themeB = themes[1];

    const memoryA = sample([...new Set(themeA.items)], 5);
    const memoryB = sample([...new Set(themeB.items)], 4);
    const memory = shuffleArray([...memoryA, ...memoryB]);

    const poolA = themeA.items.filter(x => !memory.includes(x));
    const poolB = themeB.items.filter(x => !memory.includes(x));
    let outsidePool = [...new Set([...poolA, ...poolB])];

    const dynamicMaxCorrect = Math.min(MAX_CORRECT, outsidePool.length);
    if (dynamicMaxCorrect < MIN_CORRECT) return null;

    const correctCount = randomInt(MIN_CORRECT, dynamicMaxCorrect);
    const shownMemoryCount = OPTIONS_COUNT - correctCount;

    if (shownMemoryCount < 0 || shownMemoryCount > MEMORY_COUNT) return null;

    const shownMemoryItems = sample(memory, shownMemoryCount);
    const distractors = sample(outsidePool, correctCount);

    if (shownMemoryItems.length + distractors.length !== OPTIONS_COUNT) return null;

    return {
      theme: `${themeA.theme} + ${themeB.theme}`,
      memory,
      distractors,
      options: shuffleArray([...shownMemoryItems, ...distractors])
    };
  }

  function buildQuestionSet() {
    questions = [];
    let attempts = 0;

    while (questions.length < TOTAL_QUESTIONS && attempts < MAX_BUILD_ATTEMPTS) {
      attempts++;
      const q = createOneMixedQuestion();
      if (q && q.options.length === OPTIONS_COUNT) {
        questions.push(q);
      }
    }

    if (questions.length < TOTAL_QUESTIONS) {
      throw new Error('题目生成失败：无法稳定生成10题18选项数据');
    }
  }

  function updateCountdownDisplay() {
    countdownEl.textContent = remainingTime;
    if (remainingTime < 10) countdownEl.classList.add('blink');
    else countdownEl.classList.remove('blink');
  }

  function initCountdown() {
    if (countdownTimer) clearInterval(countdownTimer);
    remainingTime = COUNTDOWN_SECONDS;
    updateCountdownDisplay();

    countdownTimer = setInterval(() => {
      remainingTime--;
      updateCountdownDisplay();
      if (remainingTime <= 0) {
        clearInterval(countdownTimer);
        nextQuestion(true);
      }
    }, 1000);
  }

  function updateCounter() {
    questionCounter.innerText = `第 ${currentIndex + 1} / ${TOTAL_QUESTIONS} 题`;
  }

  function pulseElement(el) {
    if (!el) return;
    el.classList.remove('drop-success');
    void el.offsetWidth;
    el.classList.add('drop-success');
  }

  function findFirstEmptyAnswerSlot() {
    const slots = [...answerContainer.querySelectorAll('.answer-placeholder')];
    return slots.find(slot => !slot.querySelector('.pattern-item')) || null;
  }

  function compactAnswerArea() {
    const slots = [...answerContainer.querySelectorAll('.answer-placeholder')];
    const items = slots.map(slot => slot.querySelector('.pattern-item')).filter(Boolean);

    slots.forEach(slot => slot.innerHTML = '');
    items.forEach((item, index) => {
      if (slots[index]) slots[index].appendChild(item);
    });
  }

  function renderMemoryView() {
    const currentQuestion = questions[currentIndex];
    memoryGrid.innerHTML = '';

    currentQuestion.memory.forEach(emoji => {
      const container = document.createElement('div');
      container.className = 'pattern-container';
      const item = document.createElement('div');
      item.className = 'pattern-item';
      item.textContent = emoji;
      container.appendChild(item);
      memoryGrid.appendChild(container);
    });
  }

  function createAnswerPlaceholders() {
    answerContainer.innerHTML = '';
    for (let i = 0; i < ANSWER_GRID_COUNT; i++) {
      const placeholder = document.createElement('div');
      placeholder.className = 'answer-placeholder';
      answerContainer.appendChild(placeholder);
    }
  }

  function initQuizView() {
    const currentQuestion = questions[currentIndex];
    createAnswerPlaceholders();
    optionsContainer.innerHTML = '';

    currentQuestion.options.forEach((emoji, index) => {
      const container = document.createElement('div');
      container.className = 'pattern-container';
      container.dataset.homeId = `home-${currentIndex}-${index}`;

      const item = document.createElement('div');
      item.className = 'pattern-item';
      item.textContent = emoji;
      item.dataset.homeId = container.dataset.homeId;

      container.appendChild(item);
      optionsContainer.appendChild(container);
    });

    quizMessage.innerHTML = '';
  }

  function getUserAnswers() {
    return [...answerContainer.querySelectorAll('.pattern-item')].map(el => el.textContent);
  }

  function saveCurrentQuestionResult() {
    const currentQuestion = questions[currentIndex];
    const userAnswers = getUserAnswers();
    const correctAnswers = [...currentQuestion.distractors];
    const isCorrect = arraysAreEqual(userAnswers, correctAnswers);
    const score = isCorrect ? SCORE_PER_QUESTION : 0;

    const existingIndex = questionResults.findIndex(r => r.questionIndex === currentIndex);
    const record = {
      questionIndex: currentIndex,
      questionNum: currentIndex + 1,
      theme: currentQuestion.theme,
      isCorrect,
      userAnswer: [...userAnswers],
      allUnusedAnswers: [...correctAnswers],
      score
    };

    if (existingIndex > -1) questionResults[existingIndex] = record;
    else questionResults.push(record);

    totalScore = questionResults.reduce((sum, r) => sum + r.score, 0);
  }

  function buildScoreHtml() {
    totalScore = questionResults.reduce((sum, r) => sum + r.score, 0);

    let html = `
      <div style="font-size:1.05rem;font-weight:700;margin-bottom:12px;">
        📊 总分：${totalScore} / ${TOTAL_QUESTIONS * SCORE_PER_QUESTION} 分
      </div>
      <div style="border-top:1px solid #d7ead7;padding-top:12px;">
        <strong>📝 所有题目答题情况：</strong>
    `;

    for (let i = 0; i < TOTAL_QUESTIONS; i++) {
      const q = questions[i];
      const record = questionResults.find(r => r.questionIndex === i);
      const correctHtml = q.distractors.map(ans => `<span class="correct-answer">${ans}</span>`).join('');

      if (record) {
        html += `
          <div class="question-result ${record.isCorrect ? 'correct' : 'incorrect'}">
            <strong>第${i + 1}题</strong>【${q.theme}】：
            ${record.isCorrect ? '✅ 回答正确' : '❌ 回答错误'}（得分：${record.score}分）<br>
            • 正确答案：${correctHtml}<br>
            • 你的选择：${record.userAnswer.length ? record.userAnswer.join('、') : '未选择'}
          </div>
        `;
      } else {
        html += `
          <div class="question-result unanswered">
            <strong>第${i + 1}题</strong>【${q.theme}】：
            未作答<br>
            • 正确答案：${correctHtml}
          </div>
        `;
      }
    }

    html += `</div>`;
    return html;
  }

  function showScore() {
    saveCurrentQuestionResult();
    quizMessage.innerHTML = buildScoreHtml();
  }

  function showMemoryView() {
    renderMemoryView();
    memoryView.classList.add('active');
    quizView.classList.remove('active');
    updateCounter();
    initCountdown();
  }

  function showQuizView() {
    initQuizView();
    memoryView.classList.remove('active');
    quizView.classList.add('active');
    initCountdown();
  }

  function resetCurrentQuiz() {
    initQuizView();
  }

  function resetAll() {
    if (countdownTimer) clearInterval(countdownTimer);
    currentIndex = 0;
    questionResults = [];
    totalScore = 0;
    isRestartMode = false;
    nextQuestionBtn.textContent = '下一题';

    buildQuestionSet();
    updateCounter();
    renderMemoryView();
    showMemoryView();
  }

  function nextQuestion(fromTimeout = false) {
    if (isRestartMode) {
      resetAll();
      return;
    }

    if (countdownTimer) clearInterval(countdownTimer);

    if (!fromTimeout && quizView.classList.contains('active')) {
      saveCurrentQuestionResult();
    }

    if (currentIndex === TOTAL_QUESTIONS - 1) {
      saveCurrentQuestionResult();
      isRestartMode = true;
      nextQuestionBtn.textContent = '重新答题';
      quizView.classList.add('active');
      memoryView.classList.remove('active');
      quizMessage.innerHTML = buildScoreHtml();
      return;
    }

    currentIndex++;
    updateCounter();
    showMemoryView();
  }

  function initClickAnswerMode() {
    document.addEventListener('click', (e) => {
      if (!quizView.classList.contains('active')) return;

      const optionItem = e.target.closest('.options-grid .pattern-item');
      const answerItem = e.target.closest('.answer-grid .pattern-item');

      if (optionItem) {
        addPressFeedback(optionItem.parentElement);
        const targetSlot = findFirstEmptyAnswerSlot();
        if (!targetSlot) return;

        optionItem.remove();
        targetSlot.appendChild(optionItem);
        pulseElement(targetSlot);
        return;
      }

      if (answerItem) {
        addPressFeedback(answerItem.closest('.answer-placeholder'));
        const homeId = answerItem.dataset.homeId;
        if (!homeId) return;

        const homeContainer = optionsContainer.querySelector(`[data-home-id="${homeId}"]`);
        if (!homeContainer) return;

        answerItem.remove();
        homeContainer.appendChild(answerItem);
        pulseElement(homeContainer);

        compactAnswerArea();
      }
    });
  }

  goToQuizBtn.addEventListener('click', showQuizView);
  backToMemoryBtn.addEventListener('click', showMemoryView);
  resetQuizBtn.addEventListener('click', resetCurrentQuiz);
  checkAnswerBtn.addEventListener('click', showScore);
  nextQuestionBtn.addEventListener('click', () => nextQuestion(false));

  buildQuestionSet();
  initClickAnswerMode();
  updateCounter();
  renderMemoryView();
  initCountdown();
})();
</script>
</body>
</html>
