<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>幼升小数学：找规律（iPad适配 · 随机5题）</title>
  <style>
    :root{
      --card:#ffffff;
      --border:#d9e7f5;
      --text:#111;
      --sub:#4a5568;
      --primary:#2b6cb0;
      --ok:#2f9e44;
      --bad:#d62828;
      --shadow:0 10px 26px rgba(20, 60, 120, 0.10);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{
      margin:0;padding:0;min-height:100%;
      background:linear-gradient(180deg,#fbfdff 0%,#eef6ff 100%);
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
    }
    body{padding:14px;}
    .app{max-width:1024px;margin:0 auto;}

    .panel{
      background:var(--card);
      border:1px solid #e8f0fa;
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .head{
      padding:16px 18px;
      border-bottom:1px solid var(--border);
      background:#fff;
    }
    .title{
      font-size:28px;
      font-weight:900;
      line-height:1.35;
      margin:0;
      letter-spacing:.3px;
    }
    .sub{
      margin:10px 0 0;
      color:var(--sub);
      font-size:16px;
      line-height:1.6;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .badge{
      display:inline-block;
      padding:7px 12px;
      border-radius:999px;
      background:#eef7ff;
      border:1px solid var(--border);
      color:#244a73;
      font-weight:900;
      font-size:14px;
    }

    .body{
      padding:18px 14px 20px;
      display:flex;
      justify-content:center;
    }

    /* 题面不铺满：居中+最大宽度 */
    .question{
      width:100%;
      max-width:920px;
      border:2px dashed #cfe3f8;
      background:#fcfeff;
      border-radius:20px;
      padding:16px 16px 14px;
    }

    /* 序列：居中；长则横向滚动（iPad顺滑） */
    .seq-row{
      display:flex;
      align-items:flex-end;
      gap:10px;
      padding:10px 6px 6px;
      justify-content:center;

      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:thin;
    }
    .seq-row::-webkit-scrollbar{height:8px;}
    .seq-row::-webkit-scrollbar-thumb{background:#d8e6f6;border-radius:999px;}
    .seq-row::-webkit-scrollbar-track{background:transparent;}

    .token{
      width:56px;height:56px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      flex:0 0 auto;
    }
    .token.text{
      font-size:26px;
      font-weight:900;
      color:#111;
    }

    /* 空格：下横线（不是中横线） */
    .blank{
      width:58px;height:56px;
      position:relative;
      flex:0 0 auto;
    }
    .underline{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:8px;
      width:50px;
      height:0;
      border-bottom:5px solid #111;
      border-radius:6px;
      opacity:.95;
    }

    .options{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .opt{
      border:2px solid var(--border);
      border-radius:16px;
      background:#fff;
      padding:12px 12px;
      cursor:pointer;
      display:flex;
      gap:10px;
      align-items:center;
      min-height:88px;
    }
    .opt:active{transform:scale(.99);}
    .opt.selected{border-color:#86b7f0; box-shadow:0 0 0 5px rgba(134,183,240,.18);}
    .opt.correct{border-color:rgba(47,158,68,.55); box-shadow:0 0 0 5px rgba(47,158,68,.12);}
    .opt.wrong{border-color:rgba(214,40,40,.55); box-shadow:0 0 0 5px rgba(214,40,40,.10);}

    .letter{
      width:42px;height:42px;border-radius:12px;
      background:#f3f7fb;
      border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:18px;color:#233b55;
      flex:0 0 auto;
    }
    .opt-tokens{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
    .opt-tokens .token{width:50px;height:50px;}
    .opt-tokens .token.text{font-size:24px;}

    .actions{
      margin-top:14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
    }
    .btns{display:flex; gap:10px; flex-wrap:wrap;}
    button{
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:20px;
      font-weight:900;
      cursor:pointer;
      min-height:56px;
      min-width:180px;
    }
    .btn-primary{background:var(--primary);color:#fff;}
    .btn-ghost{background:#eef5fb;color:#1f4e79;}
    .btn-green{background:var(--ok);color:#fff;}
    .hint{color:#66768a;font-size:14px;line-height:1.6;}

    .result{
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      background:#f8fbff;
      border:1px solid var(--border);
      display:none;
      line-height:1.8;
      font-size:16px;
    }
    .result b{color:#1f4e79;}
    .result.ok{background:#edfbee;border-color:#c7efd1;}
    .result.bad{background:#fff3f3;border-color:#f2c7c7;}

    /* 结果页 */
    .summary{
      margin-top:10px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }
    .stat{
      background:#f8fbff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px 10px;
      text-align:center;
    }
    .stat .num{font-size:28px;font-weight:900;color:var(--primary);}
    .stat .lab{margin-top:6px;color:var(--sub);font-size:14px;font-weight:800;}

    .wrong-list{
      margin-top:14px;
      display:grid;
      gap:12px;
    }
    .wrong-card{
      background:#fffdfb;
      border:1px solid #f3dcc4;
      border-radius:16px;
      padding:12px 12px;
    }
    .wrong-card h3{margin:0 0 8px;color:#a35400;font-size:16px;}
    .wrong-card .row{font-size:14px;line-height:1.7;color:#394a59;}
    .mini-seq{
      margin-top:8px;
      display:flex;
      gap:8px;
      align-items:flex-end;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding:6px 2px;
    }
    .mini-seq .token{width:42px;height:42px;}
    .mini-seq .token.text{font-size:20px;}
    .mini-seq .blank{width:44px;height:42px;}
    .mini-seq .underline{width:38px;border-bottom-width:4px;bottom:7px;}

    /* 位置规律：3x3小格子 */
    .grid9{
      width:50px;height:50px;
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      grid-template-rows:repeat(3, 1fr);
      gap:2px;
      padding:4px;
      border:2px solid #111;
      border-radius:8px;
      background:#fff;
    }
    .cell{
      background:#fff;
      border:1px solid #d9e7f5;
      border-radius:4px;
      position:relative;
    }
    .dot{
      position:absolute;
      inset:0;
      margin:auto;
      width:10px;height:10px;
      border-radius:50%;
      background:#111;
    }

    /* iPad / 竖屏适配 */
    @media (max-width: 820px){
      body{padding:10px;}
      .options{grid-template-columns:1fr;}
      button{width:100%; min-width:auto;}
      .actions{flex-direction:column; align-items:stretch;}
      .btns{flex-direction:column;}
      .title{font-size:24px;}
      .summary{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">
      <div class="head">
        <h1 class="title" id="mainTitle">请仔细观察下图，找出规律并选出正确选项。（  ）</h1>
        <div class="sub">
          <span class="badge" id="progressBadge">第 1 / 5 题</span>
          <span class="badge" id="catBadge">分类：-</span>
          <span class="badge" id="typeBadge">题型：-</span>
          <span class="badge" id="blankBadge">补全：-</span>
        </div>
      </div>

      <div class="body">
        <div class="question" id="screen"></div>
      </div>
    </div>
  </div>

  <script>
    /**********************
     * 基础工具
     **********************/
    const LETTERS = ["A","B","C","D"];
    const $screen = document.getElementById("screen");
    const $progress = document.getElementById("progressBadge");
    const $cat = document.getElementById("catBadge");
    const $type = document.getElementById("typeBadge");
    const $blank = document.getElementById("blankBadge");

    const state = {
      questions: [],
      index: 0,
      selected: null,
      locked: false,
      userAnswers: [] // store selectedIndex
    };

    const shuffle = (arr) => [...arr].sort(() => Math.random() - 0.5);
    const randInt = (min,max) => Math.floor(Math.random()*(max-min+1))+min;

    function tokenKey(t){ return JSON.stringify(t); }
    function tokensKey(arr){ return arr.map(tokenKey).join("|"); }

    function shiftTokens(arr, k){
      const n = arr.length;
      const kk = ((k % n) + n) % n;
      return arr.slice(kk).concat(arr.slice(0, kk));
    }
    function swapTwo(arr){
      const out = arr.map(x => JSON.parse(JSON.stringify(x)));
      let i = randInt(0, out.length-1);
      let j = randInt(0, out.length-1);
      while(j===i) j = randInt(0, out.length-1);
      [out[i], out[j]] = [out[j], out[i]];
      return out;
    }
    function replaceOne(arr, pool){
      const out = arr.map(x => JSON.parse(JSON.stringify(x)));
      const i = randInt(0, out.length-1);
      out[i] = JSON.parse(JSON.stringify(pool[randInt(0, pool.length-1)]));
      return out;
    }
    function uniqueOptions(correct, makers){
      const options = [correct];
      let guard = 0;
      while(options.length < 4 && guard < 250){
        guard++;
        const cand = makers[randInt(0, makers.length-1)]();
        if(!cand) continue;
        const key = tokensKey(cand);
        if(!options.some(o => tokensKey(o) === key)) options.push(cand);
      }
      return shuffle(options);
    }

    /**********************
     * Token 渲染
     **********************/
    function svgShape(shape, {stroke="#111", fill="none", size=52, strokeWidth=4}={}){
      const s = size;
      const pad = Math.round(s * 0.18);
      const w = s - pad*2;
      if(shape==="triangle"){
        const p1 = `${s/2},${pad}`;
        const p2 = `${s-pad},${s-pad}`;
        const p3 = `${pad},${s-pad}`;
        return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
          <polygon points="${p1} ${p2} ${p3}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" stroke-linejoin="round"/>
        </svg>`;
      }
      if(shape==="circle"){
        const r = w/2;
        return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
          <circle cx="${s/2}" cy="${s/2}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" />
        </svg>`;
      }
      return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
        <rect x="${pad}" y="${pad}" width="${w}" height="${w}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" />
      </svg>`;
    }

    function svgArrow(dir, {size=52, stroke="#111", strokeWidth=5}={}){
      const s = size, c = s/2, head = s*0.22;
      let x1=c, y1=c, x2=c, y2=c;
      if(dir==="up"){ y1=s*0.78; y2=s*0.22; }
      if(dir==="down"){ y1=s*0.22; y2=s*0.78; }
      if(dir==="left"){ x1=s*0.78; x2=s*0.22; }
      if(dir==="right"){ x1=s*0.22; x2=s*0.78; }

      let hp = "";
      if(dir==="up"){
        hp = `${c},${y2-head*0.1} ${c-head},${y2+head} ${c+head},${y2+head}`;
      }else if(dir==="down"){
        hp = `${c},${y2+head*0.1} ${c-head},${y2-head} ${c+head},${y2-head}`;
      }else if(dir==="left"){
        hp = `${x2-head*0.1},${c} ${x2+head},${c-head} ${x2+head},${c+head}`;
      }else{
        hp = `${x2+head*0.1},${c} ${x2-head},${c-head} ${x2-head},${c+head}`;
      }
      return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">
        <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${stroke}" stroke-width="${strokeWidth}" stroke-linecap="round"/>
        <polygon points="${hp}" fill="${stroke}" />
      </svg>`;
    }

    function gridToken(pos){
      let html = `<div class="grid9">`;
      for(let i=0;i<9;i++){
        html += `<div class="cell">${i===pos ? `<div class="dot"></div>` : ""}</div>`;
      }
      html += `</div>`;
      return html;
    }

    function renderToken(token, size=56){
      if(token.kind==="shape"){
        return `<div class="token">${svgShape(token.shape, {size, stroke: token.stroke||"#111", fill: token.fill||"none"})}</div>`;
      }
      if(token.kind==="colorDot"){
        return `<div class="token">${svgShape("circle", {size, stroke:"#111", fill: token.color || "#ff5252", strokeWidth:3})}</div>`;
      }
      if(token.kind==="arrow"){
        return `<div class="token">${svgArrow(token.dir, {size})}</div>`;
      }
      if(token.kind==="text"){
        return `<div class="token text">${token.text}</div>`;
      }
      if(token.kind==="sizeShape"){
        const s = token.size === "big" ? size : Math.round(size*0.72);
        return `<div class="token">${svgShape(token.shape, {size:s, stroke:"#111", fill:"none", strokeWidth:4})}</div>`;
      }
      if(token.kind==="grid"){
        return `<div class="token">${gridToken(token.pos)}</div>`;
      }
      return `<div class="token text">?</div>`;
    }

    /**********************
     * 题型生成（数字题更高权重 & 数字序列项更多）
     **********************/
    function pack(category, typeName, givenTokens, blankCount, optionsTokens, correctIndex, explain){
      return { category, typeName, givenTokens, blankCount, optionsTokens, correctIndex, explain };
    }

    // 数字：递增（8项）
    function qNumInc(){
      const start = randInt(1, 9);
      const step = randInt(1, 3);
      const len = 8;
      const seq = Array.from({length:len}, (_,i)=> start + i*step);
      const correct = start + len*step;

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(correct + step)}],
        [{kind:"text", text:String(correct - step)}],
        [{kind:"text", text:String(correct + 1)}],
      ]);
      return pack("数字规律","递增（+同一个数）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `每次加 ${step}，所以空格是 ${correct}。`
      );
    }

    // 数字：递减（8项）
    function qNumDec(){
      const start = randInt(18, 35);
      const step = randInt(1, 3);
      const len = 8;
      const seq = Array.from({length:len}, (_,i)=> start - i*step);
      const correct = start - len*step;

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(correct - step)}],
        [{kind:"text", text:String(correct + step)}],
        [{kind:"text", text:String(correct - 1)}],
      ]);
      return pack("数字规律","递减（-同一个数）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `每次减 ${step}，所以空格是 ${correct}。`
      );
    }

    // 数字：跳数（隔项）
    function qNumJump(){
      const constant = [4,5,6,7,8][randInt(0,4)];
      const start = randInt(1,4);
      // 构造 8 项：1,c,2,c,3,c,4,c  => 空格是 5
      const seq = [];
      for(let i=0;i<8;i++){
        if(i%2===0) seq.push(start + i/2);
        else seq.push(constant);
      }
      const correct = start + 4;

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(constant)}],
        [{kind:"text", text:String(correct+1)}],
        [{kind:"text", text:String(correct-1)}],
      ]);
      return pack("数字规律","跳数（隔项看规律）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `隔一个看：第1、3、5、7…项依次加1；另一条是固定的 ${constant}。所以空格是 ${correct}。`
      );
    }

    // 数字：倍数（×同一个数，6项避免太大）
    function qNumMul(){
      const start = randInt(1,4);
      const mul = [2,3][randInt(0,1)];
      const len = 6;
      const seq = Array.from({length:len}, (_,i)=> start * (mul**i));
      const correct = start * (mul**len);

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(seq[len-1] + mul)}],
        [{kind:"text", text:String(seq[len-1] * (mul===2?3:2))}],
        [{kind:"text", text:String(correct - mul)}],
      ]);
      return pack("数字规律","倍数（×同一个数）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `每次乘 ${mul}，所以空格是 ${correct}。`
      );
    }

    // 数字：累加（前两项相加=后一项，7项）
    function qNumFib(){
      const a = 1;
      const b = [1,2][randInt(0,1)];
      const seq = [a,b];
      while(seq.length < 7){
        seq.push(seq[seq.length-1] + seq[seq.length-2]);
      }
      const correct = seq[seq.length-1] + seq[seq.length-2];

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(correct+1)}],
        [{kind:"text", text:String(correct-1)}],
        [{kind:"text", text:String(seq[seq.length-1] + 1)}],
      ]);
      return pack("数字规律","累加（前两个相加=后一个）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `从第3个开始：前两个相加=后一个，所以空格是 ${correct}。`
      );
    }

    // 数字：对称（6项）
    function qNumSym(){
      const a = randInt(1,4);
      const b = a + randInt(1,3);
      const c = b + randInt(1,3);
      const d = c + randInt(1,3);
      const seq = [a,b,c,d,c,b];
      const correct = a;

      const given = seq.map(n=>({kind:"text", text:String(n)}));
      const correctOpt = [{kind:"text", text:String(correct)}];
      const options = shuffle([
        correctOpt,
        [{kind:"text", text:String(b)}],
        [{kind:"text", text:String(c)}],
        [{kind:"text", text:String(d)}],
      ]);
      return pack("数字规律","对称（左右对称）", given, 1, options,
        options.findIndex(o=>tokensKey(o)===tokensKey(correctOpt)),
        `左右对称：${a},${b},${c},${d},${c},${b},${a}。所以空格是 ${a}。`
      );
    }

    // 图形：重复循环（补4个）
    function qShapeRepeat(){
      const pool = ["square","square","triangle","circle","square","triangle","circle"];
      const pattern = Array.from({length:4}, ()=>({kind:"shape", shape: pool[randInt(0,pool.length-1)]}));
      if(new Set(pattern.map(p=>p.shape)).size < 2) return qShapeRepeat();
      const given = pattern.concat(pattern).map(x => JSON.parse(JSON.stringify(x)));
      const correct = pattern.map(x => JSON.parse(JSON.stringify(x)));

      const shapePoolTokens = ["triangle","circle","square"].map(s=>({kind:"shape",shape:s}));
      const options = uniqueOptions(correct, [
        ()=>shiftTokens(correct, 1),
        ()=>shiftTokens(correct, 2),
        ()=>swapTwo(correct),
        ()=>replaceOne(correct, shapePoolTokens)
      ]);
      const correctIndex = options.findIndex(o => tokensKey(o) === tokensKey(correct));
      return pack("图形规律","重复循环", given, 4, options, correctIndex,
        "每4个为一组重复出现，空格继续填同一组图形。"
      );
    }

    // 位置：左右交替（补1个）
    function qMoveLeftRight(){
      const givenPos = [3,5,3,5];
      const given = givenPos.map(p=>({kind:"grid", pos:p}));
      const correctPos = 3;
      const correct = [{kind:"grid", pos:correctPos}];

      const optionsPos = shuffle([correctPos, 4, 0, 8]);
      const options = optionsPos.map(p=>[{kind:"grid", pos:p}]);
      const correctIndex = options.findIndex(o => tokensKey(o)===tokensKey(correct));
      return pack("位置/移动规律","左右交替", given, 1, options, correctIndex,
        "小黑点在左和右之间交替出现，下一步继续交替。"
      );
    }

    function generateFive(){
      // 数字权重更高：约 80% 数字，20% 图形/位置
      const bucket = [
        // 数字（多放）
        qNumInc,qNumInc,qNumInc,
        qNumDec,qNumDec,qNumDec,
        qNumJump,qNumJump,
        qNumMul,qNumMul,
        qNumFib,qNumFib,
        qNumSym,qNumSym,
        // 图形/位置（少放）
        qShapeRepeat,
        qMoveLeftRight
      ];
      return Array.from({length:5}, ()=> bucket[randInt(0, bucket.length-1)]());
    }

    /**********************
     * UI 渲染与交互
     **********************/
    function renderQuestion(){
      const q = state.questions[state.index];
      state.selected = null;
      state.locked = false;

      $progress.textContent = `第 ${state.index+1} / 5 题`;
      $cat.textContent = `分类：${q.category}`;
      $type.textContent = `题型：${q.typeName}`;
      $blank.textContent = `补全：${q.blankCount} 个`;

      // sequence
      const seqHtml = `
        <div class="seq-row">
          ${q.givenTokens.map(t=>renderToken(t,56)).join("")}
          ${Array.from({length:q.blankCount}).map(()=>`<div class="blank"><div class="underline"></div></div>`).join("")}
        </div>
      `;

      // options
      const optionsHtml = `
        <div class="options">
          ${q.optionsTokens.map((optTokens, idx)=>`
            <div class="opt" data-idx="${idx}">
              <div class="letter">${LETTERS[idx]}</div>
              <div class="opt-tokens">
                ${optTokens.map(t=>renderToken(t,50)).join("")}
              </div>
            </div>
          `).join("")}
        </div>
      `;

      const actionBtnText = (state.index === 4) ? "提交并查看结果" : "提交并下一题";

      $screen.innerHTML = `
        ${seqHtml}
        ${optionsHtml}

        <div class="actions">
          <div class="hint">先找规律，再选答案。数字题常见：加减、隔项、倍数、累加、对称。</div>
          <div class="btns">
            <button class="btn-primary" id="submitBtn">${actionBtnText}</button>
            <button class="btn-ghost" id="skipBtn">跳过此题</button>
          </div>
        </div>

        <div class="result" id="resultBox"></div>
      `;

      // option click
      $screen.querySelectorAll(".opt").forEach(el=>{
        el.addEventListener("click", ()=>{
          if(state.locked) return;
          $screen.querySelectorAll(".opt").forEach(x=>x.classList.remove("selected"));
          el.classList.add("selected");
          state.selected = Number(el.dataset.idx);
        });
      });

      // submit
      $screen.querySelector("#submitBtn").addEventListener("click", submitAndNext);
      // skip
      $screen.querySelector("#skipBtn").addEventListener("click", ()=>{
        if(state.locked) return;
        state.userAnswers[state.index] = null;
        next();
      });
    }

    function showFeedback(){
      const q = state.questions[state.index];
      const resultBox = $screen.querySelector("#resultBox");
      resultBox.style.display = "block";

      if(state.selected === null){
        resultBox.className = "result bad";
        resultBox.innerHTML = "请先选择一个选项。";
        return false;
      }

      state.locked = true;
      state.userAnswers[state.index] = state.selected;

      const opts = $screen.querySelectorAll(".opt");
      opts.forEach(x=>x.classList.remove("correct","wrong"));
      opts[q.correctIndex].classList.add("correct");
      if(state.selected !== q.correctIndex) opts[state.selected].classList.add("wrong");

      const ok = state.selected === q.correctIndex;
      resultBox.className = "result " + (ok ? "ok" : "bad");
      resultBox.innerHTML =
        (ok ? `<b>正确！</b>` : `<b>不正确。</b> 正确答案是 <b>${LETTERS[q.correctIndex]}</b>。`) +
        `<br><b>规律说明：</b>${q.explain}`;

      return true;
    }

    function submitAndNext(){
      const okToGo = showFeedback();
      if(!okToGo) return;

      // 小停顿让孩子看到对错（iPad更友好）
      setTimeout(()=>{
        next();
      }, 450);
    }

    function next(){
      if(state.index < 4){
        state.index++;
        renderQuestion();
      }else{
        renderFinal();
      }
    }

    function renderMiniSequence(q){
      return `
        <div class="mini-seq">
          ${q.givenTokens.map(t=>{
            // smaller
            if(t.kind==="shape" || t.kind==="colorDot" || t.kind==="arrow" || t.kind==="sizeShape") return renderToken(t,42);
            if(t.kind==="grid") return `<div class="token">${gridToken(t.pos)}</div>`;
            return `<div class="token text">${t.text}</div>`;
          }).join("")}
          ${Array.from({length:q.blankCount}).map(()=>`<div class="blank"><div class="underline"></div></div>`).join("")}
        </div>
      `;
    }

    function renderFinal(){
      // score
      let correct = 0;
      let total = 5;

      const wrongs = [];
      state.questions.forEach((q, i)=>{
        const ua = state.userAnswers[i];
        const ok = (ua !== null && ua === q.correctIndex);
        if(ok) correct++;
        else{
          wrongs.push({i, q, ua});
        }
      });

      const percent = Math.round((correct/total)*100);

      $progress.textContent = "已完成";
      $cat.textContent = "分类：结果";
      $type.textContent = "题型：统计";
      $blank.textContent = "补全：-";

      $screen.innerHTML = `
        <div class="result ok" style="display:block;">
          <b>完成！</b> 本次随机 5 题已做完。
        </div>

        <div class="summary">
          <div class="stat"><div class="num">${total}</div><div class="lab">总题数</div></div>
          <div class="stat"><div class="num">${correct}</div><div class="lab">答对题数</div></div>
          <div class="stat"><div class="num">${percent}%</div><div class="lab">正确率</div></div>
        </div>

        ${
          wrongs.length===0
            ? `<div class="result ok" style="display:block;margin-top:12px;">全部答对了！点击下面按钮可重新随机 5 题。</div>`
            : `<div class="wrong-list">
                ${wrongs.map(w=>`
                  <div class="wrong-card">
                    <h3>错题：第 ${w.i+1} 题（${w.q.category} · ${w.q.typeName}）</h3>
                    <div class="row"><b>你的选择：</b>${w.ua===null ? "未作答" : LETTERS[w.ua]}</div>
                    <div class="row"><b>正确答案：</b>${LETTERS[w.q.correctIndex]}</div>
                    <div class="row"><b>规律说明：</b>${w.q.explain}</div>
                    ${renderMiniSequence(w.q)}
                  </div>
                `).join("")}
              </div>`
        }

        <div class="actions" style="margin-top:14px;">
          <div class="hint">建议：做错的题先说出“规律是什么”，再重新做一遍。</div>
          <div class="btns">
            <button class="btn-green" id="restartBtn">重新随机 5 题</button>
            <button class="btn-ghost" id="reviewBtn">从第1题再看一遍</button>
          </div>
        </div>
      `;

      document.getElementById("restartBtn").addEventListener("click", start);
      document.getElementById("reviewBtn").addEventListener("click", ()=>{
        state.index = 0;
        renderQuestion();
      });
    }

    function start(){
      state.questions = generateFive();
      state.index = 0;
      state.userAnswers = Array(5).fill(null);
      renderQuestion();
    }

    start();
  </script>
</body>
</html>
