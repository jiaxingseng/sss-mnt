<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>幼升小语文绘本PDF模拟题</title>
  <style>
    :root{
      --bg:#f7fbff;
      --card:#ffffff;
      --primary:#2b6cb0;
      --primary-light:#e9f4ff;
      --green:#2f9e44;
      --green-dark:#237a34;
      --orange:#fff4e6;
      --orange-text:#9a4d00;
      --border:#dce9f6;
      --text:#243447;
      --sub:#607080;
      --shadow:0 8px 24px rgba(38,78,118,.10);
      --radius:20px;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:linear-gradient(180deg,#f8fbff 0%,#eef6ff 100%);
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
    }

    body{padding:18px 12px 30px;}
    .app{max-width:980px;margin:0 auto;}

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:16px;
    }

    .title-wrap h1{
      margin:0;
      font-size:32px;
      color:var(--primary);
      line-height:1.2;
    }

    .title-wrap p{
      margin:6px 0 0;
      color:var(--sub);
      font-size:16px;
    }

    .progress{
      background:#fff;
      border:1px solid var(--border);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:10px 14px;
      color:var(--primary);
      font-weight:800;
      min-width:180px;
      text-align:center;
    }

    .screen{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      border:1px solid #e8f0fa;
      overflow:hidden;
    }

    .screen-head{
      padding:18px 22px;
      background:linear-gradient(180deg,#f8fbff,#eef6ff);
      border-bottom:1px solid var(--border);
    }

    .screen-head h2{
      margin:0;
      color:#1d4f83;
      font-size:24px;
    }

    .screen-body{
      padding:22px 18px 20px;
    }

    .desc{
      background:var(--primary-light);
      color:#295a84;
      border-radius:14px;
      padding:14px 16px;
      line-height:1.8;
      font-size:18px;
      margin-bottom:16px;
    }

    .question-area{
      border:2px dashed #cfe3f8;
      border-radius:18px;
      background:#fcfeff;
      padding:18px;
      min-height:220px;
    }

    .book-tag{
      display:inline-block;
      padding:8px 14px;
      background:#eef7ff;
      border:1px solid #d7e7f7;
      border-radius:999px;
      color:#35628c;
      font-weight:700;
      margin-bottom:12px;
      font-size:16px;
    }

    .pdf-box{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
    }

    .pdf-header{
      padding:12px 14px;
      background:#f8fbff;
      border-bottom:1px solid var(--border);
      font-size:18px;
      font-weight:800;
      color:#24547d;
    }

    .pdf-view{
      width:100%;
      height:72vh;
      min-height:520px;
      border:none;
      display:block;
      background:#fff;
    }

    .pdf-fallback{
      margin-top:14px;
      padding:16px;
      border-radius:14px;
      background:#fff8e6;
      color:#8a5a00;
      line-height:1.8;
      font-size:17px;
    }

    .question-list{
      margin:10px 0 0;
      padding-left:24px;
      font-size:20px;
      line-height:1.9;
    }

    .answer-block{
      margin-top:18px;
    }

    .multi-input{
      display:grid;
      gap:14px;
    }

    .answer-block label{
      display:block;
      font-size:19px;
      margin-bottom:8px;
      color:#35536f;
      font-weight:700;
    }

    textarea{
      width:100%;
      min-height:88px;
      resize:vertical;
      font-size:20px;
      padding:14px 16px;
      border-radius:14px;
      border:2px solid #d7e5f2;
      outline:none;
      background:#fff;
      font-family:inherit;
      line-height:1.7;
    }

    textarea:focus{
      border-color:#7bb2e8;
      box-shadow:0 0 0 4px rgba(123,178,232,.15);
    }

    .actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-top:20px;
      flex-wrap:wrap;
    }

    .hint{
      color:#6d7c8b;
      font-size:16px;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:16px 22px;
      font-size:22px;
      font-weight:800;
      cursor:pointer;
      transition:.18s ease;
      min-height:58px;
    }

    .btn:active{transform:scale(.98);}
    .btn-next{
      background:var(--primary);
      color:#fff;
      box-shadow:0 8px 20px rgba(43,108,176,.25);
    }
    .btn-green{
      background:var(--green);
      color:#fff;
      box-shadow:0 8px 20px rgba(47,158,68,.25);
    }
    .btn-green:hover{background:var(--green-dark);}

    .start-panel{
      text-align:center;
      padding:30px 18px 36px;
    }

    .start-panel .hero{
      font-size:58px;
      margin-bottom:8px;
    }

    .start-panel h2{
      margin:0 0 8px;
      color:var(--primary);
      font-size:30px;
    }

    .start-panel p{
      color:var(--sub);
      font-size:18px;
      line-height:1.9;
      margin:8px auto 18px;
      max-width:760px;
    }

    .tag-row{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:20px;
    }

    .tag{
      background:#eef6ff;
      color:#35628c;
      border-radius:999px;
      padding:10px 16px;
      font-size:16px;
      border:1px solid #d8e8f8;
    }

    .result-summary{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      margin-top:12px;
    }

    .stat{
      background:#f8fbff;
      border:1px solid var(--border);
      border-radius:16px;
      padding:18px 14px;
      text-align:center;
    }

    .stat .num{
      font-size:34px;
      font-weight:800;
      color:var(--primary);
    }

    .stat .label{
      margin-top:6px;
      color:var(--sub);
      font-size:16px;
    }

    .wrong-list{
      margin-top:22px;
      display:grid;
      gap:18px;
    }

    .wrong-card{
      background:#fffdfb;
      border:1px solid #f3dcc4;
      border-radius:18px;
      padding:16px;
    }

    .wrong-card h3{
      margin:0 0 12px;
      color:#a35400;
      font-size:21px;
    }

    .wrong-row{
      margin:6px 0;
      font-size:18px;
      line-height:1.8;
    }

    .analysis{
      margin-top:10px;
      padding:12px 14px;
      background:var(--orange);
      color:var(--orange-text);
      border-radius:14px;
      line-height:1.8;
      font-size:17px;
    }

    @media (max-width: 768px){
      body{padding:12px 10px 24px;}
      .screen-head{padding:14px 16px;}
      .screen-body{padding:18px 14px 16px;}
      .title-wrap h1{font-size:28px;}
      .result-summary{grid-template-columns:1fr;}
      .btn{width:100%;}
      .actions{flex-direction:column;align-items:stretch;}
      textarea{font-size:18px;}
      .question-list,.desc{font-size:18px;}
      .pdf-view{height:62vh;min-height:420px;}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>幼升小语文绘本 PDF 模拟题</h1>
        <p>随机抽取绘本，先阅读PDF，再回答问题</p>
      </div>
      <div class="progress" id="progressText">准备开始</div>
    </div>

    <div class="screen" id="mainScreen"></div>
  </div>

  <script>
    const screen = document.getElementById("mainScreen");
    const progressText = document.getElementById("progressText");

    const state = {
      currentBook: null,
      answers: []
    };

    function updateProgress(text){
      progressText.textContent = text;
    }

    function normalize(s){
      return String(s || "").replace(/\s/g,"").trim();
    }

    function containsAny(text, arr){
      const t = normalize(text);
      return arr.some(k => t.includes(normalize(k)));
    }

    function shuffle(arr){
      return [...arr].sort(()=>Math.random()-0.5);
    }

    const books = [
      {
        id: 1,

          "这是故事中的细节记忆题，要记住小毯子的颜色。",

        ]
      },
      {
        id: 2,
        book: "笨拙的螃蟹",
        pdf: "pdf/2.pdf",
        questions: [
          "螃蟹为什么苦恼自己的钳子？",

        answers: [
          ["钳子笨拙","碍事","不喜欢大钳子"],

        analysis: [
          "回答时要说出原因：它觉得自己的钳子碍事。",

        ]
      },
      {
        id: 3,
        book: "不一样的小豆豆",
        pdf: "pdf/3.pdf",
        questions: [
          "小豆豆离开豆荚旅行的原因是什么？",
          "小豆豆分别遇到了什么动物？这些动物有什么特点？"
        ],
        answers: [
          ["想变得不一样","不想和别的小豆豆一样","觉得自己和大家长得一样"],
          ["孔雀","尾巴漂亮","老虎","强壮","虎斑","大象","长鼻子","威风"]

          "原因题要回答它为什么出去旅行。",
          "最好按‘动物 + 特点’完整回答。"

      {
        id: 4,

      {

      {

        analysis: [

        ]
      },
      {
        id: 10,
        book: "蛤蟆爷爷的秘诀",
        pdf: "pdf/10.pdf",

        answers: [

      {

    function startQuiz(){
      state.currentBook = shuffle(books)[0];
      state.answers = [];
      renderReader();
    }

    function renderStart(){
      updateProgress("准备开始");
      screen.innerHTML = `
        <div class="screen-head">
          <h2>开始 PDF 绘本模拟</h2>
        </div>
        <div class="screen-body start-panel">
          <div class="hero">📚</div>
          <h2>随机抽取一本绘本</h2>
          <p>系统会从你已经放入 <b>pdf</b> 文件夹里的绘本中随机抽取一本。请先阅读 PDF，再回答问题。适合 iPad 使用。</p>
          <div class="tag-row">
            <div class="tag">随机绘本</div>
            <div class="tag">PDF阅读</div>
            <div class="tag">口述问答</div>
            <div class="tag">错题分析</div>
          </div>
          <button class="btn btn-green" onclick="startQuiz()">开始答题</button>
        </div>
      `;
    }

    function renderReader(){
      const q = state.currentBook;
      updateProgress(`阅读绘本：${q.book}`);
      screen.innerHTML = `
        <div class="screen-head">
          <h2>阅读绘本：${q.book}</h2>
        </div>
        <div class="screen-body">
          <div class="desc">请先阅读下面的 PDF 绘本。看完后点击“开始答题”。如果 iPad 或浏览器内嵌显示不稳定，也可以点击下方链接单独打开 PDF。</div>

          <div class="question-area">
            <div class="book-tag">当前绘本：${q.book}</div>
            <div class="pdf-box">
              <div class="pdf-header">${q.book}（PDF编号：${q.id}）</div>
              <iframe class="pdf-view" src="${q.pdf}#toolbar=1&navpanes=0&scrollbar=1"></iframe>
            </div>

            <div class="pdf-fallback">
              如果上面的 PDF 没有正常显示，请确认文件路径存在：<br>
              <b>${q.pdf}</b><br><br>
              也可以点击这里单独打开：<br>
              <a href="${q.pdf}" target="_blank">${q.pdf}</a>
            </div>
          </div>

          <div class="actions">
            <div class="hint">阅读完绘本后，进入答题页。</div>
            <button class="btn btn-next" onclick="goToQuestions()">开始答题</button>
          </div>
        </div>
      `;
    }

    function goToQuestions(){
      const q = state.currentBook;
      updateProgress("开始作答");
      screen.innerHTML = `
        <div class="screen-head">
          <h2>${q.book} - 回答问题</h2>
        </div>
        <div class="screen-body">
          <div class="desc">请根据刚才阅读的绘本内容回答问题。真实幼升小面试中，这类题通常是口述作答。</div>

          <div class="question-area">
            <div class="book-tag">绘本题目：${q.book}</div>
            <ol class="question-list">
              ${q.questions.map(item => `<li>${item}</li>`).join("")}
            </ol>

            <div class="answer-block multi-input">
              ${q.questions.map((item, idx) => `
                <div>
                  <label>第${idx+1}问作答区</label>
                  <textarea id="answer_${idx}" placeholder="请输入孩子的口述答案"></textarea>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="actions">
            <div class="hint">建议先口头回答，再输入文字。</div>
            <button class="btn btn-next" onclick="submitAnswers()">提交答案</button>
          </div>
        </div>
      `;
    }

    function submitAnswers(){
      const q = state.currentBook;
      state.answers = q.questions.map((_, idx) => document.getElementById(`answer_${idx}`).value.trim());
      renderResult();
    }

    function renderResult(){
      const q = state.currentBook;
      let correctCount = 0;
      let wrongCards = [];

      q.answers.forEach((acceptable, idx) => {
        const user = state.answers[idx] || "";
        const ok = containsAny(user, acceptable);
        if(ok) correctCount++;

        if(!ok){
          wrongCards.push(`
            <div class="wrong-card">
              <h3>错题：第${idx+1}问</h3>
              <div class="wrong-row"><b>问题：</b>${q.questions[idx]}</div>
              <div class="wrong-row"><b>你的答案：</b>${user || "未作答"}</div>
              <div class="wrong-row"><b>参考答案：</b>${acceptable.join(" / ")}</div>
              <div class="analysis"><b>分析：</b>${q.analysis[idx]}</div>
            </div>
          `);
        }
      });

      const percent = Math.round(correctCount / q.questions.length * 100);
      updateProgress("答题完成");

      screen.innerHTML = `
        <div class="screen-head">
          <h2>答题结果：${q.book}</h2>
        </div>
        <div class="screen-body">
          <div class="desc">绘本题更重视孩子的理解和表达。自动评分基于关键词匹配，仅供练习参考。</div>

          <div class="result-summary">
            <div class="stat">
              <div class="num">${q.questions.length}</div>
              <div class="label">总小问数</div>
            </div>
            <div class="stat">
              <div class="num">${correctCount}</div>
              <div class="label">答对小问</div>
            </div>
            <div class="stat">
              <div class="num">${percent}%</div>
              <div class="label">参考正确率</div>
            </div>
          </div>

          ${
            wrongCards.length === 0
              ? `<div class="analysis" style="margin-top:22px;background:#edfbee;color:#236a31;">太棒了，这本绘本答得很好！点击下面绿色按钮，可以随机换一本继续练习。</div>`
              : `<div class="wrong-list">${wrongCards.join("")}</div>`
          }

          <div class="actions" style="margin-top:26px;">
            <button class="btn btn-green" onclick="startQuiz()">重新随机一本</button>
          </div>
        </div>
      `;
    }

    renderStart();
  </script>
