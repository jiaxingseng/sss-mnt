<body>

  <div class="page active" id="question-page">
    <div class="page-index" id="question-index"></div>
    <div class="question-desc">
      [序列-右序-拖曳【家长指导语：根据每行田字格内图形的变化规律，右下角绿色背景数字格子内的图形是什么？记住它们，并在下一页按数字顺序选择出来】]
    </div>

    <div class="puzzle-wrap">
      <div class="puzzle-grid" id="puzzle-grid"></div>
    </div>

    <div class="question-btn-row">
      <button class="main-btn" onclick="enterAnswerPage()">请选择</button>
    </div>
  </div>

  <div class="page" id="answer-page">
    <div class="page-index" id="answer-index"></div>

    <div class="top-bar">
      <div class="pill">序列题</div>
      <div class="timer-box" id="timer">03:00</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-line" id="progress-line">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="rocket" id="rocket"></div>
      </div>
    </div>

    <div class="section-title">作答区</div>
    <div class="answer-grid" id="answer-grid"></div>

    <div class="section-title">选项区</div>
    <div class="options-grid" id="options-grid"></div>

    <div class="footer-actions">
      <div class="tip-text">点击作答区中的图片，可清空该位置并重新选择</div>
      <div class="btn-group">
        <button class="sub-btn" onclick="backToQuestion()">返回题目</button>
        <button class="main-btn" id="next-btn" onclick="submitCurrentAnswer()">下一题</button>
      </div>
    </div>
  </div>

  <div class="page" id="result-page">
    <div class="result-box">
      <h2>作答完成</h2>
      <p id="result-text"></p>
      <div class="result-detail" id="result-detail"></div>
      <div class="analysis-box" id="analysis-box" style="display:none;"></div>
      <div style="margin-top:24px; text-align:center;">
        <button class="main-btn" onclick="restartAll()">重新开始</button>
      </div>
    </div>
  </div>

  <script>
    const EMPTY_ICON = "empty-pic";
    const QUESTION_COUNT = 5;
    const TOTAL_SECONDS = 180;

    const themePools = {
      animalA: ["🐟", "🐦", "🐢", "🦋", "🦆", "🐬"],
      animalB: ["🦊", "🐓", "🦉", "🐧", "🦜", "🐇"],
      ocean: ["🐠", "🐙", "🐚", "⛵", "🛶", "⚓"],
      transport: ["✈️", "🚗", "🚲", "🚀", "🚤", "🚁"],
      weather: ["☀️", "🌙", "⭐", "🌈", "☁️", "⛅"],
      plant: ["🍀", "🌿", "🌵", "🍁", "🌷", "🌻"],
      direction: ["➡️", "⬆️", "↗️", "↘️", "🔺", "🔻"],
      stationery: ["✏️", "🖍️", "📏", "✂️", "📌", "🖊️"],
      toy: ["🪁", "🎈", "🧸", "🎮", "🪀", "🛹"],
      sports: ["🏸", "🏒", "⛳", "🏹", "🥅", "🎯"],
      food: ["🍕", "🍓", "🍉", "🌽", "🥕", "🍤"],
      festival: ["🎁", "🎀", "🎏", "🎐", "🎎", "🪔"],
      travel: ["🧭", "🗺️", "🏕️", "🛶", "🎣", "📍"],
      tool: ["🔧", "🪓", "🔨", "🪛", "⚙️", "🔩"],
      home: ["🔔", "🪑", "🛏️", "🚪", "🪞", "🪟"]
    };

    const directionalSet = new Set([
      "🐟","🐦","🦋","🦆","🐬","🦊","🐓","🦉","🦜",
      "⛵","🛶","✈️","🚗","🚲","🚀","🚤","🚁",
      "🌙","🌈","🍁","➡️","⬆️","↗️","↘️","🔺","🔻",
      "✏️","🖍️","📏","✂️","📌","🖊️","🪁","🎈","🪀","🛹",
      "🏸","🏒","⛳","🏹","🎯","🥕","🍤","🎏","🎐","🧭","🗺️","🎣","📍",
      "🔧","🪓","🔨","🪛","🔔","🚪","🪞"
    ]);

    const allEmojis = Object.values(themePools).flat();

    let questions = [];
    let currentQuestionIndex = 0;
    let timer = null;
    let remain = TOTAL_SECONDS;
    let activeIndex = 0;

    function showPage(id) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function createEmptyPic() {
      const wrap = document.createElement("div");
      wrap.className = "empty-pic";
      wrap.innerHTML = `
        <div class="sun-dot"></div>
        <svg viewBox="0 0 58 42" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 34 L2 18 L14 18 L24 8 L33 18 L40 6 L56 24 L56 34 Z"
                fill="none" stroke="#9f9f9f" stroke-width="3" />
        </svg>
      `;
      return wrap;
    }

    function getTransformStyle(mode) {
      switch (mode) {
        case "small": return "transform: scale(0.72);";
        case "big": return "transform: scale(1.2);";
        case "flip": return "transform: scaleX(-1);";
        case "mirror": return "transform: scaleX(-1);";
        case "rot90": return "transform: rotate(90deg);";
        case "rot180": return "transform: rotate(180deg);";
        default: return "";
      }
    }

    function modeLabel(mode) {
      const map = {
        keep: "保持原样",
        small: "缩小",
        big: "变大",
        flip: "左右翻转",
        mirror: "镜像",
        rot90: "旋转90°",
        rot180: "旋转180°",
        empty: "变为空白图片"
      };
      return map[mode] || mode;
    }

    function renderAnswerText(ans) {
      if (ans === EMPTY_ICON) return "空白图片";
      if (!ans) return "未作答";
      return `${ans.type}${modeLabel(ans.mode || "keep") === "保持原样" ? "" : "（" + modeLabel(ans.mode || "keep") + "）"}`;
    }

    function createGraphic(data) {
      const wrap = document.createElement("div");
      wrap.className = "icon-wrap";

      if (data === EMPTY_ICON || (typeof data === "object" && data.type === EMPTY_ICON)) {
        wrap.appendChild(createEmptyPic());
        return wrap;
      }

      let type = data;
      let mode = "keep";
      if (typeof data === "object") {
        type = data.type;
        mode = data.mode || "keep";
      }

      const holder = document.createElement("div");
      holder.className = "transform-box";
      holder.style = getTransformStyle(mode);

      const span = document.createElement("div");
      span.className = "emoji-icon";
      if (mode === "small") span.classList.add("emoji-small");
      if (mode === "big") span.classList.add("emoji-big");
      span.textContent = type;

      holder.appendChild(span);
      wrap.appendChild(holder);
      return wrap;
    }

    function createMiniGrid(cells) {
      const grid = document.createElement("div");
      grid.className = "mini-grid";
      cells.forEach(item => {
        const cell = document.createElement("div");
        cell.className = "cell";
        if (item && item.type === "num") {
          cell.classList.add("num-cell");
          cell.textContent = item.value;
        } else if (item) {
          cell.appendChild(createGraphic(item));
        }
        grid.appendChild(cell);
      });
      return grid;
    }

    function differentFrom(base, pool) {
      for (const x of pool) {
        if (x !== base) return x;
      }
      return pool[0];
    }

    function pickTwoOrThreeThemes() {
      const keys = shuffle(Object.keys(themePools));
      const count = Math.random() < 0.5 ? 2 : 3;
      return keys.slice(0, count);
    }

    function buildThemeRows() {
      const availableThemes = pickTwoOrThreeThemes();
      return shuffle(
        availableThemes.length === 2
          ? [availableThemes[0], availableThemes[1], availableThemes[0]]
          : availableThemes
      );
    }

    function canTransform(emoji, mode) {
      if (mode === "empty" || mode === "keep" || mode === "small" || mode === "big") return true;
      return directionalSet.has(emoji);
    }

    function buildAnswerResult(base, mode) {
      if (mode === "empty") return EMPTY_ICON;
      return { type: base, mode };
    }

    function sameAnswer(a, b) {
      if (a === EMPTY_ICON && b === EMPTY_ICON) return true;
      if (!a || !b) return false;
      if (typeof a === "object" && typeof b === "object") {
        return a.type === b.type && (a.mode || "keep") === (b.mode || "keep");
      }
      return false;
    }

    function normalizeOption(item) {
      if (item === EMPTY_ICON) return EMPTY_ICON;
      return { type: item.type, mode: item.mode || "keep" };
    }

    function optionExists(arr, item) {
      return arr.some(x => sameAnswer(normalizeOption(x), normalizeOption(item)));
    }

    function generateDynamicOptions(correctAnswers) {
      let opts = [];

      correctAnswers.forEach(ans => {
        if (!optionExists(opts, ans)) opts.push(ans);
      });

      const distractorPool = [];
      allEmojis.forEach(e => {
        distractorPool.push({ type: e, mode: "keep" });
        distractorPool.push({ type: e, mode: "small" });
        distractorPool.push({ type: e, mode: "big" });
        if (directionalSet.has(e)) {
          distractorPool.push({ type: e, mode: "flip" });
          distractorPool.push({ type: e, mode: "rot180" });
          distractorPool.push({ type: e, mode: "rot90" });
        }
      });
      distractorPool.push(EMPTY_ICON);

      const shuffled = shuffle(distractorPool);
      for (const item of shuffled) {
        if (opts.length >= 12) break;
        if (!optionExists(opts, item)) opts.push(item);
      }

      while (opts.length < 12) {
        opts.push(EMPTY_ICON);
      }

      return shuffle(opts).slice(0, 12);
    }

    function generateOneQuestion() {
      const rowThemes = buildThemeRows();

      const row1Pool = shuffle(themePools[rowThemes[0]]);
      const row2Pool = shuffle(themePools[rowThemes[1]]);
      const row3Pool = shuffle(themePools[rowThemes[2]]);

      const row1Bases = row1Pool.slice(0, 4);
      const row2Bases = row2Pool.slice(0, 4);
      const row3Bases = row3Pool.slice(0, 4);

      const baseModes = ["keep", "small", "empty", "flip", "rot90", "rot180", "big"];
      const answerModes = [];

      for (let i = 0; i < 4; i++) {
        const base = row3Bases[i];
        const available = baseModes.filter(m => canTransform(base, m));
        answerModes.push(shuffle(available)[0]);
      }

      const demoRowChoice = shuffle([1, 2, 1, 2]);

      const row1A = [], row1B = [], row1R = [];
      const row2A = [], row2B = [], row2R = [];
      const row3A = [], row3B = [];
      const row3Nums = [
        { type: "num", value: "1" },
        { type: "num", value: "2" },
        { type: "num", value: "3" },
        { type: "num", value: "4" }
      ];

      const correctAnswers = [];
      const explanations = [];

      for (let i = 0; i < 4; i++) {
        const mode = answerModes[i];

        const base1 = row1Bases[i];
        const base2 = row2Bases[i];
        const base3 = row3Bases[i];

        const diff1 = differentFrom(base1, row1Pool);
        const diff2 = differentFrom(base2, row2Pool);
        const diff3 = differentFrom(base3, row3Pool);

        const mode1 = canTransform(base1, mode) ? mode : "keep";
        const mode2 = canTransform(base2, mode) ? mode : "keep";

        if (mode === "empty") {
          row3A.push({ type: base3, mode: "keep" });
          row3B.push({ type: diff3, mode: "keep" });
          correctAnswers.push(EMPTY_ICON);
          explanations.push(`第${i + 1}格：第3行前两个图片分别是 ${base3} 和 ${diff3}，图片不同，所以结果应为空白图片。`);
        } else {
          row3A.push({ type: base3, mode: "keep" });
          row3B.push({ type: base3, mode: "keep" });
          correctAnswers.push(buildAnswerResult(base3, mode));
          explanations.push(`第${i + 1}格：第3行前两个图片相同，都是 ${base3}，根据前两行相同位置已经展示过的规律，结果应${modeLabel(mode)}。`);
        }

        if (demoRowChoice[i] === 1) {
          row1A.push({ type: base1, mode: "keep" });
          row1B.push({ type: mode === "empty" ? diff1 : base1, mode: "keep" });
          row1R.push(mode === "empty" ? EMPTY_ICON : buildAnswerResult(base1, mode1));

          row2A.push({ type: base2, mode: "keep" });
          row2B.push({ type: diff2, mode: "keep" });
          row2R.push(EMPTY_ICON);
        } else {
          row2A.push({ type: base2, mode: "keep" });
          row2B.push({ type: mode === "empty" ? diff2 : base2, mode: "keep" });
          row2R.push(mode === "empty" ? EMPTY_ICON : buildAnswerResult(base2, mode2));

          row1A.push({ type: base1, mode: "keep" });
          row1B.push({ type: diff1, mode: "keep" });
          row1R.push(EMPTY_ICON);
        }
      }

      return {
        row1A, row1B, row1R,
        row2A, row2B, row2R,
        row3A, row3B, row3Nums,
        correctAnswers,
        options: generateDynamicOptions(correctAnswers),
        userAnswers: [null, null, null, null],
        explanations
      };
    }

    function initQuestions() {
      questions = [];
      for (let i = 0; i < QUESTION_COUNT; i++) {
        questions.push(generateOneQuestion());
      }
    }

    function renderQuestionPage() {
      const q = questions[currentQuestionIndex];
      document.getElementById("question-index").textContent = `题目 ${currentQuestionIndex + 1} / ${QUESTION_COUNT}`;

      const puzzleGrid = document.getElementById("puzzle-grid");
      puzzleGrid.innerHTML = "";
      puzzleGrid.appendChild(createMiniGrid(q.row1A));
      puzzleGrid.appendChild(createMiniGrid(q.row1B));
      puzzleGrid.appendChild(createMiniGrid(q.row1R));
      puzzleGrid.appendChild(createMiniGrid(q.row2A));
      puzzleGrid.appendChild(createMiniGrid(q.row2B));
      puzzleGrid.appendChild(createMiniGrid(q.row2R));
      puzzleGrid.appendChild(createMiniGrid(q.row3A));
      puzzleGrid.appendChild(createMiniGrid(q.row3B));
      puzzleGrid.appendChild(createMiniGrid(q.row3Nums));
    }

    function renderAnswerPage() {
      const q = questions[currentQuestionIndex];
      document.getElementById("answer-index").textContent = `第 ${currentQuestionIndex + 1} 题 / 共 ${QUESTION_COUNT} 题`;
      document.getElementById("next-btn").textContent = currentQuestionIndex === QUESTION_COUNT - 1 ? "完成" : "下一题";

      const answerGrid = document.getElementById("answer-grid");
      answerGrid.innerHTML = "";

      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "answer-box" + (i === activeIndex ? " active" : "");

        if (q.userAnswers[i]) {
          box.appendChild(createGraphic(q.userAnswers[i]));
        }

        box.addEventListener("click", () => {
          if (q.userAnswers[i]) {
            q.userAnswers[i] = null;
          } else {
            activeIndex = i;
          }
          renderAnswerPage();
        });

        answerGrid.appendChild(box);
      }

      const optionsGrid = document.getElementById("options-grid");
      optionsGrid.innerHTML = "";

      q.options.forEach(item => {
        const box = document.createElement("div");
        box.className = "option-box";
        box.appendChild(createGraphic(item));

        box.addEventListener("click", () => {
          q.userAnswers[activeIndex] = item === EMPTY_ICON ? EMPTY_ICON : { ...item };
          const next = q.userAnswers.findIndex(v => v === null);
          if (next !== -1) activeIndex = next;
          renderAnswerPage();
        });

        optionsGrid.appendChild(box);
      });
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateProgress() {
      const used = TOTAL_SECONDS - remain;
      const percent = used / TOTAL_SECONDS;
      const line = document.getElementById("progress-line");
      const rocket = document.getElementById("rocket");
      const fill = document.getElementById("progress-fill");

      fill.style.width = `${percent * 100}%`;
      rocket.style.left = `${line.clientWidth * percent}px`;
    }

    function startTimer() {
      stopTimer();
      remain = TOTAL_SECONDS;
      document.getElementById("timer").textContent = formatTime(remain);
      updateProgress();

      timer = setInterval(() => {
        remain--;
        document.getElementById("timer").textContent = formatTime(remain);
        updateProgress();

        if (remain <= 0) {
          stopTimer();
          submitCurrentAnswer();
        }
      }, 1000);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function enterAnswerPage() {
      activeIndex = questions[currentQuestionIndex].userAnswers.findIndex(v => v === null);
      if (activeIndex === -1) activeIndex = 0;
      renderAnswerPage();
      showPage("answer-page");
      startTimer();
    }

    function backToQuestion() {
      stopTimer();
      renderQuestionPage();
      showPage("question-page");
    }

    function submitCurrentAnswer() {
      stopTimer();

      if (currentQuestionIndex < QUESTION_COUNT - 1) {
        currentQuestionIndex++;
        renderQuestionPage();
        showPage("question-page");
      } else {
        finishAll();
      }
    }

    function finishAll() {
      let total = QUESTION_COUNT * 4;
      let score = 0;
      let details = "";
      let analysis = "";
      let hasWrong = false;

      questions.forEach((q, idx) => {
        let subScore = 0;
        let wrongItems = [];

        for (let i = 0; i < 4; i++) {
          if (sameAnswer(q.userAnswers[i], q.correctAnswers[i])) {
            score++;
            subScore++;
          } else {
            wrongItems.push(i);
          }
        }

        details += `第 ${idx + 1} 题：${subScore} / 4 正确<br>`;

        if (wrongItems.length > 0) {
          hasWrong = true;
          analysis += `<div style="margin-bottom:14px;"><strong>第 ${idx + 1} 题错因分析：</strong><br>`;
          wrongItems.forEach(i => {
            const user = q.userAnswers[i];
            const correct = q.correctAnswers[i];
            analysis += `- 第${i + 1}格：你的答案是【${renderAnswerText(user)}】，正确答案是【${renderAnswerText(correct)}】。<br>`;
            analysis += `&nbsp;&nbsp;原因：${q.explanations[i]}<br>`;
          });
          analysis += `</div>`;
        }
      });

      document.getElementById("result-text").textContent = `总正确数：${score} / ${total}`;
      document.getElementById("result-detail").innerHTML = details;

      const analysisBox = document.getElementById("analysis-box");
      if (hasWrong) {
        analysisBox.style.display = "block";
        analysisBox.innerHTML = `<div class="analysis-title">错题解析</div>${analysis}`;
      } else {
        analysisBox.style.display = "block";
        analysisBox.innerHTML = `<div class="analysis-title">表现很好</div>全部答对，没有错题解析。`;
      }

      showPage("result-page");
    }

    function restartAll() {
      stopTimer();
      currentQuestionIndex = 0;
      activeIndex = 0;
      remain = TOTAL_SECONDS;
      initQuestions();
      renderQuestionPage();
      showPage("question-page");
    }

    initQuestions();
    renderQuestionPage();
  </script>
</body>
</html>
