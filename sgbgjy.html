<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>序列题多题版（拖拽修复最终版）</title>
  <style>
    :root {
      --box-size: 110px;
      --answer-gap: 12px;
      --option-gap-x: 12px;
      --option-gap-y: 10px;
      --icon-size: 66px;
      --emoji-size: 40px;
      --emoji-small-size: 28px;
      --emoji-big-size: 50px;
      --empty-size: 58px;
      --empty-dot-size: 11px;
      --empty-dot-left: 7px;
      --empty-dot-top: 7px;
      --empty-svg-size: 46px;
      --empty-svg-left: 6px;
      --empty-svg-top: 6px;
    }

    * { box-sizing: border-box; }
    html, body { touch-action: none; }
    body {
      margin: 0;
      background: #f4f8ee;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #333;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 16px 18px 26px;
      display: none;
    }
    .page.active { display: block; }

    .question-desc {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .puzzle-wrap {
      display: flex;
      justify-content: center;
      margin: 8px 0 20px;
      overflow-x: auto;
    }
    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(3, 150px);
      gap: 12px 22px;
    }
    .mini-grid {
      width: 150px;
      height: 150px;
      border: 2px solid #8f8f8f;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      background: #fff;
    }
    .cell {
      border: 1px solid #a9a9a9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      position: relative;
      overflow: hidden;
    }
    .num-cell {
      background: #43a843;
      color: #fff;
      font-size: 36px;
      font-weight: 500;
    }

    .question-btn-row {
      display: flex;
      justify-content: center;
      margin-top: 8px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #f3b252;
      color: #fff;
      border-radius: 18px;
      padding: 7px 16px;
      font-size: 20px;
      font-weight: 700;
      min-width: 88px;
    }
    .timer-box {
      background: #79c843;
      color: #fff;
      border-radius: 4px;
      padding: 8px 16px;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      min-width: 106px;
      text-align: center;
    }

    .progress-wrap {
      margin-bottom: 12px;
    }
    .progress-line {
      height: 6px;
      background: #d6dccf;
      border-radius: 999px;
      position: relative;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #79c843;
      border-radius: 999px;
      position: absolute;
      left: 0;
      top: 0;
    }
    .rocket {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      background: #79c843;
      clip-path: polygon(100% 50%, 35% 0, 35% 30%, 0 50%, 35% 70%, 35% 100%);
    }
    .rocket::after {
      content: "";
      position: absolute;
      right: 6px;
      top: 5px;
      width: 5px;
      height: 5px;
      background: #fff;
      border-radius: 50%;
    }

    .page-index {
      margin-bottom: 8px;
      color: #7b7b7b;
      font-size: 14px;
      font-weight: 700;
    }

    .section-title {
      font-size: 16px;
      color: #666;
      font-weight: 700;
      margin: 12px 0 8px;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(4, var(--box-size));
      gap: var(--answer-gap);
      margin-bottom: 18px;
      justify-content: center;
    }

    .answer-box,
    .option-box {
      width: var(--box-size);
      height: var(--box-size);
      border: 2px solid #d9d9d9;
      border-radius: 6px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    .answer-box {
      cursor: pointer;
      transition: .15s;
    }

    .answer-box.active {
      border-color: #79c843;
      box-shadow: 0 0 0 3px rgba(121,200,67,.14);
    }

    .answer-box.drag-over {
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(121,200,67,.18);
      background: #f7fff2;
    }

    .options-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      overflow: hidden;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(6, var(--box-size));
      grid-template-rows: repeat(2, var(--box-size));
      gap: var(--option-gap-y) var(--option-gap-x);
      justify-content: center;
    }

    .option-box {
      cursor: grab;
      transition: transform .12s ease, opacity .12s ease, border-color .12s ease;
      touch-action: none;
    }
    .option-box:hover {
      border-color: #8e97ff;
    }
    .option-box.dragging {
      opacity: .3;
      transform: scale(.96);
    }

    .footer-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 18px;
      gap: 12px;
    }
    .tip-text {
      color: #888;
      font-size: 13px;
      text-align: center;
      line-height: 1.7;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .center-btn {
      justify-content: center;
    }

    .main-btn {
      border: none;
      border-radius: 8px;
      background: #79c843;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      padding: 10px 20px;
      cursor: pointer;
      touch-action: none;
    }

    .icon-wrap {
      width: var(--icon-size);
      height: var(--icon-size);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
      flex-shrink: 0;
      pointer-events: none;
    }

    .transform-box {
      display: flex;
      align-items: center;
      justify-content: center;
      transform-origin: center center;
      pointer-events: none;
    }

    .emoji-icon {
      font-size: var(--emoji-size);
      line-height: 1;
      user-select: none;
      font-family: "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Microsoft YaHei",sans-serif;
      pointer-events: none;
    }
    .emoji-small {
      font-size: var(--emoji-small-size);
    }
    .emoji-big {
      font-size: var(--emoji-big-size);
    }

    .empty-pic {
      width: var(--empty-size);
      height: var(--empty-size);
      border: 3px solid #cfcfcf;
      background: #fff;
      position: relative;
      display: block;
      pointer-events: none;
    }
    .empty-pic .sun-dot {
      position: absolute;
      width: var(--empty-dot-size);
      height: var(--empty-dot-size);
      border: 3px solid #b3b3b3;
      border-radius: 50%;
      left: var(--empty-dot-left);
      top: var(--empty-dot-top);
      background: transparent;
    }
    .empty-pic svg {
      position: absolute;
      left: var(--empty-svg-left);
      top: var(--empty-svg-top);
      width: var(--empty-svg-size);
      height: var(--empty-svg-size);
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      width: var(--box-size);
      height: var(--box-size);
      border: 2px solid #79c843;
      border-radius: 8px;
      background: rgba(255,255,255,.96);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%) scale(1.02);
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
    }

    .result-box {
      padding-top: 26px;
    }
    .result-box h2 {
      font-size: 30px;
      margin-bottom: 14px;
      text-align: center;
    }
    .result-box p {
      font-size: 20px;
      color: #666;
      margin-bottom: 12px;
      text-align: center;
    }
    .result-detail,
    .analysis-box {
      margin: 18px auto 0;
      width: min(100%, 900px);
      text-align: left;
      background: #fff;
      border: 1px solid #d9e2cf;
      border-radius: 10px;
      padding: 14px 16px;
      line-height: 1.8;
      font-size: 16px;
    }
    .analysis-box {
      margin-top: 16px;
      background: #fcfff8;
    }
    .analysis-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #516247;
    }

    @media (max-width: 1024px) {
      :root {
        --box-size: 88px;
        --answer-gap: 10px;
        --option-gap-x: 8px;
        --option-gap-y: 8px;
        --icon-size: 56px;
        --emoji-size: 34px;
        --emoji-small-size: 24px;
        --emoji-big-size: 42px;
        --empty-size: 48px;
        --empty-dot-size: 9px;
        --empty-dot-left: 5px;
        --empty-dot-top: 5px;
        --empty-svg-size: 38px;
        --empty-svg-left: 4px;
        --empty-svg-top: 4px;
      }

      .page { width: min(100%, 900px); }
      .puzzle-grid {
        grid-template-columns: repeat(3, 136px);
        gap: 10px 16px;
      }
      .mini-grid {
        width: 136px;
        height: 136px;
      }
    }

    @media (max-width: 900px) {
      :root {
        --box-size: 78px;
        --answer-gap: 8px;
        --option-gap-x: 6px;
        --option-gap-y: 6px;
        --icon-size: 50px;
        --emoji-size: 30px;
        --emoji-small-size: 21px;
        --emoji-big-size: 37px;
        --empty-size: 42px;
        --empty-dot-size: 7px;
        --empty-dot-left: 4px;
        --empty-dot-top: 4px;
        --empty-svg-size: 32px;
        --empty-svg-left: 3px;
        --empty-svg-top: 3px;
      }

      .page { width: min(100%, 820px); }
      .puzzle-grid {
        grid-template-columns: repeat(3, 128px);
        gap: 10px 14px;
      }
      .mini-grid {
        width: 128px;
        height: 128px;
      }
    }

    @media (max-width: 760px) {
      :root {
        --box-size: 72px;
        --answer-gap: 8px;
        --option-gap-x: 5px;
        --option-gap-y: 5px;
        --icon-size: 46px;
        --emoji-size: 28px;
        --emoji-small-size: 20px;
        --emoji-big-size: 34px;
        --empty-size: 40px;
        --empty-dot-size: 7px;
        --empty-dot-left: 4px;
        --empty-dot-top: 4px;
        --empty-svg-size: 30px;
        --empty-svg-left: 3px;
        --empty-svg-top: 3px;
      }
    }

    @media (max-width: 680px) {
      .page {
        padding-left: 10px;
        padding-right: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="page active" id="question-page">
    <div class="page-index" id="question-index"></div>
    <div class="question-desc">
      [序列-右序-拖曳【家长指导语：根据每行田字格内图形的变化规律，右下角绿色背景数字格子内的图形是什么？记住它们，并在下一页拖到作答区中】]
    </div>

    <div class="puzzle-wrap">
      <div class="puzzle-grid" id="puzzle-grid"></div>
    </div>

    <div class="question-btn-row">
      <button class="main-btn" id="choose-btn">请选择</button>
    </div>
  </div>

  <div class="page" id="answer-page">
    <div class="page-index" id="answer-index"></div>

    <div class="top-bar">
      <div class="pill">序列题</div>
      <div class="timer-box" id="timer">03:00</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-line" id="progress-line">
        <div class="progress-fill" id="progress-fill"></div>
        <div class="rocket" id="rocket"></div>
      </div>
    </div>

    <div class="section-title">作答区</div>
    <div class="answer-grid" id="answer-grid"></div>

    <div class="section-title">选项区</div>
    <div class="options-wrap">
      <div class="options-grid" id="options-grid"></div>
    </div>

    <div class="footer-actions">
      <div class="tip-text">
        请将下方选项拖到作答区中；点击作答区中的图片可清空该位置并重新拖入。
      </div>
      <div class="btn-group center-btn">
        <button class="main-btn" id="next-btn">下一题</button>
      </div>
    </div>
  </div>

  <div class="page" id="result-page">
    <div class="result-box">
      <h2>作答完成</h2>
      <p id="result-text"></p>
      <div class="result-detail" id="result-detail"></div>
      <div class="analysis-box" id="analysis-box" style="display:none;"></div>
      <div style="margin-top:24px; text-align:center;">
        <button class="main-btn" id="restart-btn">重新开始</button>
      </div>
    </div>
  </div>

  <script>
    const EMPTY_ICON = "empty-pic";
    const QUESTION_COUNT = 5;
    const TOTAL_SECONDS = 180;
    const OPTION_COUNT = 12;

    const themePools = {
      animalA: ["🐟", "🐦", "🐢", "🦋", "🦆", "🐬"],
      animalB: ["🦊", "🐓", "🦉", "🐧", "🦜", "🐇"],
      ocean: ["🐠", "🐙", "🐚", "⛵", "🛶", "⚓"],
      transport: ["✈️", "🚗", "🚲", "🚀", "🚤", "🚁"],
      weather: ["☀️", "🌙", "⭐", "🌈", "☁️", "⛅"],
      plant: ["🍀", "🌿", "🌵", "🍁", "🌷", "🌻"],
      stationery: ["✏️", "🖍️", "📏", "✂️", "📌", "🖊️"],
      toy: ["🪁", "🎈", "🧸", "🎮", "🪀", "🛹"],
      sports: ["🏸", "🏒", "⛳", "🏹", "🥅", "🎯"],
      food: ["🍕", "🍓", "🍉", "🌽", "🥕", "🍤"],
      festival: ["🎁", "🎀", "🎏", "🎐", "🎎", "🪔"],
      travel: ["🧭", "🗺️", "🏕️", "🛶", "🎣", "📍"],
      tool: ["🔧", "🪓", "🔨", "🪛", "⚙️", "🔩"],
      home: ["🔔", "🪑", "🛏️", "🚪", "🪞", "🪟"],
      fruit: ["🍌", "🍍", "🍒", "🥭", "🍐", "🍋"],
      insect: ["🐛", "🪲", "🐜", "🦗", "🪰", "🐝"],
      sky: ["☄️", "🌤️", "🌥️", "🌦️", "🌪️", "🌬️"],
      music: ["🎻", "🎺", "🎷", "🪕", "🎸", "🥁"],
      clothing: ["👟", "🧢", "👕", "🧤", "👒", "👠"],
      kitchen: ["🥄", "🍴", "🫖", "🫙", "🍳", "🥣"],
      school: ["📚", "📐", "🧮", "📎", "📝", "📒"]
    };

    const themeGroups = [
      ["animalA", "animalB", "insect"],
      ["ocean", "weather", "sky"],
      ["transport", "travel"],
      ["plant", "food", "fruit"],
      ["stationery", "school", "tool"],
      ["toy", "sports", "festival", "music"],
      ["home", "clothing", "kitchen"]
    ];

    const flipAllowed = new Set([
      "✈️","🚗","🚲","🚀","🚤","🐟","🐦","🦆","🐬","🦊","🐓","🦜","⛵","🛶",
      "✏️","🖍️","🖊️","🪁","🎈","🪀","🛹","🏸","🏒","⛳","🏹","🥕","🍤",
      "🎏","🎐","🧭","🗺️","🔧","🪓","🔨","🪛","🍌","🍋","🎻","🎺","🎷","🎸",
      "👟","🧢","👕","🧤","👠","🥄","🍴","📐","📎","📝"
    ]);

    const rot90Allowed = new Set([
      "✈️","🚀","🚁","📏","📌","🔧","🔨","🪛","🎯","🧭","🗺️","🎺","🥄","🍴","📐"
    ]);

    const rot180Allowed = new Set([
      "✈️","🚀","🔧","🧭","📍","🎺"
    ]);

    const visualCollapseSet = new Set([
      "🥄", "🍴",
      "🎯",
      "📍",
      "🔔",
      "🌙",
      "🍁",
      "🪓",
      "🚪",
      "✏️",
      "🎣",
      "📏",
      "🔨",
      "🪛",
      "🔧",
      "🧭",
      "🗺️",
      "🎺"
    ]);

    const modeCandidates = ["keep","small","big","empty","flip","mirror","rot90","rot180"];
    const allThemeItems = Object.values(themePools).flat();

    let questions = [];
    let currentQuestionIndex = 0;
    let timer = null;
    let remain = TOTAL_SECONDS;
    let activeIndex = 0;

    let currentDragData = null;
    let dragGhost = null;
    let dragSourceBox = null;
    let dragPointerId = null;
    let isPointerDown = false;
    let isCustomDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let answerBoxRects = [];
    let isSubmitting = false;
    const DRAG_THRESHOLD = 8;

    function showPage(id) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function sampleOne(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function createEmptyPic() {
      const wrap = document.createElement("div");
      wrap.className = "empty-pic";

      const sunDot = document.createElement("div");
      sunDot.className = "sun-dot";

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("viewBox", "0 0 58 42");

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", "M2 34 L2 18 L14 18 L24 8 L33 18 L40 6 L56 24 L56 34 Z");
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "#9f9f9f");
      path.setAttribute("stroke-width", "3");

      svg.appendChild(path);
      wrap.appendChild(sunDot);
      wrap.appendChild(svg);

      return wrap;
    }

    function getTransformStyle(mode) {
      switch (mode) {
        case "small": return "transform: scale(0.72);";
        case "big": return "transform: scale(1.2);";
        case "flip": return "transform: scaleX(-1);";
        case "mirror": return "transform: scaleX(-1);";
        case "rot90": return "transform: rotate(90deg);";
        case "rot180": return "transform: rotate(180deg);";
        default: return "";
      }
    }

    function modeLabel(mode) {
      const map = {
        keep: "保持原样",
        small: "缩小",
        big: "变大",
        flip: "左右翻转",
        mirror: "镜像",
        rot90: "旋转90°",
        rot180: "旋转180°",
        empty: "变为空白图片"
      };
      return map[mode] || mode;
    }

    function renderAnswerText(ans) {
      if (ans === EMPTY_ICON) return "空白图片";
      if (!ans) return "未作答";
      const m = ans.mode || "keep";
      return `${ans.type}${m === "keep" ? "" : "（" + modeLabel(m) + "）"}`;
    }

    function createGraphic(data) {
      const wrap = document.createElement("div");
      wrap.className = "icon-wrap";

      if (data === EMPTY_ICON || (typeof data === "object" && data.type === EMPTY_ICON)) {
        wrap.appendChild(createEmptyPic());
        return wrap;
      }

      let type = data;
      let mode = "keep";
      if (typeof data === "object") {
        type = data.type;
        mode = data.mode || "keep";
      }

      const holder = document.createElement("div");
      holder.className = "transform-box";
      holder.style = getTransformStyle(mode);

      const span = document.createElement("div");
      span.className = "emoji-icon";
      if (mode === "small") span.classList.add("emoji-small");
      if (mode === "big") span.classList.add("emoji-big");
      span.textContent = type;

      holder.appendChild(span);
      wrap.appendChild(holder);
      return wrap;
    }

    function createMiniGrid(cells) {
      const grid = document.createElement("div");
      grid.className = "mini-grid";
      cells.forEach(item => {
        const cell = document.createElement("div");
        cell.className = "cell";
        if (item && item.type === "num") {
          cell.classList.add("num-cell");
          cell.textContent = item.value;
        } else if (item) {
          cell.appendChild(createGraphic(item));
        }
        grid.appendChild(cell);
      });
      return grid;
    }

    function createMiniGridScaled(cells, size = 110) {
      const grid = document.createElement("div");
      grid.style.width = `${size}px`;
      grid.style.height = `${size}px`;
      grid.style.border = "2px solid #8f8f8f";
      grid.style.display = "grid";
      grid.style.gridTemplateColumns = "1fr 1fr";
      grid.style.gridTemplateRows = "1fr 1fr";
      grid.style.background = "#fff";

      cells.forEach(item => {
        const cell = document.createElement("div");
        cell.style.border = "1px solid #a9a9a9";
        cell.style.display = "flex";
        cell.style.alignItems = "center";
        cell.style.justifyContent = "center";
        cell.style.background = "#fff";
        cell.style.overflow = "hidden";

        if (item && item.type === "num") {
          cell.style.background = "#43a843";
          cell.style.color = "#fff";
          cell.style.fontSize = size < 100 ? "22px" : "28px";
          cell.style.fontWeight = "600";
          cell.textContent = item.value;
        } else if (item) {
          const graphic = createGraphic(item);
          graphic.style.transform = "scale(0.72)";
          cell.appendChild(graphic);
        }

        grid.appendChild(cell);
      });

      return grid;
    }

    function createResultPuzzle(q) {
      const wrap = document.createElement("div");
      wrap.style.margin = "10px 0 12px";
      wrap.style.overflowX = "auto";

      const grid = document.createElement("div");
      grid.style.display = "grid";

      grid.style.gap = "8px 12px";

      grid.style.minWidth = "fit-content";

        q.row1A, q.row1B, q.row1R,

      ];

      blocks.forEach(cells => {
        grid.appendChild(createMiniGridScaled(cells, 110));
      });

      wrap.appendChild(grid);
      return wrap;
    }

    function createResultAnswerRow(titleText, answerArr) {
      const wrap = document.createElement("div");
      wrap.style.marginTop = "8px";

      const title = document.createElement("div");
      title.textContent = titleText;
      title.style.fontWeight = "700";
      title.style.marginBottom = "6px";
      wrap.appendChild(title);

      const row = document.createElement("div");
      row.style.display = "grid";
      row.style.gridTemplateColumns = "repeat(4, 78px)";

      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");

        box.style.borderRadius = "6px";

        box.style.display = "flex";

        box.style.justifyContent = "center";

          const g = createGraphic(answerArr[i]);
          g.style.transform = "scale(0.72)";
          box.appendChild(g);

          box.style.color = "#bbb";
          box.style.fontSize = "13px";
          box.textContent = "空";
        }

        row.appendChild(box);
      }

      wrap.appendChild(row);
      return wrap;
    }

    function pickThreeDifferentThemesByGroup() {
      const groups = shuffle(themeGroups).slice(0, 3);
      return groups.map(group => sampleOne(group));
    }

    function buildThemeRows() {
      return pickThreeDifferentThemesByGroup();
    }

    function getAllowedModes(item) {
      const modes = ["keep", "small", "big"];
      if (flipAllowed.has(item.type)) {
        modes.push("flip");
        modes.push("mirror");
      }
      if (rot90Allowed.has(item.type)) modes.push("rot90");
      if (rot180Allowed.has(item.type)) modes.push("rot180");
      return modes;
    }

    function canTransform(item, mode) {
      if (mode === "empty") return true;
      return getAllowedModes(item).includes(mode);
    }

    function buildAnswerResult(base, mode) {
      if (mode === "empty") return EMPTY_ICON;
      return { ...base, mode };
    }

    function sameAnswer(a, b) {
      if (a === EMPTY_ICON && b === EMPTY_ICON) return true;
      if (!a || !b) return false;
      if (typeof a === "object" && typeof b === "object") {
        return a.type === b.type && (a.mode || "keep") === (b.mode || "keep");
      }
      return false;
    }

    function normalizeOption(item) {
      if (item === EMPTY_ICON) return EMPTY_ICON;
      return { type: item.type, mode: item.mode || "keep" };
    }

    function normalizeVisualMode(type, mode) {
      if (!mode) mode = "keep";
      if (mode === "mirror") mode = "flip";

      if (visualCollapseSet.has(type)) {
        if (mode === "flip" || mode === "rot90" || mode === "rot180") {
          return "keep";
        }
      }

      return mode;
    }

    function visualOptionKey(item) {
      if (item === EMPTY_ICON) return EMPTY_ICON;
      const n = normalizeOption(item);
      return `${n.type}__${normalizeVisualMode(n.type, n.mode)}`;
    }

    function optionExists(arr, item) {
      const key = visualOptionKey(item);
      return arr.some(x => visualOptionKey(x) === key);
    }

    function dedupeOptionsByVisualEffect(arr) {
      const result = [];
      const seen = new Set();

      arr.forEach(item => {
        const normalized = normalizeOption(item);
        const key = visualOptionKey(normalized);
        if (!seen.has(key)) {
          seen.add(key);
          result.push(normalized);
        }
      });

      return result;
    }

    function pushUniqueOption(arr, item) {
      if (item == null) return false;
      const normalized = normalizeOption(item);
      if (optionExists(arr, normalized)) return false;
      arr.push(normalized);
      return true;
    }

    function createEmojiBase(emoji) {
      return { type: emoji, mode: "keep" };
    }

    function getSimilarDistractors(ans, correctAnswers) {
      const list = [];

      if (ans === EMPTY_ICON) {
        correctAnswers.forEach(a => {
          if (a && a !== EMPTY_ICON && typeof a === "object") {
            list.push({ type: a.type, mode: "keep" });
            list.push({ type: a.type, mode: "small" });
            list.push({ type: a.type, mode: "big" });
          }
        });
        return list;
      }

      if (!ans || typeof ans !== "object") return list;

      const base = { type: ans.type };
      const mode = ans.mode || "keep";

      if (mode === "small") {
        list.push({ ...base, mode: "keep" });
        list.push({ ...base, mode: "big" });
      } else if (mode === "big") {
        list.push({ ...base, mode: "keep" });
        list.push({ ...base, mode: "small" });
      } else if (mode === "keep") {
        list.push({ ...base, mode: "small" });
        list.push({ ...base, mode: "big" });
        if (flipAllowed.has(ans.type)) {
          list.push({ ...base, mode: "flip" });
          list.push({ ...base, mode: "mirror" });
        }
        if (rot90Allowed.has(ans.type)) list.push({ ...base, mode: "rot90" });
        if (rot180Allowed.has(ans.type)) list.push({ ...base, mode: "rot180" });
      } else if (mode === "flip" || mode === "mirror") {
        list.push({ ...base, mode: "keep" });
        list.push({ ...base, mode: "small" });
        list.push({ ...base, mode: "big" });
      } else if (mode === "rot90") {
        list.push({ ...base, mode: "keep" });
        list.push({ ...base, mode: "small" });
        list.push({ ...base, mode: "big" });
        if (rot180Allowed.has(ans.type)) list.push({ ...base, mode: "rot180" });
      } else if (mode === "rot180") {
        list.push({ ...base, mode: "keep" });
        list.push({ ...base, mode: "small" });
        list.push({ ...base, mode: "big" });
        if (rot90Allowed.has(ans.type)) list.push({ ...base, mode: "rot90" });
      }

      return list;
    }

    function getCrossDistractors(correctAnswers) {
      const list = [];
      correctAnswers.forEach(ans => {
        if (ans && ans !== EMPTY_ICON && typeof ans === "object") {
          list.push({ type: ans.type, mode: "keep" });
          list.push({ type: ans.type, mode: "small" });
          list.push({ type: ans.type, mode: "big" });
          if (flipAllowed.has(ans.type)) {
            list.push({ type: ans.type, mode: "flip" });
            list.push({ type: ans.type, mode: "mirror" });
          }
          if (rot90Allowed.has(ans.type)) list.push({ type: ans.type, mode: "rot90" });
          if (rot180Allowed.has(ans.type)) list.push({ type: ans.type, mode: "rot180" });
        }
      });
      return list;
    }

    function buildGlobalDistractorPool() {
      const pool = [];
      allThemeItems.forEach(e => {
        pool.push({ type: e, mode: "keep" });
        pool.push({ type: e, mode: "small" });
        pool.push({ type: e, mode: "big" });
        if (flipAllowed.has(e)) {
          pool.push({ type: e, mode: "flip" });
          pool.push({ type: e, mode: "mirror" });
        }
        if (rot90Allowed.has(e)) pool.push({ type: e, mode: "rot90" });
        if (rot180Allowed.has(e)) pool.push({ type: e, mode: "rot180" });
      });
      pool.push(EMPTY_ICON);
      return shuffle(dedupeOptionsByVisualEffect(pool));
    }

    function generateDynamicOptions(correctAnswers) {
      let opts = [];
      const uniqueCorrect = dedupeOptionsByVisualEffect(correctAnswers);

      uniqueCorrect.forEach(ans => {
        pushUniqueOption(opts, ans);
      });

      let priorityDistractors = [];
      uniqueCorrect.forEach(ans => {
        priorityDistractors.push(...getSimilarDistractors(ans, uniqueCorrect));
      });
      priorityDistractors.push(...getCrossDistractors(uniqueCorrect));

      shuffle(dedupeOptionsByVisualEffect(priorityDistractors)).forEach(item => {
        if (opts.length < OPTION_COUNT) {
          pushUniqueOption(opts, item);
        }
      });

      buildGlobalDistractorPool().forEach(item => {
        if (opts.length < OPTION_COUNT) {
          pushUniqueOption(opts, item);
        }
      });

      opts = dedupeOptionsByVisualEffect(opts);

      const correctKeys = new Set(uniqueCorrect.map(visualOptionKey));
      uniqueCorrect.forEach(ans => {
        if (!optionExists(opts, ans)) {
          if (opts.length >= OPTION_COUNT) {
            for (let i = opts.length - 1; i >= 0; i--) {
              if (!correctKeys.has(visualOptionKey(opts[i]))) {
                opts.splice(i, 1);
                break;
              }
            }
          }
          pushUniqueOption(opts, ans);
        }
      });

      opts = dedupeOptionsByVisualEffect(opts);
      while (opts.length > OPTION_COUNT) {
        let removed = false;
        for (let i = opts.length - 1; i >= 0; i--) {
          if (!correctKeys.has(visualOptionKey(opts[i]))) {
            opts.splice(i, 1);
            removed = true;
            break;
          }
        }
        if (!removed) break;
      }

      if (opts.length < OPTION_COUNT) {
        const extraPool = buildGlobalDistractorPool();
        extraPool.forEach(item => {
          if (opts.length < OPTION_COUNT && !optionExists(opts, item)) {
            opts.push(normalizeOption(item));
          }
        });
      }

      opts = dedupeOptionsByVisualEffect(opts);
      return shuffle(opts).slice(0, OPTION_COUNT);
    }

    function buildColumnRules() {
      return shuffle([...modeCandidates]).slice(0, 4);
    }

    function pickBaseForRule(rule, pool, usedSet, usedAcrossRows) {
      let candidates = [];

      if (rule === "flip" || rule === "mirror") {
        candidates = pool.filter(x => flipAllowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
      } else if (rule === "rot90") {
        candidates = pool.filter(x => rot90Allowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
      } else if (rule === "rot180") {
        candidates = pool.filter(x => rot180Allowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
      } else {
        candidates = pool.filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
      }

      if (candidates.length === 0) {
        if (rule === "flip" || rule === "mirror") {
          candidates = allThemeItems.filter(x => flipAllowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
        } else if (rule === "rot90") {
          candidates = allThemeItems.filter(x => rot90Allowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
        } else if (rule === "rot180") {
          candidates = allThemeItems.filter(x => rot180Allowed.has(x) && !usedSet.has(x) && !usedAcrossRows.has(x));
        } else {
          candidates = pool.filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
        }
      }

      if (candidates.length === 0) {
        if (rule === "flip" || rule === "mirror") {
          candidates = [...flipAllowed].filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
        } else if (rule === "rot90") {
          candidates = [...rot90Allowed].filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
        } else if (rule === "rot180") {
          candidates = [...rot180Allowed].filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
        } else {
          candidates = allThemeItems.filter(x => !usedSet.has(x) && !usedAcrossRows.has(x));
        }
      }

      if (candidates.length === 0) {
        candidates = pool.filter(x => !usedSet.has(x));
      }

      if (candidates.length === 0) {
        candidates = [...pool];
      }

      const picked = sampleOne(candidates);
      usedSet.add(picked);
      usedAcrossRows.add(picked);
      return createEmojiBase(picked);
    }

    function differentEmojiBase(base, pool, usedAcrossRows) {
      let found = pool.find(x => x !== base.type && !usedAcrossRows.has(x));
      if (!found) found = pool.find(x => x !== base.type);
      if (!found) found = pool[0];
      usedAcrossRows.add(found);
      return createEmojiBase(found);
    }

    function buildRowByPattern(base, pool, usedAcrossRows, rule, pattern) {
      if (pattern === "same") {
        return {
          left: { ...base, mode: "keep" },
          right: { ...base, mode: "keep" },
          result: buildAnswerResult(base, rule)
        };
      } else {
        const d = differentEmojiBase(base, pool, usedAcrossRows);
        return {
          left: { ...base, mode: "keep" },
          right: { ...d, mode: "keep" },
          result: EMPTY_ICON
        };
      }
    }

    function pickThirdRowPatternByRule(rule) {
      return rule === "empty" ? "diff" : "same";
    }

    function oppositePattern(pattern) {
      return pattern === "same" ? "diff" : "same";
    }

    function decideDemoPatterns(targetPattern) {
      // 50%：两行都和第3行同推导
      // 50%：只有1行和第3行同推导，另一行展示另一种推导
      if (Math.random() < 0.5) {
        return [targetPattern, targetPattern];
      }

      if (Math.random() < 0.5) {
        return [targetPattern, oppositePattern(targetPattern)];
      } else {
        return [oppositePattern(targetPattern), targetPattern];
      }
    }

    function generateOneQuestion() {
      const rowThemes = buildThemeRows();

      const row1Pool = shuffle(themePools[rowThemes[0]]);
      const row2Pool = shuffle(themePools[rowThemes[1]]);
      const row3Pool = shuffle(themePools[rowThemes[2]]);

      const columnRules = buildColumnRules();

      const used1 = new Set();
      const used2 = new Set();
      const used3 = new Set();
      const usedAcrossRows = new Set();

      const row1Bases = columnRules.map(rule => pickBaseForRule(rule, row1Pool, used1, usedAcrossRows));
      const row2Bases = columnRules.map(rule => pickBaseForRule(rule, row2Pool, used2, usedAcrossRows));
      const row3Bases = columnRules.map(rule => pickBaseForRule(rule, row3Pool, used3, usedAcrossRows));

      const row1A = [], row1B = [], row1R = [];
      const row2A = [], row2B = [], row2R = [];
      const row3A = [], row3B = [];
      const row3Nums = [
        { type: "num", value: "1" },
        { type: "num", value: "2" },
        { type: "num", value: "3" },
        { type: "num", value: "4" }
      ];

      const correctAnswers = [];
      const explanations = [];

      for (let i = 0; i < 4; i++) {
        const rule = columnRules[i];
        const b1 = row1Bases[i];
        const b2 = row2Bases[i];
        const b3 = row3Bases[i];

        const row3Pattern = pickThirdRowPatternByRule(rule);
        const [row1Pattern, row2Pattern] = decideDemoPatterns(row3Pattern);

        const row1Data = buildRowByPattern(b1, row1Pool, usedAcrossRows, rule, row1Pattern);
        const row2Data = buildRowByPattern(b2, row2Pool, usedAcrossRows, rule, row2Pattern);
        const row3Data = buildRowByPattern(b3, row3Pool, usedAcrossRows, rule, row3Pattern);

        row1A.push(row1Data.left);
        row1B.push(row1Data.right);
        row1R.push(row1Data.result);

        row2A.push(row2Data.left);
        row2B.push(row2Data.right);
        row2R.push(row2Data.result);

        row3A.push(row3Data.left);
        row3B.push(row3Data.right);

        correctAnswers.push(row3Data.result);

        if (row3Pattern === "same") {
          explanations.push(`第${i + 1}格：这一列第3行前两个图片相同。观察前两行，至少有一行也是“前两个图片相同，结果应${modeLabel(rule)}”，所以第3行答案应${modeLabel(rule)}。`);
        } else {
          explanations.push(`第${i + 1}格：这一列第3行前两个图片不同。观察前两行，至少有一行也是“前两个图片不同，结果为空白图片”，所以第3行答案应为空白图片。`);
        }
      }

      return {
        row1A, row1B, row1R,
        row2A, row2B, row2R,
        row3A, row3B, row3Nums,
        correctAnswers,
        options: generateDynamicOptions(correctAnswers),
        userAnswers: [null, null, null, null],
        explanations,
        rowThemes
      };
    }

    function setAnswerAt(index, item) {
      const q = questions[currentQuestionIndex];
      q.userAnswers[index] = item === EMPTY_ICON ? EMPTY_ICON : { ...item };
      const next = q.userAnswers.findIndex(v => v === null);
      activeIndex = next !== -1 ? next : index;
      renderAnswerPage();
    }

    function cacheAnswerBoxRects() {
      answerBoxRects = [...document.querySelectorAll(".answer-box")].map(box => {
        const rect = box.getBoundingClientRect();
        return {
          box,
          index: Number(box.dataset.index),
          left: rect.left,
          top: rect.top,
          right: rect.right,
          bottom: rect.bottom,
          centerX: rect.left + rect.width / 2,
          centerY: rect.top + rect.height / 2
        };
      });
    }

    function clearDragState() {
      document.querySelectorAll(".answer-box").forEach(b => b.classList.remove("drag-over"));
      if (dragSourceBox) dragSourceBox.classList.remove("dragging");
      if (dragGhost && dragGhost.parentNode) dragGhost.parentNode.removeChild(dragGhost);

      dragGhost = null;
      dragSourceBox = null;
      currentDragData = null;
      dragPointerId = null;
      isPointerDown = false;
      isCustomDragging = false;
      dragStartX = 0;
      dragStartY = 0;
      answerBoxRects = [];
    }

    function createDragGhost(item, x, y) {
      dragGhost = document.createElement("div");
      dragGhost.className = "drag-ghost";
      dragGhost.appendChild(createGraphic(item));
      document.body.appendChild(dragGhost);
      moveDragGhost(x, y);
    }

    function moveDragGhost(x, y) {
      if (!dragGhost) return;
      dragGhost.style.left = `${x}px`;
      dragGhost.style.top = `${y}px`;
    }

    function highlightAnswerBoxByPoint(x, y) {
      document.querySelectorAll(".answer-box").forEach(b => b.classList.remove("drag-over"));

      let hit = null;

      for (const item of answerBoxRects) {
        if (x >= item.left && x <= item.right && y >= item.top && y <= item.bottom) {
          hit = item;
          break;
        }
      }

      if (!hit) {
        let minDist = Infinity;
        for (const item of answerBoxRects) {
          const dx = x - item.centerX;
          const dy = y - item.centerY;
          const dist = dx * dx + dy * dy;
          if (dist < minDist) {
            minDist = dist;
            hit = item;
          }
        }

        if (hit) {
          const dx = x - hit.centerX;
          const dy = y - hit.centerY;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 90) hit = null;
        }
      }

      if (hit) hit.box.classList.add("drag-over");
      return hit;
    }

    function dropByPoint(x, y) {
      const hit = highlightAnswerBoxByPoint(x, y);
      if (!hit) return false;

      const index = hit.index;
      if (!Number.isNaN(index) && currentDragData != null) {
        setAnswerAt(index, currentDragData);
        return true;
      }
      return false;
    }

    function setupPointerDrag(box, item) {
      box.addEventListener("pointerdown", e => {
        if (e.button !== undefined && e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();

        currentDragData = item;
        dragSourceBox = box;
        dragPointerId = e.pointerId;
        isPointerDown = true;
        isCustomDragging = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;

        box.setPointerCapture?.(e.pointerId);
        cacheAnswerBoxRects();
      });

      box.addEventListener("pointermove", e => {
        if (!isPointerDown || e.pointerId !== dragPointerId) return;
        e.preventDefault();
        e.stopPropagation();

        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        const moved = Math.sqrt(dx * dx + dy * dy);

        if (!isCustomDragging && moved >= DRAG_THRESHOLD) {
          isCustomDragging = true;
          box.classList.add("dragging");
          createDragGhost(currentDragData, e.clientX, e.clientY);
        }

        if (isCustomDragging) {
          moveDragGhost(e.clientX, e.clientY);
          highlightAnswerBoxByPoint(e.clientX, e.clientY);
        }
      });

      box.addEventListener("pointerup", e => {
        if (!isPointerDown || e.pointerId !== dragPointerId) return;
        e.preventDefault();
        e.stopPropagation();

        if (isCustomDragging) {
          dropByPoint(e.clientX, e.clientY);
        }

        clearDragState();
      });

      box.addEventListener("pointercancel", e => {
        if (!isPointerDown || e.pointerId !== dragPointerId) return;
        clearDragState();
      });
    }

    function renderQuestionPage() {
      const q = questions[currentQuestionIndex];
      document.getElementById("question-index").textContent = `题目 ${currentQuestionIndex + 1} / ${QUESTION_COUNT}`;

      const puzzleGrid = document.getElementById("puzzle-grid");
      puzzleGrid.innerHTML = "";
      puzzleGrid.appendChild(createMiniGrid(q.row1A));
      puzzleGrid.appendChild(createMiniGrid(q.row1B));
      puzzleGrid.appendChild(createMiniGrid(q.row1R));
      puzzleGrid.appendChild(createMiniGrid(q.row2A));
      puzzleGrid.appendChild(createMiniGrid(q.row2B));
      puzzleGrid.appendChild(createMiniGrid(q.row2R));
      puzzleGrid.appendChild(createMiniGrid(q.row3A));
      puzzleGrid.appendChild(createMiniGrid(q.row3B));
      puzzleGrid.appendChild(createMiniGrid(q.row3Nums));
    }

    function renderAnswerPage() {
      clearDragState();

      const q = questions[currentQuestionIndex];
      document.getElementById("answer-index").textContent = `第 ${currentQuestionIndex + 1} 题 / 共 ${QUESTION_COUNT} 题`;
      document.getElementById("next-btn").textContent = currentQuestionIndex === QUESTION_COUNT - 1 ? "完成" : "下一题";

      const answerGrid = document.getElementById("answer-grid");
      answerGrid.innerHTML = "";

      for (let i = 0; i < 4; i++) {
        const box = document.createElement("div");
        box.className = "answer-box" + (i === activeIndex ? " active" : "");
        box.dataset.index = i;

        if (q.userAnswers[i]) {
          box.appendChild(createGraphic(q.userAnswers[i]));
        }

        box.addEventListener("click", () => {
          if (q.userAnswers[i]) {
            q.userAnswers[i] = null;
            activeIndex = i;
            renderAnswerPage();
          } else {
            activeIndex = i;
            renderAnswerPage();
          }
        });

        answerGrid.appendChild(box);
      }

      cacheAnswerBoxRects();

      const optionsGrid = document.getElementById("options-grid");
      optionsGrid.innerHTML = "";

      q.options.forEach(item => {
        const box = document.createElement("div");
        box.className = "option-box";
        box.appendChild(createGraphic(item));
        setupPointerDrag(box, item);
        optionsGrid.appendChild(box);
      });
    }

    function formatTime(sec) {
      const m = String(Math.floor(sec / 60)).padStart(2, "0");
      const s = String(sec % 60).padStart(2, "0");
      return `${m}:${s}`;
    }

    function updateProgress() {
      const used = TOTAL_SECONDS - remain;
      const percent = used / TOTAL_SECONDS;
      const line = document.getElementById("progress-line");
      const rocket = document.getElementById("rocket");
      const fill = document.getElementById("progress-fill");

      fill.style.width = `${percent * 100}%`;
      rocket.style.left = `${line.clientWidth * percent}px`;
    }

    function startTimer() {
      stopTimer();
      remain = TOTAL_SECONDS;
      document.getElementById("timer").textContent = formatTime(remain);
      updateProgress();

      timer = setInterval(() => {
        remain--;
        document.getElementById("timer").textContent = formatTime(remain);
        updateProgress();

        if (remain <= 0) {
          stopTimer();
          submitCurrentAnswer();
        }
      }, 1000);
    }

    function stopTimer() {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }
    }

    function enterAnswerPage() {
      clearDragState();
      activeIndex = questions[currentQuestionIndex].userAnswers.findIndex(v => v === null);
      if (activeIndex === -1) activeIndex = 0;
      renderAnswerPage();
      showPage("answer-page");
      startTimer();
    }

    function submitCurrentAnswer() {
      if (isSubmitting) return;
      isSubmitting = true;

      clearDragState();
      stopTimer();

      if (currentQuestionIndex < QUESTION_COUNT - 1) {
        currentQuestionIndex++;
        activeIndex = 0;
        renderQuestionPage();
        showPage("question-page");
      } else {
        finishAll();
      }

      requestAnimationFrame(() => {
        isSubmitting = false;
      });
    }

    function finishAll() {
      let total = QUESTION_COUNT * 4;
      let score = 0;
      let details = "";
      let hasWrong = false;

      const analysisBox = document.getElementById("analysis-box");
      analysisBox.style.display = "block";
      analysisBox.innerHTML = `<div class="analysis-title">错题解析</div>`;

      questions.forEach((q, idx) => {
        let subScore = 0;
        let wrongItems = [];

        for (let i = 0; i < 4; i++) {
          if (sameAnswer(q.userAnswers[i], q.correctAnswers[i])) {
            score++;
            subScore++;
          } else {
            wrongItems.push(i);
          }
        }

        details += `第 ${idx + 1} 题：${subScore} / 4 正确<br>`;

        if (wrongItems.length > 0) {
          hasWrong = true;

          const block = document.createElement("div");
          block.style.marginBottom = "18px";
          block.style.paddingBottom = "12px";
          block.style.borderBottom = "1px dashed #d8e2cf";

          const title = document.createElement("div");
          title.innerHTML = `<strong>第 ${idx + 1} 题错因分析：</strong>`;
          title.style.marginBottom = "8px";
          block.appendChild(title);

          const puzzleTitle = document.createElement("div");
          puzzleTitle.textContent = "原题：";
          puzzleTitle.style.fontWeight = "700";
          puzzleTitle.style.margin = "6px 0";
          block.appendChild(puzzleTitle);

          block.appendChild(createResultPuzzle(q));
          block.appendChild(createResultAnswerRow("你的作答：", q.userAnswers));
          block.appendChild(createResultAnswerRow("正确答案：", q.correctAnswers));

          const text = document.createElement("div");
          text.style.marginTop = "10px";

          wrongItems.forEach(i => {
            const user = q.userAnswers[i];
            const correct = q.correctAnswers[i];
            text.innerHTML += `- 第${i + 1}格：你的答案是【${renderAnswerText(user)}】，正确答案是【${renderAnswerText(correct)}】。<br>`;
            text.innerHTML += `&nbsp;&nbsp;原因：${q.explanations[i]}<br>`;
          });

          block.appendChild(text);
          analysisBox.appendChild(block);
        }
      });

      document.getElementById("result-text").textContent = `总正确数：${score} / ${total}`;
      document.getElementById("result-detail").innerHTML = details;

      if (!hasWrong) {
        analysisBox.innerHTML = `<div class="analysis-title">表现很好</div>全部答对，没有错题解析。`;
      }

      showPage("result-page");
    }

    function restartAll() {
      stopTimer();
      clearDragState();
      currentQuestionIndex = 0;
      activeIndex = 0;
      remain = TOTAL_SECONDS;
      isSubmitting = false;
      initQuestions();
      renderQuestionPage();
      showPage("question-page");
    }

    function initQuestions() {
      questions = [];
      for (let i = 0; i < QUESTION_COUNT; i++) {
        questions.push(generateOneQuestion());
      }
    }

    document.getElementById("choose-btn").addEventListener("pointerup", function(e) {
      e.preventDefault();
      e.stopPropagation();
      enterAnswerPage();
    });

    document.getElementById("next-btn").addEventListener("pointerup", function(e) {
      e.preventDefault();
      e.stopPropagation();
      submitCurrentAnswer();
    });

    document.getElementById("restart-btn").addEventListener("pointerup", function(e) {
      e.preventDefault();
      e.stopPropagation();
      restartAll();
    });

    initQuestions();
    renderQuestionPage();
  </script>
</body>
</html>
