<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>随机模拟题（5题）- OpenMoji风格（17模板唯一/不重复）</title>

  <style>
    :root{
      /* 护眼配色：低对比、偏暖偏绿的浅底色 */
      --bg: #f2f6ee;          /* 页面背景（护眼） */
      --panel: #fbfdf8;       /* 面板底色 */
      --card: #f3f7f0;        /* 卡片底色 */
      --stroke: #e2e8df;
      --text: #1f2937;
      --muted:#6b7280;

      --accent:#f4b45a;

      --green:#57b52c;
      --green2:#7bd53f;

      --danger:#b42318;

      --shadow: 0 1px 0 rgba(0,0,0,.05);
      --shadow2: 0 10px 22px rgba(28,58,26,.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",Arial,sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* iPad 更舒适的边距 + 安全区 */
    .wrap{
      width:min(1120px, 96vw);
      margin: 18px auto 30px;
      padding:
        max(8px, env(safe-area-inset-top))
        max(10px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(10px, env(safe-area-inset-left));
    }

    .topbar{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .badge{
      display:inline-block;
      background:var(--accent);
      color:#fff;
      padding:8px 16px;
      border-radius:16px;
      font-weight:900;
      letter-spacing:.5px;
      box-shadow:var(--shadow);
    }

    .meta{ color:var(--muted); font-weight:800; }

    .qtext{ margin:14px 0 6px; font-size:20px; font-weight:950; }
    .hint{ margin:0 0 12px; font-size:16px; line-height:1.5; }
    .hint b{ font-weight:950; }

    /* 顶部题干图片 */
    .gallery{
      display:grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap:10px;
      padding:12px;
      border:1px solid var(--stroke);
      border-radius:16px;
      width:100%;
      background: var(--panel);
      box-shadow: var(--shadow2);
    }

    .thumb{
      border:1px solid var(--stroke);
      border-radius:14px;
      background: linear-gradient(#ffffff, #f7faf3);
      height:112px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    /* OpenMoji SVG：透明无背景 */
    img.emoji{
      width:90%;
      height:86%;
      object-fit:contain;
      display:block;
      background:transparent;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* timer */
    .timerRow{
      display:grid;
      grid-template-columns: 1fr auto;
      align-items:center;
      gap:12px;
      margin:14px 0 16px;
    }

    .track{
      position:relative;
      height:20px;
      border-radius:10px;
      background:linear-gradient(#eef2ea,#e4eadf);
      box-shadow: inset 0 1px 0 rgba(0,0,0,.06);
      overflow:hidden;
      border: 1px solid rgba(0,0,0,.04);
    }

    .fill{
      position:absolute; inset:0; width:0%;
      background:linear-gradient(90deg, var(--green2), var(--green));
      border-radius:10px;
      transition:width .2s linear;
    }

    .rocket{
      position:absolute; top:50%;
      transform:translate(-50%,-50%);
      width:38px; height:38px;
      pointer-events:none;
      filter: drop-shadow(0 2px 1px rgba(0,0,0,.12));
      transition:left .2s linear;
    }

    .timeBox{
      min-width:98px;
      text-align:center;
      padding:10px 12px;
      background:var(--green);
      color:#fff;
      font-weight:950;
      border-radius:12px;
      box-shadow: var(--shadow2);
      font-variant-numeric: tabular-nums;
    }

    .timeBox.danger{ background:var(--danger); }

    /* options */
    .options{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:18px 22px;
      margin-top:8px;
    }

    .opt{
      display:grid;
      grid-template-columns: 56px 1fr;
      gap:12px;
      align-items:stretch;
    }

    .letter{
      width:56px;
      height:56px;
      border-radius:28px;
      background:#e9eee4;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:950;
      color:#475569;
      box-shadow: var(--shadow);
      border: 1px solid var(--stroke);
    }

    .card{
      background: var(--card);
      border:2px solid transparent;
      border-radius:18px;
      padding:14px 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:124px;     /* iPad 更好点按 */
      cursor:pointer;
      transition:.15s ease;
      box-shadow: var(--shadow2);
      position:relative;
      overflow:hidden;
      touch-action: manipulation;
      border: 1px solid rgba(0,0,0,.04);
    }

    .card:hover{ transform: translateY(-1px); }

    .card.selected{
      border-color:#43a7ff;
      background:#eef7ff;
    }
    .card.correct{
      border-color:#137333;
      background:#ecf7ee;
    }
    .card.wrong{
      border-color:#b42318;
      background:#fff1f1;
    }

    .card img.emoji{
      width:min(240px, 92%);
      height:86px;
      object-fit:contain;
    }

    .actions{
      display:flex;
      gap:12px;
      margin-top:16px;
      align-items:center;
      flex-wrap:wrap;
    }

    /* 按钮全绿色（更适合触控） */
    button{
      border:0;
      background: linear-gradient(180deg, var(--green2), var(--green));
      color:#fff;
      padding:14px 18px;
      border-radius:16px;
      font-weight:950;
      cursor:pointer;
      box-shadow: 0 10px 22px rgba(46, 139, 31, .16), var(--shadow);
      touch-action: manipulation;
      font-size:16px;
    }
    button:active{ transform: translateY(1px); }
    button:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

    .result{
      color:var(--muted);
      font-weight:900;
      font-size:16px;
    }
    .result .ok{ color:#137333; font-weight:950; }
    .result .bad{ color:var(--danger); font-weight:950; }

    .final{
      margin-top:18px;
      border:1px solid var(--stroke);
      border-radius:16px;
      padding:14px;
      background: var(--panel);
      box-shadow: var(--shadow2);
      display:none;
    }
    .final h3{ margin:0 0 8px; }

    /* iPad/平板：更适合的布局 */
    @media (max-width: 1024px){
      .wrap{ width: min(980px, 96vw); }
      .gallery{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .thumb{ height:120px; }
      .card{ min-height:132px; }
      .card img.emoji{ height:92px; }
      .qtext{ font-size:22px; }
      .hint{ font-size:17px; }
    }

    /* iPad 竖屏/手机：缩略图列数更少 */
    @media (max-width: 820px){
      .gallery{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 740px){
      .options{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <p class="hint">【家长指导语： <b>请选择一个同上面图形类别差别最大的一个选项</b>】（点选即判题）</p>

  <div class="gallery" id="gallery" aria-label="题干图片"></div>

  <div class="timerRow">

</div>

<script>
/* ===================== 工具 ===================== */
const LETTERS = ["A","B","C","D","E","F"];
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){
    t += 0x6D2B79F5;
    let x = Math.imul(t ^ (t >>> 15), 1 | t);
    x ^= x + Math.imul(x ^ (x >>> 7), 61 | x);
    return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
  };
}
function shuffle(arr, rnd=Math.random){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rnd()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function fmt(sec){
  const m = Math.floor(sec/60);
  const s = sec % 60;
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

/* ===================== OpenMoji SVG 加载（联网） ===================== */
const OPENMOJI_BASE = "https://openmoji.org/data/color/svg/";
const FALLBACK_LIST = ["2753","2754","1F7E5","1F7E6","1F7E8"]; // ❓❔🟥🟦🟨

function openMojiCandidates(hex){
  const h = hex.toUpperCase();
  return [h, `${h}-FE0F`];
}
function makeEmojiImg(hex, alt=""){
  const img = document.createElement("img");
  img.className = "emoji";
  img.alt = alt || hex;
  img.loading = "lazy";
  img.referrerPolicy = "no-referrer";

  const tries = openMojiCandidates(hex);
  let i = 0;
  const setSrc = code => img.src = OPENMOJI_BASE + code + ".svg";
  setSrc(tries[i]);

  img.onerror = () => {
    i++;
    if(i < tries.length){
      setSrc(tries[i]);
      return;
    }
    const fb = FALLBACK_LIST[Math.floor(Math.random()*FALLBACK_LIST.length)];
    img.src = OPENMOJI_BASE + fb + ".svg";
  };
  return img;
}

/* ===================== 题库（每主题17模板唯一） ===================== */
const THEMES = [
  { name:"陆地交通工具", group:"vehicle", ids:[
    "car","rv","minibus","bus","trolleybus","truck","lorry","taxi","ambulance","fireengine",
    "policecar","tractor","pickup","rickshaw","scooter","motorscooter","bicycle"
  ]},
  { name:"水果", group:"fruit", ids:[
    "redapple","greenapple","banana","tangerine","pear","grapes","strawberry","cherries","pineapple","lemon",
    "kiwi","avocado","coconut","watermelon","melon","mango","blueberries"
  ]},
  { name:"动物", group:"animal", ids:[
    "cat","dog","rabbit","elephant","turtle","fish","bird","penguin","panda","lion",
    "giraffe","zebra","frog","monkey","koala","fox","hedgehog"
  ]},
  { name:"文具/办公", group:"stationery", ids:[
    "pencil","pen","ruler","triRuler","notebook","spiralNotepad","memo","clipboard","paperclip","pushpin",
    "scissors","briefcase","fileFolder","openFileFolder","cardIndexDividers","cardFileBox","abacus"
  ]},
  { name:"厨具/餐具", group:"kitchen", ids:[
    "cup","plate","bowl","spoon","forkKnife","knife","cooking","pot","teapot","chopsticks",
    "bento","salt","butter","bread","cheese","wine","babyBottle"
  ]},
  { name:"乐器/音乐", group:"instrument", ids:[
    "guitar","piano","drum","violin","trumpet","sax","microphone","headphones","banjo","accordion",
    "longDrum","maracas","flute","notes","note","radio","speaker"
  ]},
  { name:"植物", group:"plant", ids:[
    "tree","evergreen","cactus","herb","seedling","leaf","mapleLeaf","mushroom","sunflower","rose",
    "tulip","palm","blossom","bouquet","pottedPlant","shamrock","earOfRice"
  ]},
  { name:"运动", group:"sport", ids:[
    "soccer","basketball","baseball","tennis","volleyball","football","rugby","pingpong","badminton","hockey",
    "golf","ski","skateboard","boxing","medal","helmet","stopwatch"
  ]}
];

/* ===================== 模板 -> OpenMoji codepoint（组内17个全不同） ===================== */
const EMOJI = {
  vehicle: {
    car:"1F697", rv:"1F699", minibus:"1F690", bus:"1F68C", trolleybus:"1F68E",
    truck:"1F69A", lorry:"1F69B", taxi:"1F695", ambulance:"1F691", fireengine:"1F692",
    policecar:"1F693", tractor:"1F69C", pickup:"1F6FB", rickshaw:"1F6FA", scooter:"1F6F4",
    motorscooter:"1F6F5", bicycle:"1F6B2"
  },
  fruit: {
    redapple:"1F34E", greenapple:"1F34F", banana:"1F34C", tangerine:"1F34A", pear:"1F350",
    grapes:"1F347", strawberry:"1F353", cherries:"1F352", pineapple:"1F34D", lemon:"1F34B",
    kiwi:"1F95D", avocado:"1F951", coconut:"1F965", watermelon:"1F349", melon:"1F348",
    mango:"1F96D", blueberries:"1FAD0"
  },
  animal: {
    cat:"1F431", dog:"1F436", rabbit:"1F430", elephant:"1F418", turtle:"1F422",
    fish:"1F41F", bird:"1F426", penguin:"1F427", panda:"1F43C", lion:"1F981",
    giraffe:"1F992", zebra:"1F993", frog:"1F438", monkey:"1F412", koala:"1F428",
    fox:"1F98A", hedgehog:"1F994"
  },
  stationery: {
    pencil:"270F", pen:"1F58A", ruler:"1F4CF", triRuler:"1F4D0", notebook:"1F4D3",
    spiralNotepad:"1F5D2", memo:"1F4DD", clipboard:"1F4CB", paperclip:"1F4CE", pushpin:"1F4CC",
    scissors:"2702", briefcase:"1F4BC", fileFolder:"1F4C1", openFileFolder:"1F4C2",
    cardIndexDividers:"1F5C2", cardFileBox:"1F5C3", abacus:"1F9EE"
  },
  kitchen: {
    cup:"2615", plate:"1F37D", bowl:"1F963", spoon:"1F944", forkKnife:"1F374",
    knife:"1F52A", cooking:"1F373", pot:"1F372", teapot:"1FAD6", chopsticks:"1F962",
    bento:"1F371", salt:"1F9C2", butter:"1F9C8", bread:"1F35E", cheese:"1F9C0",
    wine:"1F377", babyBottle:"1F37C"
  },
  instrument: {
    guitar:"1F3B8", piano:"1F3B9", drum:"1F941", violin:"1F3BB", trumpet:"1F3BA",
    sax:"1F3B7", microphone:"1F3A4", headphones:"1F3A7", banjo:"1FA95", accordion:"1FA97",
    longDrum:"1FA98", maracas:"1FA87", flute:"1FA88", notes:"1F3B6", note:"1F3B5",
    radio:"1F4FB", speaker:"1F50A"
  },
  plant: {
    tree:"1F333", evergreen:"1F332", cactus:"1F335", herb:"1F33F", seedling:"1F331",
    leaf:"1F343", mapleLeaf:"1F341", mushroom:"1F344", sunflower:"1F33B", rose:"1F339",
    tulip:"1F337", palm:"1F334", blossom:"1F33C", bouquet:"1F490", pottedPlant:"1FAB4",
    shamrock:"2618", earOfRice:"1F33E"
  },
  sport: {
    soccer:"26BD", basketball:"1F3C0", baseball:"26BE", tennis:"1F3BE", volleyball:"1F3D0",
    football:"1F3C8", rugby:"1F3C9", pingpong:"1F3D3", badminton:"1F3F8", hockey:"1F3D2",
    golf:"26F3", ski:"1F3BF", skateboard:"1F6F9", boxing:"1F94A", medal:"1F3C5",
    helmet:"26D1", stopwatch:"23F1"
  }
};

function emojiHex(group, id){
  return (EMOJI[group] && EMOJI[group][id]) ? EMOJI[group][id] : "2753";
}

/* ===================== 出题逻辑（保持：17模板唯一/不重复形状） ===================== */
function buildQuestions(){
  const rnd = mulberry32((Date.now() & 0xffffffff) >>> 0);
  const themes = shuffle(THEMES, rnd).slice(0,5);

  return themes.map(theme => {
    const ids = shuffle(theme.ids, rnd);
    const topIds = ids.slice(0,12);
    const sameIds = ids.slice(12); // 5个

    const otherThemes = THEMES.filter(t => t.group !== theme.group);
    const oddTheme = otherThemes[Math.floor(rnd()*otherThemes.length)];
    const oddId = oddTheme.ids[Math.floor(rnd()*oddTheme.ids.length)];

    const options = shuffle(
      sameIds.map(x => ({group: theme.group, id: x}))
        .concat([{group: oddTheme.group, id: oddId}]),
      rnd
    );

    const correctIdx = options.findIndex(o => o.group !== theme.group);
    const correctLetter = LETTERS[correctIdx];

    return {
      themeName: theme.name,
      top: topIds.map(id => ({group: theme.group, id})),
      options,
      correctLetter
    };
  });
}

/* ===================== 页面逻辑（点选即判题） ===================== */
let questions = [];
let qi = 0;
let score = 0;
let answered = false;
let userAnswers = [];

const galleryEl = document.getElementById("gallery");
const optionsEl = document.getElementById("options");
const metaLine = document.getElementById("metaLine");
const resultEl = document.getElementById("result");
const nextBtn = document.getElementById("nextBtn");
const regenBtn = document.getElementById("regenBtn");
const finalBox = document.getElementById("finalBox");
const finalScore = document.getElementById("finalScore");
const finalList = document.getElementById("finalList");
const finalTitle = document.getElementById("finalTitle");

/* ===== 倒计时：2分钟/题 ===== */
const TOTAL = 120;
let remain = TOTAL;
let timer = null;

const timeBox = document.getElementById("timeBox");
const fill = document.getElementById("fill");
const rocket = document.getElementById("rocket");
const track = document.querySelector(".track");

function renderProgress(){
  const elapsed = TOTAL - remain;
  const p = Math.min(1, Math.max(0, elapsed / TOTAL));
  fill.style.width = (p*100).toFixed(2) + "%";
  const w = track.clientWidth;
  const left = 6 + p * (w - 12);
  rocket.style.left = left + "px";
  timeBox.textContent = fmt(remain);
  timeBox.classList.toggle("danger", remain <= 10);
}
function stopTimer(){ if(timer) clearInterval(timer); timer = null; }
function startTimer(){
  stopTimer();
  remain = TOTAL;
  renderProgress();
  timer = setInterval(() => {
    remain--;
    if(remain <= 0){
      remain = 0;
      renderProgress();
      stopTimer();
      if(!answered){
        resultEl.innerHTML = `<span class="bad">时间到</span>（未作答）`;
        nextBtn.disabled = false;
        const q = questions[qi];
        userAnswers[qi] = { picked: "未作答", correctLetter: q.correctLetter, ok: false, timeout: true };
      }
      return;
    }
    renderProgress();
  }, 1000);
}
window.addEventListener("resize", renderProgress);

function finalizeAnswer(pickedLetter){
  if(answered) return;
  const q = questions[qi];
  answered = true;
  stopTimer();
  nextBtn.disabled = false;

  const ok = pickedLetter === q.correctLetter;
  if(ok) score++;

  const cards = optionsEl.querySelectorAll(".card");
  cards.forEach((card, idx) => {
    const letter = LETTERS[idx];
    card.classList.remove("selected");
    if(letter === q.correctLetter) card.classList.add("correct");
    if(letter === pickedLetter && !ok) card.classList.add("wrong");
  });

  resultEl.innerHTML = ok
    ? `结果：<span class="ok">正确</span>`
    : `结果：<span class="bad">错误</span>`;

  userAnswers[qi] = { picked: pickedLetter, correctLetter: q.correctLetter, ok };
}

function renderQuestion(){
  const q = questions[qi];
  answered = false;
  resultEl.textContent = "";
  nextBtn.disabled = true;
  finalBox.style.display = "none";

  metaLine.textContent = `第 ${qi+1} / 5 题`;

  galleryEl.innerHTML = "";
  q.top.forEach(item => {
    const d = document.createElement("div");
    d.className = "thumb";
    d.appendChild(makeEmojiImg(emojiHex(item.group, item.id), item.id));
    galleryEl.appendChild(d);
  });

  optionsEl.innerHTML = "";
  q.options.forEach((opt, idx) => {
    const letter = LETTERS[idx];

    const optWrap = document.createElement("div");
    optWrap.className = "opt";

    const letterEl = document.createElement("div");
    letterEl.className = "letter";
    letterEl.textContent = letter;

    const card = document.createElement("div");
    card.className = "card";
    card.setAttribute("role","radio");
    card.setAttribute("aria-checked","false");
    card.tabIndex = 0;

    card.appendChild(makeEmojiImg(emojiHex(opt.group, opt.id), opt.id));

    function pickThis(){
      if(answered) return;
      optionsEl.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("selected","correct","wrong");
        c.setAttribute("aria-checked","false");
      });
      card.classList.add("selected");
      card.setAttribute("aria-checked","true");
      finalizeAnswer(letter);
    }

    card.addEventListener("click", pickThis);
    card.addEventListener("keydown", (e)=>{
      if(e.key === "Enter" || e.key === " "){
        e.preventDefault();
        pickThis();
      }
    });

    optWrap.appendChild(letterEl);
    optWrap.appendChild(card);
    optionsEl.appendChild(optWrap);
  });

  startTimer();
}

nextBtn.addEventListener("click", () => {
  if(qi < questions.length - 1){
    qi++;
    renderQuestion();
  }else{
    stopTimer();
    showFinal();
  }
});

regenBtn.addEventListener("click", () => {
  stopTimer();
  init();
});

function showFinal(){
  finalBox.style.display = "block";
  finalTitle.textContent = "已完成 5 题";
  finalScore.innerHTML = `得分：<b>${score}</b> / 5`;

  finalList.innerHTML = "";
  userAnswers.forEach((a, i) => {
    const li = document.createElement("li");
    const extra = a.timeout ? "（超时）" : "";
    li.innerHTML = `第 ${i+1} 题：你的选择 <b>${a.picked}</b>，正确答案 <b>${a.correctLetter}</b> ${extra} — ${
      a.ok ? "<span style='color:#137333;font-weight:950'>正确</span>" : "<span style='color:var(--danger);font-weight:950'>错误</span>"
    }`;
    finalList.appendChild(li);
  });
}

function init(){
  questions = buildQuestions();
  qi = 0;
  score = 0;
  answered = false;
  userAnswers = new Array(5);
  resultEl.textContent = "";
  finalBox.style.display = "none";
  renderQuestion();
}
init();
</script>
</body>
</html>
